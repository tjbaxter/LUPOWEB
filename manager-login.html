<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUPO Manager - Sign In</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --border: #222;
            --text: #fff;
            --text-dim: #888;
            --accent: #3b82f6;
            --danger: #ef4444;
        }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }
        
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .logo h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .logo p {
            color: var(--text-dim);
            font-size: 0.875rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-dim);
        }
        
        input {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            transition: all 0.2s;
        }
        
        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .checkbox-group input {
            width: auto;
            margin-right: 0.5rem;
        }
        
        .checkbox-group label {
            margin: 0;
            cursor: pointer;
        }
        
        .btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 0.75rem;
            margin-bottom: 1rem;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .success-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 8px;
            padding: 0.75rem;
            margin-bottom: 1rem;
            display: none;
            color: #10b981;
        }
        
        .success-message.show {
            display: block;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 0.5rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .help-text {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-dim);
        }
        
        .help-text a {
            color: var(--accent);
            text-decoration: none;
        }
        
        .help-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <h1>LUPO</h1>
                <p>Manager Dashboard</p>
            </div>
            
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        required 
                        placeholder="manager@company.com"
                        autocomplete="email"
                    >
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required 
                        placeholder="Enter your password"
                        autocomplete="current-password"
                    >
                </div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="remember" name="remember" checked>
                    <label for="remember">Keep me signed in for 30 days</label>
                </div>
                
                <button type="submit" class="btn" id="submitBtn">
                    Sign In
                </button>
            </form>
            
            <div class="help-text">
                <p>Need help? <a href="mailto:support@lupolabs.ai">Contact Support</a></p>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'https://lupo-backend.fly.dev';
        
        // Check for existing session
        async function checkExistingSession() {
            const token = localStorage.getItem('lupo_manager_token');
            const expiry = localStorage.getItem('lupo_manager_expiry');
            
            if (token && expiry) {
                const expiryDate = new Date(expiry);
                if (expiryDate > new Date()) {
                    // Token still valid, redirect to dashboard
                    window.location.href = '/manager-dashboard.html';
                    return;
                }
                
                // Try to refresh the token
                const refreshToken = localStorage.getItem('lupo_refresh_token');
                if (refreshToken) {
                    try {
                        const response = await fetch(`${API_URL}/auth/refresh-token`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ refreshToken })
                        });
                        
                        if (response.ok) {
                            const data = await response.json();
                            saveSession(data.token, data.expiresIn);
                            window.location.href = '/manager-dashboard.html';
                            return;
                        }
                    } catch (error) {
                        console.error('Token refresh failed:', error);
                    }
                }
            }
        }
        
        // Save session to localStorage
        function saveSession(token, expiresIn, refreshToken) {
            const expiry = new Date();
            expiry.setSeconds(expiry.getSeconds() + expiresIn);
            
            localStorage.setItem('lupo_manager_token', token);
            localStorage.setItem('lupo_manager_expiry', expiry.toISOString());
            
            if (refreshToken) {
                localStorage.setItem('lupo_refresh_token', refreshToken);
            }
        }
        
        // Handle form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            const submitBtn = document.getElementById('submitBtn');
            
            // Reset messages
            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');
            
            // Disable button
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span>Signing in...';
            
            try {
                const response = await fetch(`${API_URL}/auth/manager-login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    // Save session
                    if (remember) {
                        saveSession(data.token, data.expiresIn, data.refreshToken);
                    } else {
                        // Session storage for this session only
                        sessionStorage.setItem('lupo_manager_token', data.token);
                    }
                    
                    // Show success
                    successDiv.textContent = 'Login successful! Redirecting...';
                    successDiv.classList.add('show');
                    
                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = '/manager-dashboard.html';
                    }, 1000);
                    
                } else {
                    // Show error
                    errorDiv.textContent = data.error || 'Login failed. Please try again.';
                    errorDiv.classList.add('show');
                    
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Sign In';
                }
                
            } catch (error) {
                console.error('Login error:', error);
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.classList.add('show');
                
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });
        
        // Check existing session on load
        checkExistingSession();
    </script>
</body>
</html>
