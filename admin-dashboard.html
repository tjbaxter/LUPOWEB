<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUPO Admin - Enterprise Management</title>
    <link rel="icon" type="image/png" href="/LUPO_LOGO copy 1.png">
    <link rel="apple-touch-icon" href="/LUPO_LOGO copy 1.png">
    <link rel="stylesheet" href="admin-dashboard.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">LUPO Admin</div>
            <div class="stats-bar">
                <div class="stat">
                    <div class="stat-value" id="totalCompanies">0</div>
                    <div class="stat-label">Companies</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="totalSeats">0</div>
                    <div class="stat-label">Total Seats</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="activeReps">0</div>
                    <div class="stat-label">Active Reps</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="mrr">$0</div>
                    <div class="stat-label">MRR</div>
                </div>
            </div>
        </div>
    </header>

    <!-- Tabs -->
    <div class="tabs">
        <div class="tabs-content">
            <div class="tab active" data-tab="companies">Companies</div>
            <div class="tab" data-tab="reps">All Reps</div>
            <div class="tab" data-tab="pending">Pending Invites</div>
            <div class="tab" data-tab="analytics">Analytics</div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Companies Tab -->
        <div id="companies-tab" class="tab-content">
            <div class="action-bar">
                <div class="search-box">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                    <input type="text" id="searchCompanies" placeholder="Search companies...">
                </div>
                <button class="btn" onclick="showAddCompanyModal()">
                    + Add Company
                </button>
            </div>

            <div class="companies-grid" id="companiesGrid">
                <!-- Companies will be loaded here -->
            </div>
        </div>

        <!-- Reps Tab -->
        <div id="reps-tab" class="tab-content" style="display: none;">
            <!-- Reps content will go here -->
        </div>

        <!-- Analytics Tab -->
        <div id="analytics-tab" class="tab-content" style="display: none;">
            <div class="chart-container">
                <div class="chart-header">
                    <h3 class="chart-title">Growth Metrics</h3>
                    <div class="chart-period">
                        <button class="period-btn active">7D</button>
                        <button class="period-btn">30D</button>
                        <button class="period-btn">90D</button>
                    </div>
                </div>
                <div id="growthChart"></div>
            </div>
        </div>
    </div>

    <!-- Company Details Modal -->
    <div class="modal" id="companyModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Company Details</h2>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" id="modalCompanyName">
                </div>
                <div class="form-group">
                    <label>Manager Email</label>
                    <input type="email" id="modalManagerEmail">
                </div>
                <div class="form-group">
                    <label>Manager Name</label>
                    <input type="text" id="modalManagerName">
                </div>
                <div class="form-group">
                    <label>Plan</label>
                    <select id="modalPlan">
                        <option value="trial">Trial</option>
                        <option value="pilot">Pilot</option>
                        <option value="enterprise">Enterprise</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Seats</label>
                    <input type="number" id="modalSeats" min="1">
                </div>
                <div class="form-group">
                    <label>Send Manager Invite Link</label>
                    <button class="btn" onclick="sendManagerInvite()">
                        Send Invite Email
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="admin-dashboard.js"></script>
</body>
</html>
