<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUPO Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, sans-serif;
            background: #000;
            color: #fff;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 48px;
            margin-bottom: 40px;
            font-weight: 600;
        }
        
        .stats {
            display: flex;
            gap: 40px;
            margin-bottom: 60px;
            padding-bottom: 40px;
            border-bottom: 1px solid #222;
        }
        
        .stat {
            flex: 1;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: 600;
            color: #3b82f6;
        }
        
        .stat-label {
            font-size: 14px;
            color: #666;
            margin-top: 8px;
        }
        
        .section {
            margin-bottom: 60px;
        }
        
        h2 {
            font-size: 24px;
            margin-bottom: 24px;
            color: #888;
        }
        
        .company {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
        }
        
        .company-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .company-name {
            font-size: 20px;
            font-weight: 500;
        }
        
        .company-status {
            padding: 4px 12px;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .company-info {
            display: flex;
            gap: 24px;
            font-size: 14px;
            color: #666;
        }
        
        .company-links {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #222;
            font-size: 12px;
        }
        
        .company-links a {
            color: #3b82f6;
            text-decoration: none;
            margin-right: 16px;
        }
        
        .company-links a:hover {
            text-decoration: underline;
        }
        
        .form {
            display: none;
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .form.show {
            display: block;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #888;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        
        button {
            padding: 12px 24px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        
        button:hover {
            background: #2563eb;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .message {
            padding: 16px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            border-radius: 8px;
            margin-bottom: 24px;
            display: none;
        }
        
        .message.show {
            display: block;
        }
        
        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }
        
        .loading {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>LUPO Admin</h1>
    
    <div class="stats">
        <div class="stat">
            <div class="stat-value" id="totalCompanies">0</div>
            <div class="stat-label">Companies</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="totalSeats">0</div>
            <div class="stat-label">Total Seats</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="mrr">$0</div>
            <div class="stat-label">Monthly Revenue</div>
        </div>
    </div>
    
    <div class="section">
        <h2>Quick Add Company</h2>
        
        <div id="message" class="message"></div>
        
        <div class="form show">
            <div class="form-group">
                <label>Company Name*</label>
                <input type="text" id="companyName" placeholder="Acme Corp" required>
            </div>
            <div class="form-group">
                <label>Manager Name*</label>
                <input type="text" id="managerName" placeholder="John Smith" required>
            </div>
            <div class="form-group">
                <label>Manager Email*</label>
                <input type="email" id="managerEmail" placeholder="john@acme.com" required>
            </div>
            <div class="form-group">
                <label>Number of Seats</label>
                <input type="number" id="seats" value="5" min="1" max="100">
            </div>
            <button id="submitBtn" onclick="addCompany()">Create Company & Send Invite</button>
        </div>
    </div>
    
    <div class="section">
        <h2>Active Companies</h2>
        <div id="companiesList">
            <!-- Companies will load here -->
        </div>
    </div>
    
    <script>
        const API_URL = 'https://lupo-backend.fly.dev';
        let token = null;
        
        async function init() {
            // Get your admin token
            token = localStorage.getItem('admin_token');
            if (!token) {
                const email = 'tjpb2@cantab.ac.uk';
                const password = prompt('Admin password:');
                
                if (!password) {
                    showMessage('Password required to access admin panel', 'error');
                    return;
                }
                
                try {
                    const res = await fetch(`${API_URL}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    
                    const data = await res.json();
                    if (data.success) {
                        token = data.token;
                        localStorage.setItem('admin_token', token);
                        showMessage('Logged in successfully', 'success');
                    } else {
                        showMessage('Invalid password', 'error');
                        return;
                    }
                } catch (error) {
                    showMessage('Login failed: ' + error.message, 'error');
                    return;
                }
            }
            
            loadCompanies();
        }
        
        function loadCompanies() {
            // Load from localStorage
            const saved = localStorage.getItem('lupo_companies');
            if (saved) {
                const companies = JSON.parse(saved);
                renderCompanies(companies);
                updateStats(companies);
            } else {
                renderCompanies([]);
                updateStats([]);
            }
        }
        
        function renderCompanies(companies) {
            const list = document.getElementById('companiesList');
            
            if (companies.length === 0) {
                list.innerHTML = '<div style="color: #666;">No companies yet. Add your first company above.</div>';
                return;
            }
            
            list.innerHTML = companies.map(c => `
                <div class="company">
                    <div class="company-header">
                        <div class="company-name">${c.companyName || c.name}</div>
                        <div class="company-status">Active</div>
                    </div>
                    <div class="company-info">
                        <div>Manager: ${c.managerEmail}</div>
                        <div>Seats: ${c.seats}</div>
                        <div>Added: ${new Date(c.created).toLocaleDateString()}</div>
                    </div>
                    ${c.orgId ? `
                        <div class="company-links">
                            <a href="https://lupolabs.ai/signup.html?org=${c.orgId}&type=enterprise" target="_blank">
                                Team Signup Link
                            </a>
                            <a href="https://lupolabs.ai/manager-dashboard.html" target="_blank">
                                Manager Dashboard
                            </a>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }
        
        function updateStats(companies) {
            const totalCompanies = companies.length;
            const totalSeats = companies.reduce((sum, c) => sum + (c.seats || 0), 0);
            const mrr = totalSeats * 100;
            
            document.getElementById('totalCompanies').textContent = totalCompanies;
            document.getElementById('totalSeats').textContent = totalSeats;
            document.getElementById('mrr').textContent = `$${mrr.toLocaleString()}`;
        }
        
        async function addCompany() {
            const companyName = document.getElementById('companyName').value.trim();
            const managerName = document.getElementById('managerName').value.trim();
            const managerEmail = document.getElementById('managerEmail').value.trim();
            const seats = parseInt(document.getElementById('seats').value) || 5;
            
            // Validation
            if (!companyName || !managerName || !managerEmail) {
                showMessage('Please fill in all required fields', 'error');
                return;
            }
            
            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(managerEmail)) {
                showMessage('Please enter a valid email address', 'error');
                return;
            }
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Sending invite<span class="loading"></span>';
            
            try {
                // Send invite with all company details
                const res = await fetch(`${API_URL}/auth/admin/send-manager-invite`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        managerEmail, 
                        managerName,
                        companyName,
                        seats
                    })
                });
                
                const data = await res.json();
                
                if (data.success || res.ok) {
                    // Save company locally with orgId
                    const saved = localStorage.getItem('lupo_companies');
                    const companies = saved ? JSON.parse(saved) : [];
                    
                    const newCompany = {
                        companyName,
                        managerName,
                        managerEmail,
                        seats,
                        orgId: data.orgId || null,
                        teamSignupLink: data.teamSignupLink || null,
                        created: new Date().toISOString()
                    };
                    
                    companies.push(newCompany);
                    localStorage.setItem('lupo_companies', JSON.stringify(companies));
                    
                    showMessage(`✓ Company created! Invite sent to ${managerEmail}`, 'success');
                    
                    // Show the team signup link
                    if (data.teamSignupLink) {
                        setTimeout(() => {
                            showMessage(`Team signup link: ${data.teamSignupLink}`, 'success');
                        }, 2000);
                    }
                    
                    // Clear form
                    document.getElementById('companyName').value = '';
                    document.getElementById('managerName').value = '';
                    document.getElementById('managerEmail').value = '';
                    document.getElementById('seats').value = '5';
                    
                    // Reload list
                    loadCompanies();
                } else {
                    showMessage(data.error || 'Failed to send invite', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error: ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Create Company & Send Invite';
            }
        }
        
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message show ${type === 'error' ? 'error' : ''}`;
            
            // Auto-hide after 7 seconds
            setTimeout(() => {
                msg.classList.remove('show');
            }, 7000);
        }
        
        // Initialize on load
        init();
        
        // Add enter key support
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.target.tagName === 'INPUT') {
                addCompany();
            }
        });
    </script>
</body>
</html>
