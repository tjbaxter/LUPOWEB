<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compliance Rules - LUPO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg: #000000;
            --surface: #1a1a1a;
            --border: #333;
            --text: #ffffff;
            --text-dim: #999;
            --danger: #ff3b30;
            --warning: #ff9500;
            --success: #00c896;
            --info: #007aff;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 1.5rem;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            margin-bottom: 2rem;
        }
        
        .header h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }
        
        .header p {
            color: var(--text-dim);
            font-size: 0.9rem;
        }
        
        .info-box {
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid rgba(255, 59, 48, 0.3);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 2rem;
        }
        
        .main-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        
        .section-title {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .phrase-count {
            font-size: 0.875rem;
            color: var(--text-dim);
        }
        
        .editor-wrapper {
            margin-bottom: 1.5rem;
        }
        
        .editor-label {
            font-size: 0.875rem;
            color: var(--text-dim);
            margin-bottom: 0.75rem;
        }
        
        .editor-textarea {
            width: 100%;
            height: 600px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            color: var(--text);
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 0.9rem;
            line-height: 1.8;
            resize: vertical;
        }
        
        .editor-textarea:focus {
            outline: none;
            border-color: #555;
        }
        
        .button-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        
        .btn {
            padding: 0.75rem 2rem;
            background: var(--danger);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn:hover {
            background: #cc0000;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        
        input[type="file"] {
            display: none;
        }
        
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }
        
        .save-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--text-dim);
        }
        
        .save-status.saved {
            color: var(--success);
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--surface);
            border: 1px solid var(--success);
            border-radius: 8px;
            padding: 1rem 1.5rem;
            display: none;
            animation: slideIn 0.3s ease;
        }
        
        .toast.show {
            display: block;
        }
        
        .toast.error {
            border-color: var(--danger);
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
            }
            to {
                transform: translateX(0);
            }
        }
        
        .category-buttons {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        
        .category-btn {
            padding: 0.6rem 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-dim);
            font-size: 0.825rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .category-btn:hover {
            background: rgba(255, 59, 48, 0.1);
            color: var(--text);
            border-color: var(--danger);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Compliance Rules</h1>
            <p>Forbidden phrases that trigger lawsuits. AI auto-generates safe alternatives.</p>
        </div>
        
        <div class="info-box">
            <strong>Warning:</strong> These phrases are compliance bombs. When LUPO detects them, it instantly alerts the rep with AI-generated alternatives based on context.
        </div>
        
        <div class="main-section">
            <h3 class="section-title">
                <span>Forbidden Phrases</span>
                <span class="phrase-count" id="phraseCount">0 phrases</span>
            </h3>
            
            <div class="category-buttons">
                <button class="category-btn" onclick="addCategory('medical')">+ Medical/FDA</button>
                <button class="category-btn" onclick="addCategory('financial')">+ Financial</button>
                <button class="category-btn" onclick="addCategory('guarantees')">+ Guarantees</button>
                <button class="category-btn" onclick="addCategory('pressure')">+ Time Pressure</button>
                <button class="category-btn" onclick="addCategory('legal')">+ Legal Claims</button>
            </div>
            
            <div class="editor-wrapper">
                <label class="editor-label">Enter forbidden phrases (one per line)</label>
                <textarea class="editor-textarea" id="forbiddenPhrases" placeholder="Click category buttons above to add compliance bombs, or type your own..."></textarea>
            </div>
            
            <div class="button-group">
                <button class="btn-secondary" onclick="document.getElementById('fileUpload').click()">Upload List</button>
                <button class="btn-secondary" onclick="downloadRules()">Download</button>
                <button class="btn-secondary" onclick="clearAll()">Clear All</button>
            </div>
        </div>
        
        <div class="footer">
            <div class="save-status" id="saveStatus">
                <span class="status-dot"></span>
                <span>Ready to save</span>
            </div>
            <button class="btn" onclick="saveRules()">Save Compliance Rules</button>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    <input type="file" id="fileUpload" accept=".txt,.csv" onchange="handleFileUpload(event)">
    
    <script>
        let authHeaders = {};
        let autoSaveTimer;
        
        const categories = {
            medical: [
                'FDA approved',
                'FDA clearance guaranteed',
                'FDA fast-track',
                'FDA endorsed',
                'FDA-certified',
                'cure',
                'clinically proven',
                'doctor recommended',
                'scientifically proven',
                'medical breakthrough',
                'eliminates symptoms',
                'heals',
                'treatment guaranteed',
                'diagnosis',
                'prescribe',
                'medical-grade',
                'clinical-grade',
                'hospital-grade',
                'pharmaceutical-grade',
                'HIPAA-certified',
                'HIPAA exempt',
                'patient consent not required',
                'de-identified by default',
                'patient anonymity automatic',
                'clinical trial ready',
                'clinical outcomes guaranteed',
                'medical advice',
                'disease prevention',
                'symptom elimination',
                'therapy replacement',
                'clinical validation guaranteed',
                'medical professional approved',
                'physician endorsed',
                'surgeon recommended',
                'CDC approved',
                'WHO certified',
                'NIH approved',
                'medical board certified',
                'healthcare compliant',
                'patient data secure forever'
            ],
            financial: [
                'guaranteed ROI',
                'guaranteed returns',
                'guaranteed profits',
                'guaranteed alpha',
                'risk-free yield',
                'risk-free investment',
                'no financial risk',
                'zero exposure risk',
                'get rich quick',
                'easy money',
                'passive income guaranteed',
                'financial freedom guaranteed',
                'guaranteed income',
                'beats the market',
                'outperform the market',
                'market-beating returns',
                'insider trading',
                'insider information',
                'insider access',
                'SEC approved',
                'SEC-blessed',
                'SEC safe harbor',
                'SEC endorsed',
                'FINRA approved',
                'FCA approved',
                'FCA licensed',
                'Fed approved',
                'Federal Reserve endorsed',
                'government backed returns',
                'FDIC insured investments',
                'bank-level returns',
                'institutional-only access',
                'exclusive investment opportunity',
                'guaranteed appreciation',
                'no loss guarantee',
                'principal protected',
                'downside protection guaranteed',
                'tax-free gains',
                'IRS approved',
                'audit-proof',
                'Basel III certified',
                'Dodd-Frank compliant',
                'MiFID compliant',
                'AML compliant by default'
            ],
            guarantees: [
                'guarantee results',
                'guaranteed success',
                '100% guarantee',
                '100% satisfaction',
                '100% success rate',
                '100% effective',
                'no risk',
                'risk-free',
                'zero risk',
                'money back guarantee',
                'unconditional guarantee',
                'lifetime guarantee',
                'forever guarantee',
                'permanent results',
                'never fails',
                'foolproof',
                'fail-safe',
                'bulletproof',
                'always works',
                'works every time',
                'guaranteed to work',
                'satisfaction guaranteed',
                'results guaranteed',
                'performance guaranteed',
                'outcome guaranteed',
                'guaranteed approval',
                'guaranteed acceptance',
                'everyone qualifies',
                'no one rejected',
                'automatic approval',
                'instant approval guaranteed',
                'pre-approved',
                'blanket approval',
                'universal qualification',
                'no exceptions',
                'guaranteed delivery',
                'guaranteed uptime',
                'zero downtime',
                'perfect record',
                'flawless performance',
                'error-free',
                'bug-free',
                'problem-free'
            ],
            pressure: [
                'limited time only',
                'act now',
                'expires today',
                'expires tonight',
                'expires in 24 hours',
                'last chance',
                'final opportunity',
                'ending soon',
                'about to expire',
                'only X spots left',
                'only X remaining',
                'almost sold out',
                'nearly gone',
                'running out',
                'don\'t miss out',
                'before it\'s too late',
                'time is running out',
                'urgent',
                'immediate action required',
                'act immediately',
                'today only',
                'this week only',
                'flash sale',
                'one-time offer',
                'never to be repeated',
                'once in a lifetime',
                'exclusive window',
                'closing soon',
                'deadline approaching',
                'final hours',
                'final day',
                'last day',
                'doors closing',
                'registration closing',
                'offer expires',
                'price going up',
                'rates increasing',
                'early bird ending',
                'special pricing ending',
                'discount expiring'
            ],
            legal: [
                'legally guaranteed',
                'legally required',
                'legally binding guarantee',
                'court approved',
                'judge approved',
                'government mandated',
                'government approved',
                'government endorsed',
                'officially certified',
                'officially approved',
                'regulatory approved',
                'regulator endorsed',
                'compliance guaranteed',
                'audit-proof',
                'lawsuit-proof',
                'litigation-proof',
                'no legal risk',
                'zero liability',
                'liability-free',
                'indemnified',
                'fully compliant',
                'pre-cleared by legal',
                'legally vetted',
                'passes all regulations',
                'exceeds all requirements',
                'above the law',
                'exempt from regulations',
                'regulatory exempt',
                'grandfather clause',
                'legal loophole',
                'legally untouchable',
                'prosecution-proof',
                'investigation-proof',
                'subpoena-proof',
                'legal immunity',
                'blanket protection',
                'universal compliance',
                'globally compliant',
                'internationally approved',
                'treaty protected'
            ]
        };
        
        // Initialize
        async function init() {
            const token = localStorage.getItem('lupo_token');
            const apiKey = localStorage.getItem('lupo_apikey');
            
            if (token) authHeaders['Authorization'] = `Bearer ${token}`;
            if (apiKey) authHeaders['X-API-Key'] = apiKey;
            
            await loadRules();
            
            // Auto-save on changes
            document.getElementById('forbiddenPhrases').addEventListener('input', onTextChange);
            
            updateCount();
        }
        
        function onTextChange() {
            document.getElementById('saveStatus').innerHTML = 
                '<span class="status-dot"></span><span>Unsaved changes</span>';
            document.getElementById('saveStatus').classList.remove('saved');
            
            clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(saveRules, 2000);
            
            updateCount();
        }
        
        function updateCount() {
            const phrases = document.getElementById('forbiddenPhrases').value
                .split('\n')
                .filter(line => line.trim());
            document.getElementById('phraseCount').textContent = `${phrases.length} phrases`;
        }
        
        async function loadRules() {
            try {
                const response = await fetch('/sales/prompts?type=compliance', {
                    headers: authHeaders
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.content) {
                        parseAndDisplay(data.content);
                    }
                }
            } catch (error) {
                console.error('Failed to load:', error);
            }
        }
        
        function parseAndDisplay(content) {
            const phrases = [];
            
            if (typeof content === 'string') {
                const lines = content.split('\n');
                lines.forEach(line => {
                    line = line.trim();
                    if (line.startsWith('•')) {
                        const match = line.match(/•\s*"?([^"]+)"?/);
                        if (match) {
                            phrases.push(match[1]);
                        }
                    } else if (line && !line.startsWith('=') && !line.includes(':') && !line.startsWith('Response') && !line.startsWith('NOTE')) {
                        if (line.length > 2 && line.length < 100) {
                            phrases.push(line);
                        }
                    }
                });
            }
            
            const uniquePhrases = [...new Set(phrases)];
            document.getElementById('forbiddenPhrases').value = uniquePhrases.join('\n');
        }
        
        async function saveRules() {
            const phrases = document.getElementById('forbiddenPhrases').value
                .split('\n')
                .filter(line => line.trim());
            
            let content = 'FORBIDDEN PHRASES:\n==================\n\n';
            phrases.forEach(phrase => {
                content += `• "${phrase}"\n`;
            });
            
            content += '\n\nNOTE: AI generates context-appropriate alternatives in real-time.\n';
            
            try {
                const response = await fetch('/sales/prompts', {
                    method: 'POST',
                    headers: {
                        ...authHeaders,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        type: 'compliance',
                        content: content
                    })
                });
                
                if (response.ok) {
                    document.getElementById('saveStatus').innerHTML = 
                        '<span class="status-dot"></span><span>All changes saved</span>';
                    document.getElementById('saveStatus').classList.add('saved');
                    showToast(`${phrases.length} compliance rules saved`);
                }
            } catch (error) {
                console.error('Save failed:', error);
                showToast('Failed to save', true);
            }
        }
        
        function addCategory(category) {
            const textarea = document.getElementById('forbiddenPhrases');
            const currentPhrases = textarea.value.split('\n').filter(line => line.trim());
            const newPhrases = categories[category] || [];
            
            // Combine with existing, avoiding duplicates
            const combined = new Set(currentPhrases);
            newPhrases.forEach(phrase => combined.add(phrase));
            
            textarea.value = Array.from(combined).join('\n');
            
            onTextChange();
            showToast(`Added ${category} compliance phrases (${newPhrases.length} phrases)`);
        }
        
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const content = e.target.result;
                const textarea = document.getElementById('forbiddenPhrases');
                const currentPhrases = textarea.value.split('\n').filter(line => line.trim());
                
                const newPhrases = content.split('\n')
                    .map(line => line.trim())
                    .filter(line => line && !line.startsWith('#') && !line.startsWith('//'));
                
                const combined = new Set([...currentPhrases, ...newPhrases]);
                textarea.value = Array.from(combined).join('\n');
                
                onTextChange();
                showToast(`Added ${newPhrases.length} phrases`);
            };
            reader.readAsText(file);
        }
        
        function downloadRules() {
            const phrases = document.getElementById('forbiddenPhrases').value;
            
            const content = '# LUPO Compliance Rules\n# Generated: ' + new Date().toISOString() + '\n\n' + phrases;
            
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'lupo-compliance-rules.txt';
            a.click();
        }
        
        function clearAll() {
            if (confirm('Clear all compliance rules? This cannot be undone.')) {
                document.getElementById('forbiddenPhrases').value = '';
                onTextChange();
            }
        }
        
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        // Start
        init();
    </script>
</body>
</html>
