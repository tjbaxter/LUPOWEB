<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to LUPO Pro!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f7;
            --accent: #0071e3;
            --border: rgba(0, 0, 0, 0.08);
            --success: #34c759;
        }
        
        @media (prefers-color-scheme: dark) {
            :root {
                --text-primary: #f5f5f7;
                --text-secondary: #a1a1a6;
                --bg-primary: #000000;
                --bg-secondary: #161617;
                --accent: #2997ff;
                --border: rgba(255, 255, 255, 0.08);
                --success: #32d74b;
            }
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.47059;
            font-weight: 400;
            letter-spacing: -0.022em;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .welcome-container {
            text-align: center;
            max-width: 600px;
            width: 100%;
            animation: fadeInUp 0.8s ease forwards;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .success-animation {
            width: 120px;
            height: 120px;
            margin: 0 auto 40px;
            position: relative;
        }
        
        .success-circle {
            width: 120px;
            height: 120px;
            background: var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: scaleIn 0.6s ease forwards;
        }
        
        @keyframes scaleIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .checkmark {
            font-size: 60px;
            color: white;
            animation: fadeIn 0.6s ease 0.3s forwards;
            opacity: 0;
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 16px;
            line-height: 1.1;
        }
        
        .subtitle {
            font-size: 20px;
            color: var(--text-secondary);
            margin-bottom: 40px;
            line-height: 1.4;
        }
        
        .features-unlocked {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 40px;
            text-align: left;
        }
        
        .features-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 17px;
        }
        
        .feature-icon {
            color: var(--success);
            font-size: 20px;
            flex-shrink: 0;
        }
        
        .action-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .primary-btn {
            background: var(--accent);
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            border: none;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        
        .primary-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 24px rgba(0, 113, 227, 0.3);
        }
        
        .secondary-btn {
            background: transparent;
            color: var(--accent);
            padding: 16px 32px;
            border-radius: 12px;
            border: 2px solid var(--accent);
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        
        .secondary-btn:hover {
            background: var(--accent);
            color: white;
        }
        
        .loading-message {
            font-size: 16px;
            color: var(--text-secondary);
            margin-top: 40px;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1000;
        }
        
        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--accent);
            animation: confetti-fall 3s ease-out forwards;
        }
        
        @keyframes confetti-fall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="confetti" id="confetti"></div>
    
    <div class="welcome-container">
        <div class="success-animation">
            <div class="success-circle">
                <div class="checkmark">✓</div>
            </div>
        </div>
        
        <h1>Welcome to LUPO Pro!</h1>
        <p class="subtitle">Your subscription is now active. Get ready for unlimited AI assistance!</p>
        
        <div class="features-unlocked">
            <h3 class="features-title">🚀 You've unlocked:</h3>
            <div class="feature-item">
                <span class="feature-icon">✓</span>
                <span>Unlimited AI requests - no daily limits</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">✓</span>
                <span>Priority processing for faster responses</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">✓</span>
                <span>Access to all AI models</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">✓</span>
                <span>Premium support</span>
            </div>
        </div>
        
        <div class="action-buttons">
            <button class="primary-btn" onclick="openApp()">Open LUPO</button>
            <a href="/dashboard" class="secondary-btn">View Dashboard</a>
        </div>
        
        <p class="loading-message">
            Setting up your Pro account<span class="loading-spinner"></span>
        </p>
    </div>
    
    <script>
        // Create confetti effect
        function createConfetti() {
            const confettiContainer = document.getElementById('confetti');
            const colors = ['#0071e3', '#34c759', '#ff9500', '#af52de', '#ff2d55'];
            
            for (let i = 0; i < 50; i++) {
                const confettiPiece = document.createElement('div');
                confettiPiece.className = 'confetti-piece';
                confettiPiece.style.left = Math.random() * 100 + '%';
                confettiPiece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confettiPiece.style.animationDelay = Math.random() * 3 + 's';
                confettiPiece.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confettiContainer.appendChild(confettiPiece);
            }
            
            // Remove confetti after animation
            setTimeout(() => {
                confettiContainer.remove();
            }, 5000);
        }
        
        // Check session status
        async function checkSession() {
            const urlParams = new URLSearchParams(window.location.search);
            const sessionId = urlParams.get('session_id');
            
            if (sessionId) {
                console.log('Checkout session completed:', sessionId);
                
                // The webhook should have already updated the user's subscription
                // Just ensure we have the latest token
                const token = localStorage.getItem('lupo_session');
                
                if (token) {
                    // Refresh user data
                    try {
                        const response = await fetch('https://lupo-backend.fly.dev/auth/me', {
                            headers: {
                                'Authorization': `Bearer ${token}`
                            }
                        });
                        
                        if (response.ok) {
                            const data = await response.json();
                            localStorage.setItem('lupo_user', JSON.stringify(data.user));
                            console.log('User data refreshed:', data.user);
                        }
                    } catch (err) {
                        console.error('Failed to refresh user data:', err);
                    }
                }
            }
        }
        
        function openApp() {
            const token = localStorage.getItem('lupo_session');
            const user = localStorage.getItem('lupo_user');
            
            if (token && user) {
                try {
                    const userData = JSON.parse(user);
                    
                    // Create auth data
                    const authData = {
                        token: token,
                        user: {
                            email: userData.email,
                            name: userData.name,
                            tier: 'pro', // They just upgraded!
                            usage: { daily: 0 }
                        },
                        timestamp: Date.now()
                    };
                    
                    // Encode the data
                    const encodedData = btoa(JSON.stringify(authData));
                    
                    // Copy to clipboard for the app
                    const clipboardData = `LUPO_AUTH:${encodedData}`;
                    navigator.clipboard.writeText(clipboardData).then(() => {
                        console.log('Auth data copied to clipboard');
                    }).catch(err => {
                        console.error('Failed to copy auth data:', err);
                    });
                    
                    // Try to open the app
                    setTimeout(() => {
                        const deepLink = `lupo://authenticate?data=${encodedData}`;
                        window.location.href = deepLink;
                        
                        // Show additional instructions after a delay
                        setTimeout(() => {
                            const loadingMessage = document.querySelector('.loading-message');
                            loadingMessage.innerHTML = `
                                If LUPO doesn't open automatically, 
                                <a href="#" onclick="location.reload()" style="color: var(--accent);">click here</a> 
                                or open it manually from your Applications folder.
                            `;
                        }, 3000);
                    }, 500);
                    
                } catch (err) {
                    console.error('Failed to prepare auth data:', err);
                    alert('There was an error opening LUPO. Please open it manually from your Applications folder.');
                }
            } else {
                // No auth data - redirect to login
                window.location.href = '/login.html?redirect=welcome';
            }
        }
        
        // Initialize
        createConfetti();
        checkSession();
    </script>
</body>
</html>
