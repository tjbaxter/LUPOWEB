<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password – LUPO Client Portal</title>
    <link rel="icon" type="image/png" href="/lupo-head-logo copy.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --text-primary: #f5f5f7;
            --text-secondary: #a1a1a6;
            --bg-primary: #000000;
            --bg-secondary: #161617;
            --accent: #2997ff;
            --accent-hover: #409cff;
            --border: rgba(255, 255, 255, 0.08);
            --error: #ff3b30;
            --warning: #ff9500;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        
        .container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }
        
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 40px;
        }
        
        .warning-banner {
            background: rgba(255, 149, 0, 0.1);
            border: 1px solid rgba(255, 149, 0, 0.3);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .warning-banner svg {
            width: 24px;
            height: 24px;
            color: var(--warning);
            flex-shrink: 0;
        }
        
        .warning-banner p {
            font-size: 14px;
            color: var(--text-secondary);
            margin: 0;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-primary);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 16px;
            font-family: inherit;
            transition: all 0.2s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(41, 151, 255, 0.03);
            box-shadow: 0 0 0 4px rgba(41, 151, 255, 0.08);
        }
        
        .password-requirements {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
            line-height: 1.6;
        }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }
        
        .submit-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }
        
        .submit-btn:disabled {
            background: var(--text-secondary);
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            display: none;
            padding: 12px 16px;
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid rgba(255, 59, 48, 0.3);
            border-radius: 10px;
            color: var(--error);
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .error-message.active {
            display: block;
        }
        
        .skip-link {
            text-align: center;
            margin-top: 16px;
        }
        
        .skip-link a {
            font-size: 14px;
            color: var(--text-secondary);
            text-decoration: none;
        }
        
        .skip-link a:hover {
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="warning-banner">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                    <line x1="12" y1="9" x2="12" y2="13"/>
                    <line x1="12" y1="17" x2="12.01" y2="17"/>
                </svg>
                <p>You're using a temporary password. Please create a new secure password.</p>
            </div>
            
            <h1>Change Password</h1>
            <p class="subtitle">Choose a strong password to secure your account</p>
            
            <div class="error-message" id="errorMessage"></div>
            
            <form id="changePasswordForm">
                <div class="form-group">
                    <label class="form-label" for="newPassword">New Password</label>
                    <input 
                        type="password" 
                        id="newPassword" 
                        class="form-input" 
                        placeholder="••••••••"
                        required 
                    />
                    <div class="password-requirements">
                        Must be at least 8 characters long
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        class="form-input" 
                        placeholder="••••••••"
                        required 
                    />
                </div>
                
                <button type="submit" class="submit-btn" id="submitBtn">
                    Update Password
                </button>
            </form>
            
            <div class="skip-link">
                <a href="/portal/dashboard.html">Skip for now</a>
            </div>
        </div>
    </div>
    
    <script>
        // Check if user is logged in
        const token = localStorage.getItem('lupo_token');
        
        if (!token) {
            window.location.href = '/login.html';
        }
        
        // Determine API URL
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:3000'
            : 'https://api.lupo.ai';
        
        document.getElementById('changePasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const errorMessage = document.getElementById('errorMessage');
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Hide previous errors
            errorMessage.classList.remove('active');
            
            // Validate passwords match
            if (newPassword !== confirmPassword) {
                errorMessage.textContent = 'Passwords do not match';
                errorMessage.classList.add('active');
                return;
            }
            
            // Validate password length
            if (newPassword.length < 8) {
                errorMessage.textContent = 'Password must be at least 8 characters long';
                errorMessage.classList.add('active');
                return;
            }
            
            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Updating...';
            
            try {
                // TODO: Implement password change endpoint
                // For now, just simulate success
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                submitBtn.textContent = '✓ Password Updated!';
                
                setTimeout(() => {
                    window.location.href = '/portal/dashboard.html';
                }, 1000);
                
                /* When backend is ready:
                const response = await fetch(`${API_URL}/v1/auth/change-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ newPassword })
                });
                
                if (response.ok) {
                    submitBtn.textContent = '✓ Password Updated!';
                    setTimeout(() => {
                        window.location.href = '/portal/dashboard.html';
                    }, 1000);
                } else {
                    const error = await response.json();
                    errorMessage.textContent = error.error || 'Failed to update password';
                    errorMessage.classList.add('active');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Update Password';
                }
                */
            } catch (error) {
                console.error('Password change error:', error);
                errorMessage.textContent = 'Connection error. Please try again.';
                errorMessage.classList.add('active');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Update Password';
            }
        });
        
        // Floating particles effect (blue orbs)
        function createParticle() {
            const particle = document.createElement('div');
            particle.style.cssText = `
                position: fixed;
                width: ${Math.random() * 4 + 2}px;
                height: ${Math.random() * 4 + 2}px;
                background: var(--accent);
                border-radius: 50%;
                pointer-events: none;
                z-index: 0;
                opacity: ${Math.random() * 0.4 + 0.1};
                box-shadow: 0 0 ${Math.random() * 10 + 5}px var(--accent);
            `;
            
            const startX = Math.random() * window.innerWidth;
            const startY = window.innerHeight + 10;
            
            particle.style.left = startX + 'px';
            particle.style.top = startY + 'px';
            
            document.body.appendChild(particle);
            
            const duration = Math.random() * 20000 + 10000;
            const horizontalMovement = (Math.random() - 0.5) * 100;
            
            particle.animate([
                { transform: `translate(0, 0)`, opacity: 0 },
                { transform: `translate(${horizontalMovement}px, -${window.innerHeight + 20}px)`, opacity: particle.style.opacity },
                { transform: `translate(${horizontalMovement * 2}px, -${window.innerHeight * 2}px)`, opacity: 0 }
            ], {
                duration: duration,
                easing: 'linear'
            }).onfinish = () => particle.remove();
        }
        
        // Start particle animation
        setInterval(createParticle, 1000);
    </script>
</body>
</html>
