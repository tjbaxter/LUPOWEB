<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – LUPO</title>
    <link rel="icon" type="image/png" href="/lupo-head-logo copy.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --text-primary: #f5f5f7;
            --text-secondary: #a1a1a6;
            --bg-primary: #000000;
            --bg-secondary: #161617;
            --accent: #2997ff;
            --accent-hover: #409cff;
            --border: rgba(255, 255, 255, 0.08);
            --success: #34c759;
            --warning: #ff9500;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.47059;
            font-weight: 400;
            letter-spacing: -0.022em;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
        }
        
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            opacity: 0.03;
            background: radial-gradient(circle at 20% 50%, var(--accent) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, #764ba2 0%, transparent 50%),
                        radial-gradient(circle at 40% 20%, #667eea 0%, transparent 50%);
            animation: bgShift 30s ease-in-out infinite;
        }
        
        @keyframes bgShift {
            0%, 100% { transform: rotate(0deg) scale(1); }
            33% { transform: rotate(120deg) scale(1.1); }
            66% { transform: rotate(240deg) scale(0.9); }
        }
        
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            background: rgba(0, 0, 0, 0.72);
            border-bottom: 1px solid var(--border);
        }
        
        .nav-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            font-size: 21px;
            font-weight: 600;
            letter-spacing: 0.2px;
            text-decoration: none;
            color: var(--text-primary);
        }
        
        .nav-links {
            display: flex;
            align-items: center;
            gap: 40px;
        }
        
        .nav-link {
            font-size: 14px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s ease;
            position: relative;
            font-weight: 500;
        }
        
        .nav-link:hover,
        .nav-link.active {
            color: var(--text-primary);
        }
        
        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
        }
        
        .nav-user {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .user-menu {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .user-menu:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            color: white;
        }
        
        .main-content {
            margin-top: 60px;
            padding: 48px 24px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .page-header {
            margin-bottom: 48px;
        }
        
        .page-title {
            font-size: 40px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.03em;
        }
        
        .page-subtitle {
            font-size: 17px;
            color: var(--text-secondary);
            font-weight: 400;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 24px;
            margin-bottom: 56px;
        }
        
        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .stat-card:hover {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }
        
        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }
        
        .stat-value {
            font-size: 42px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }
        
        .stat-change {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .stat-change.positive {
            color: var(--success);
        }
        
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        
        .section-title {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }
        
        .view-all-link {
            font-size: 15px;
            color: var(--accent);
            text-decoration: none;
            transition: color 0.2s ease;
            font-weight: 500;
        }
        
        .view-all-link:hover {
            color: var(--accent-hover);
        }
        
        .calls-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .call-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        
        .call-card:hover {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }
        
        .call-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        
        .call-info {
            flex: 1;
        }
        
        .call-prospect {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: -0.01em;
        }
        
        .call-meta {
            font-size: 14px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .call-summary {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .call-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .call-status {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .status-badge.qualified {
            background: rgba(52, 199, 89, 0.1);
            color: var(--success);
            border: 1px solid rgba(52, 199, 89, 0.2);
        }
        
        .status-badge.unqualified {
            background: rgba(255, 149, 0, 0.1);
            color: var(--warning);
            border: 1px solid rgba(255, 149, 0, 0.2);
        }
        
        .status-badge.demo {
            background: rgba(41, 151, 255, 0.1);
            color: var(--accent);
            border: 1px solid rgba(41, 151, 255, 0.2);
        }
        
        .bant-score {
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--accent-hover);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        
        .loading {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }
        
        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }
        
        .empty-state-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        
        @media (max-width: 768px) {
            .nav-links {
                gap: 24px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .main-content {
                padding: 32px 16px;
            }
            
            .page-title {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    
    <nav>
        <div class="nav-content">
            <a href="/portal/dashboard.html" class="logo">LUPO</a>
            <div class="nav-links">
                <a href="/portal/dashboard.html" class="nav-link active">Dashboard</a>
                <a href="/portal/calls.html" class="nav-link">Calls</a>
                <a href="/portal/knowledge.html" class="nav-link">Knowledge</a>
                <a href="/portal/your-agent.html" class="nav-link">Your Agent</a>
                <a href="/portal/integrations.html" class="nav-link">Integrations</a>
                <a href="/portal/settings.html" class="nav-link">Settings</a>
            </div>
            <div class="nav-user">
                <div class="user-menu" onclick="showUserMenu()">
                    <div class="user-avatar" id="userAvatar">U</div>
                    <span id="userName">User</span>
                </div>
            </div>
        </div>
    </nav>
    
    <div class="main-content">
        <div class="page-header">
            <h1 class="page-title">Dashboard</h1>
            <p class="page-subtitle">Welcome back, <span id="userNameHeader">User</span></p>
        </div>
        
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-label">Calls Today</div>
                <div class="stat-value" id="statCalls">-</div>
                <div class="stat-change" id="statCallsChange">Loading...</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-label">Qualified Leads</div>
                <div class="stat-value" id="statQualified">-</div>
                <div class="stat-change" id="statQualifiedChange">Total</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-label">Conversion Rate</div>
                <div class="stat-value" id="statConversion">-</div>
                <div class="stat-change" id="statConversionChange">Percentage</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-label">Demos Booked</div>
                <div class="stat-value" id="statDemos">-</div>
                <div class="stat-change">This month</div>
            </div>
        </div>
        
        <div class="section-header">
            <h2 class="section-title">Recent Calls</h2>
            <a href="/portal/calls.html" class="view-all-link">View All</a>
        </div>
        
        <div id="callsList" class="calls-list">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading calls...</p>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:3000'
            : 'https://lupo-sales-api.fly.dev';
        
        const token = localStorage.getItem('lupo_token');
        const userStr = localStorage.getItem('lupo_user');
        
        if (!token || !userStr) {
            window.location.href = '/login.html';
        }
        
        const user = JSON.parse(userStr);
        
        document.getElementById('userName').textContent = user.email.split('@')[0];
        document.getElementById('userNameHeader').textContent = user.email.split('@')[0];
        document.getElementById('userAvatar').textContent = user.email.charAt(0).toUpperCase();
        
        async function apiRequest(endpoint, options = {}) {
            const response = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`,
                    ...options.headers
                }
            });
            
            if (response.status === 401) {
            localStorage.removeItem('lupo_token');
            localStorage.removeItem('lupo_user');
            window.location.href = '/login.html';
                return;
            }
            
            if (!response.ok) {
                throw new Error(`API Error: ${response.statusText}`);
            }
            
            return response.json();
        }
        
        async function loadDashboard() {
            try {
                const calls = await apiRequest('/v1/calls?limit=50');
                
                let usage = null;
                try {
                    usage = await apiRequest('/v1/billing/usage');
                } catch (e) {
                    console.warn('Could not load usage:', e);
                }
                
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                
                const callsToday = calls.filter(c => {
                    const callDate = new Date(c.startedAt);
                    callDate.setHours(0, 0, 0, 0);
                    return callDate.getTime() === today.getTime();
                });
                
                // Filter calls from this month
                const thisMonth = new Date();
                thisMonth.setDate(1);
                thisMonth.setHours(0, 0, 0, 0);
                
                const callsThisMonth = calls.filter(c => {
                    const callDate = new Date(c.startedAt);
                    return callDate >= thisMonth;
                });
                
                const qualified = calls.filter(c => c.qualified || (c.finalBantScore && c.finalBantScore >= 7));
                const demosBooked = callsThisMonth.filter(c => c.outcome === 'QUALIFIED_MEETING_BOOKED');
                
                const conversion = calls.length > 0 
                    ? Math.round((qualified.length / calls.length) * 100) 
                    : 0;
                
                document.getElementById('statCalls').textContent = callsToday.length;
                document.getElementById('statCallsChange').textContent = 'Today';
                
                document.getElementById('statQualified').textContent = qualified.length;
                document.getElementById('statQualifiedChange').textContent = 'Total qualified';
                
                document.getElementById('statConversion').textContent = conversion + '%';
                document.getElementById('statConversionChange').textContent = 'Qualification rate';
                
                document.getElementById('statDemos').textContent = demosBooked.length;
                
                renderCalls(calls.slice(0, 5));
                
            } catch (error) {
                console.error('Error loading dashboard:', error);
                document.getElementById('callsList').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-title">Failed to load calls</div>
                        <p>Please refresh the page or contact support if the issue persists.</p>
                    </div>
                `;
            }
        }
        
        function renderCalls(calls) {
            const callsList = document.getElementById('callsList');
            
            if (calls.length === 0) {
                callsList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-title">No calls yet</div>
                        <p>Calls will appear here once your AI agent starts receiving them.</p>
                    </div>
                `;
                return;
            }
            
            callsList.innerHTML = calls.map(call => {
                const isQualified = call.qualified || (call.finalBantScore && call.finalBantScore >= 7);
                const hasDemo = call.outcome === 'QUALIFIED_MEETING_BOOKED';
                const callDate = new Date(call.startedAt);
                const duration = call.durationSeconds 
                    ? `${Math.floor(call.durationSeconds / 60)}:${String(call.durationSeconds % 60).padStart(2, '0')}`
                    : 'N/A';
                
                return `
                    <div class="call-card" onclick="viewCall('${call.id}')">
                        <div class="call-header">
                            <div class="call-info">
                                <div class="call-prospect">${call.callerNumber || 'Unknown Caller'}</div>
                                <div class="call-meta">
                                    <span>${formatDate(callDate)}</span>
                                    <span>•</span>
                                    <span>${duration}</span>
                                </div>
                            </div>
                        </div>
                        ${call.metadata && call.metadata.summary 
                            ? `<div class="call-summary">${call.metadata.summary}</div>` 
                            : ''
                        }
                        <div class="call-footer">
                            <div class="call-status">
                                ${isQualified 
                                    ? '<span class="status-badge qualified">Qualified</span>' 
                                    : '<span class="status-badge unqualified">Unqualified</span>'
                                }
                                ${hasDemo 
                                    ? '<span class="status-badge demo">Demo Booked</span>' 
                                    : ''
                                }
                                ${call.finalBantScore 
                                    ? `<span class="bant-score">BANT: ${call.finalBantScore}/10</span>` 
                                    : ''
                                }
                            </div>
                            <button class="btn btn-primary" onclick="event.stopPropagation(); viewCall('${call.id}')">
                                View Details
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function formatDate(date) {
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            
            if (minutes < 1) return 'Just now';
            if (minutes < 60) return `${minutes}m ago`;
            if (hours < 24) return `${hours}h ago`;
            if (days < 7) return `${days}d ago`;
            
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: date.getFullYear() !== now.getFullYear() ? 'numeric' : undefined });
        }
        
        function viewCall(callId) {
            window.location.href = `/portal/call-detail.html?id=${callId}`;
        }
        
        function showUserMenu() {
            if (confirm('Do you want to logout?')) {
                localStorage.removeItem('lupo_token');
                localStorage.removeItem('lupo_user');
                window.location.href = '/login.html';
            }
        }
        
        loadDashboard();
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
