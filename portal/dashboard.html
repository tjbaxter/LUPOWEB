<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – LUPO Client Portal</title>
    <link rel="icon" type="image/png" href="/lupo-head-logo copy.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --text-primary: #f5f5f7;
            --text-secondary: #a1a1a6;
            --bg-primary: #000000;
            --bg-secondary: #161617;
            --accent: #2997ff;
            --border: rgba(255, 255, 255, 0.08);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        
        .container {
            text-align: center;
            padding: 40px;
        }
        
        h1 {
            font-size: 48px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--accent) 0%, #667eea 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        p {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }
        
        .user-info {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin: 32px auto;
            max-width: 500px;
            text-align: left;
        }
        
        .user-info h3 {
            margin-bottom: 16px;
            font-size: 20px;
        }
        
        .user-info p {
            margin: 8px 0;
            font-size: 14px;
        }
        
        .logout-btn {
            padding: 12px 24px;
            background: rgba(255, 59, 48, 0.1);
            color: #ff3b30;
            border: 1px solid rgba(255, 59, 48, 0.3);
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .logout-btn:hover {
            background: rgba(255, 59, 48, 0.15);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Welcome to LUPO!</h1>
        <p>Your dashboard is under construction.</p>
        
        <div class="user-info" id="userInfo">
            <h3>Your Account</h3>
            <p><strong>Email:</strong> <span id="userEmail">Loading...</span></p>
            <p><strong>Role:</strong> <span id="userRole">Loading...</span></p>
            <p><strong>Tenant:</strong> <span id="tenantName">Loading...</span></p>
        </div>
        
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    
    <script>
        // Check if user is logged in
        const token = localStorage.getItem('lupo_token');
        const userStr = localStorage.getItem('lupo_user');
        
        if (!token || !userStr) {
            // Redirect to login
            window.location.href = '/login.html';
        } else {
            // Display user info
            const user = JSON.parse(userStr);
            document.getElementById('userEmail').textContent = user.email;
            document.getElementById('userRole').textContent = user.role;
            document.getElementById('tenantName').textContent = user.tenant.name;
        }
        
        function logout() {
            localStorage.removeItem('lupo_token');
            localStorage.removeItem('lupo_user');
            window.location.href = '/login.html';
        }
        
        // Floating particles effect (blue orbs)
        function createParticle() {
            const particle = document.createElement('div');
            particle.style.cssText = `
                position: fixed;
                width: ${Math.random() * 4 + 2}px;
                height: ${Math.random() * 4 + 2}px;
                background: var(--accent);
                border-radius: 50%;
                pointer-events: none;
                z-index: 0;
                opacity: ${Math.random() * 0.4 + 0.1};
                box-shadow: 0 0 ${Math.random() * 10 + 5}px var(--accent);
            `;
            
            const startX = Math.random() * window.innerWidth;
            const startY = window.innerHeight + 10;
            
            particle.style.left = startX + 'px';
            particle.style.top = startY + 'px';
            
            document.body.appendChild(particle);
            
            const duration = Math.random() * 20000 + 10000;
            const horizontalMovement = (Math.random() - 0.5) * 100;
            
            particle.animate([
                { transform: `translate(0, 0)`, opacity: 0 },
                { transform: `translate(${horizontalMovement}px, -${window.innerHeight + 20}px)`, opacity: particle.style.opacity },
                { transform: `translate(${horizontalMovement * 2}px, -${window.innerHeight * 2}px)`, opacity: 0 }
            ], {
                duration: duration,
                easing: 'linear'
            }).onfinish = () => particle.remove();
        }
        
        // Start particle animation
        setInterval(createParticle, 1000);
    </script>
</body>
</html>
