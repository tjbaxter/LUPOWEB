<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calls – LUPO</title>
    <link rel="icon" type="image/png" href="/lupo-head-logo copy.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --text-primary: #f5f5f7;
            --text-secondary: #a1a1a6;
            --bg-primary: #000000;
            --bg-secondary: #161617;
            --accent: #2997ff;
            --accent-hover: #409cff;
            --border: rgba(255, 255, 255, 0.08);
            --success: #34c759;
            --warning: #ff9500;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.47059;
            font-weight: 400;
            letter-spacing: -0.022em;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
        }
        
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            opacity: 0.03;
            background: radial-gradient(circle at 20% 50%, var(--accent) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, #764ba2 0%, transparent 50%),
                        radial-gradient(circle at 40% 20%, #667eea 0%, transparent 50%);
            animation: bgShift 30s ease-in-out infinite;
        }
        
        @keyframes bgShift {
            0%, 100% { transform: rotate(0deg) scale(1); }
            33% { transform: rotate(120deg) scale(1.1); }
            66% { transform: rotate(240deg) scale(0.9); }
        }
        
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            background: rgba(0, 0, 0, 0.72);
            border-bottom: 1px solid var(--border);
        }
        
        .nav-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            font-size: 21px;
            font-weight: 600;
            letter-spacing: 0.2px;
            text-decoration: none;
            color: var(--text-primary);
        }
        
        .nav-links {
            display: flex;
            align-items: center;
            gap: 40px;
        }
        
        .nav-link {
            font-size: 14px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s ease;
            position: relative;
            font-weight: 500;
        }
        
        .nav-link:hover,
        .nav-link.active {
            color: var(--text-primary);
        }
        
        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
        }
        
        .nav-user {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .user-menu {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .user-menu:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            color: white;
        }
        
        .main-content {
            margin-top: 60px;
            padding: 48px 24px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .page-header {
            margin-bottom: 32px;
        }
        
        .page-title {
            font-size: 40px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.03em;
        }
        
        .filters {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }
        
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .filter-label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .filter-input,
        .filter-select {
            padding: 10px 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s ease;
        }
        
        .filter-input:focus,
        .filter-select:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(41, 151, 255, 0.03);
        }
        
        .calls-table {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }
        
        .table-header {
            display: grid;
            grid-template-columns: 120px 1fr 100px 120px 140px 100px;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--border);
        }
        
        .table-header-cell {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .table-row {
            display: grid;
            grid-template-columns: 120px 1fr 100px 120px 140px 100px;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            transition: all 0.2s ease;
            cursor: pointer;
        }
        
        .table-row:last-child {
            border-bottom: none;
        }
        
        .table-row:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        
        .table-cell {
            display: flex;
            align-items: center;
            font-size: 15px;
        }
        
        .call-time {
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
        }
        
        .time-primary {
            font-weight: 500;
        }
        
        .time-secondary {
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .caller-info {
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
        }
        
        .caller-name {
            font-weight: 500;
        }
        
        .caller-company {
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .status-badge.qualified {
            background: rgba(52, 199, 89, 0.1);
            color: var(--success);
            border: 1px solid rgba(52, 199, 89, 0.2);
        }
        
        .status-badge.unqualified {
            background: rgba(255, 149, 0, 0.1);
            color: var(--warning);
            border: 1px solid rgba(255, 149, 0, 0.2);
        }
        
        .status-badge.demo {
            background: rgba(41, 151, 255, 0.1);
            color: var(--accent);
            border: 1px solid rgba(41, 151, 255, 0.2);
        }
        
        .btn-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s ease;
        }
        
        .btn-link:hover {
            color: var(--accent-hover);
        }
        
        .loading {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }
        
        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }
        
        .empty-state-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        
        @media (max-width: 1024px) {
            .table-header,
            .table-row {
                grid-template-columns: 100px 1fr 80px 100px 120px 80px;
            }
        }
        
        @media (max-width: 768px) {
            .filters {
                grid-template-columns: 1fr;
            }
            
            .calls-table {
                overflow-x: auto;
            }
            
            .table-header,
            .table-row {
                grid-template-columns: 200px 200px 150px 150px 150px 100px;
                min-width: 950px;
            }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    
    <nav>
        <div class="nav-content">
            <a href="/portal/dashboard.html" class="logo">LUPO</a>
            <div class="nav-links">
                <a href="/portal/dashboard.html" class="nav-link">Dashboard</a>
                <a href="/portal/calls.html" class="nav-link active">Calls</a>
                <a href="/portal/knowledge.html" class="nav-link">Knowledge</a>
                <a href="/portal/settings.html" class="nav-link">Settings</a>
            </div>
            <div class="nav-user">
                <div class="user-menu" onclick="showUserMenu()">
                    <div class="user-avatar" id="userAvatar">U</div>
                    <span id="userName">User</span>
                </div>
            </div>
        </div>
    </nav>
    
    <div class="main-content">
        <div class="page-header">
            <h1 class="page-title">Calls</h1>
        </div>
        
        <div class="filters">
            <div class="filter-group">
                <label class="filter-label">Date Range</label>
                <select class="filter-select" id="dateRange" onchange="applyFilters()">
                    <option value="all">All Time</option>
                    <option value="today">Today</option>
                    <option value="7days">Last 7 Days</option>
                    <option value="30days">Last 30 Days</option>
                </select>
            </div>
            <div class="filter-group">
                <label class="filter-label">Outcome</label>
                <select class="filter-select" id="outcomeFilter" onchange="applyFilters()">
                    <option value="all">All Calls</option>
                    <option value="qualified">Qualified</option>
                    <option value="unqualified">Unqualified</option>
                </select>
            </div>
            <div class="filter-group">
                <label class="filter-label">Search</label>
                <input type="text" class="filter-input" id="searchInput" placeholder="Search caller, company..." onkeyup="applyFilters()">
            </div>
        </div>
        
        <div class="calls-table" id="callsTable">
            <div class="table-header">
                <div class="table-header-cell">Time</div>
                <div class="table-header-cell">Caller</div>
                <div class="table-header-cell">Duration</div>
                <div class="table-header-cell">Outcome</div>
                <div class="table-header-cell">Demo</div>
                <div class="table-header-cell">Actions</div>
            </div>
            <div id="callsList">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>Loading calls...</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:3000'
            : 'https://lupo-sales-api.fly.dev';
        
        const token = localStorage.getItem('lupo_token');
        const userStr = localStorage.getItem('lupo_user');
        
        if (!token || !userStr) {
            window.location.href = '/login.html';
        }
        
        const user = JSON.parse(userStr);
        document.getElementById('userName').textContent = user.email.split('@')[0];
        document.getElementById('userAvatar').textContent = user.email.charAt(0).toUpperCase();
        
        let allCalls = [];
        
        async function apiRequest(endpoint, options = {}) {
            const response = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`,
                    ...options.headers
                }
            });
            
            if (response.status === 401) {
                localStorage.removeItem('lupo_token');
                localStorage.removeItem('lupo_user');
                window.location.href = '/login.html';
                return;
            }
            
            if (!response.ok) {
                throw new Error(`API Error: ${response.statusText}`);
            }
            
            return response.json();
        }
        
        async function loadCalls() {
            try {
                allCalls = await apiRequest('/v1/calls?limit=100');
                applyFilters();
            } catch (error) {
                console.error('Error loading calls:', error);
                document.getElementById('callsList').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-title">Failed to load calls</div>
                        <p>Please refresh the page or contact support if the issue persists.</p>
                    </div>
                `;
            }
        }
        
        function applyFilters() {
            const dateRange = document.getElementById('dateRange').value;
            const outcomeFilter = document.getElementById('outcomeFilter').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = [...allCalls];
            
            // Date filter
            if (dateRange !== 'all') {
                const now = new Date();
                const filterDate = new Date();
                
                if (dateRange === 'today') {
                    filterDate.setHours(0, 0, 0, 0);
                } else if (dateRange === '7days') {
                    filterDate.setDate(filterDate.getDate() - 7);
                } else if (dateRange === '30days') {
                    filterDate.setDate(filterDate.getDate() - 30);
                }
                
                filtered = filtered.filter(call => {
                    const callDate = new Date(call.startedAt);
                    return callDate >= filterDate;
                });
            }
            
            // Outcome filter
            if (outcomeFilter !== 'all') {
                filtered = filtered.filter(call => {
                    const isQualified = call.qualified || (call.finalBantScore && call.finalBantScore >= 7);
                    return outcomeFilter === 'qualified' ? isQualified : !isQualified;
                });
            }
            
            // Search filter
            if (searchTerm) {
                filtered = filtered.filter(call => {
                    const caller = (call.callerNumber || '').toLowerCase();
                    const company = (call.metadata?.company || '').toLowerCase();
                    return caller.includes(searchTerm) || company.includes(searchTerm);
                });
            }
            
            renderCalls(filtered);
        }
        
        function renderCalls(calls) {
            const callsList = document.getElementById('callsList');
            
            if (calls.length === 0) {
                callsList.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1; padding: 60px 20px;">
                        <div class="empty-state-title">No calls found</div>
                        <p>Try adjusting your filters.</p>
                    </div>
                `;
                return;
            }
            
            callsList.innerHTML = calls.map(call => {
                const callDate = new Date(call.startedAt);
                const duration = call.durationSeconds 
                    ? `${Math.floor(call.durationSeconds / 60)}:${String(call.durationSeconds % 60).padStart(2, '0')}`
                    : 'N/A';
                const isQualified = call.qualified || (call.finalBantScore && call.finalBantScore >= 7);
                const hasDemo = call.outcome === 'QUALIFIED_MEETING_BOOKED';
                
                return `
                    <div class="table-row" onclick="viewCall('${call.id}')">
                        <div class="table-cell call-time">
                            <span class="time-primary">${formatTime(callDate)}</span>
                            <span class="time-secondary">${formatDateShort(callDate)}</span>
                        </div>
                        <div class="table-cell caller-info">
                            <span class="caller-name">${call.callerNumber || 'Unknown'}</span>
                            <span class="caller-company">${call.metadata?.company || 'No company'}</span>
                        </div>
                        <div class="table-cell">${duration}</div>
                        <div class="table-cell">
                            ${isQualified 
                                ? '<span class="status-badge qualified">Qualified</span>' 
                                : '<span class="status-badge unqualified">Unqualified</span>'
                            }
                        </div>
                        <div class="table-cell">
                            ${hasDemo && call.endedAt
                                ? `<span class="status-badge demo">Booked</span>`
                                : '<span style="color: var(--text-secondary);">-</span>'
                            }
                        </div>
                        <div class="table-cell">
                            <a href="/portal/call-detail.html?id=${call.id}" class="btn-link" onclick="event.stopPropagation()">View</a>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function formatTime(date) {
            return date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
        }
        
        function formatDateShort(date) {
            const now = new Date();
            const diff = now - date;
            const days = Math.floor(diff / 86400000);
            
            if (days === 0) return 'Today';
            if (days === 1) return 'Yesterday';
            if (days < 7) return `${days}d ago`;
            
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }
        
        function viewCall(callId) {
            window.location.href = `/portal/call-detail.html?id=${callId}`;
        }
        
        function showUserMenu() {
            if (confirm('Do you want to logout?')) {
                localStorage.removeItem('lupo_token');
                localStorage.removeItem('lupo_user');
                window.location.href = '/login.html';
            }
        }
        
        loadCalls();
    </script>
</body>
</html>
