<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motherboard – LUPO Admin</title>
    <link rel="icon" type="image/png" href="/lupo-head-logo copy.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: #000000;
            color: #f5f5f7;
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Subtle gradient background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 24px;
            position: relative;
            z-index: 1;
        }
        
        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 48px;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        
        .logo {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
        }
        
        .user-name {
            font-size: 14px;
            color: #a1a1aa;
        }
        
        .btn-logout {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.2);
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 48px;
        }
        
        .stat-card {
            background: rgba(39, 39, 42, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 28px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .stat-card:hover {
            border-color: rgba(99, 102, 241, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .stat-label {
            font-size: 13px;
            color: #a1a1aa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: 600;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #f5f5f7 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stat-change {
            font-size: 13px;
            color: #10b981;
            margin-top: 8px;
        }
        
        .stat-change.negative {
            color: #ef4444;
        }
        
        /* Section Header */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .section-title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }
        
        /* Clients Table */
        .clients-container {
            background: rgba(39, 39, 42, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            overflow: hidden;
        }
        
        .clients-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .clients-table thead {
            background: rgba(24, 24, 27, 0.5);
        }
        
        .clients-table th {
            padding: 20px 24px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: #a1a1aa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        
        .clients-table td {
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 14px;
        }
        
        .clients-table tbody tr {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        
        .clients-table tbody tr:hover {
            background: rgba(99, 102, 241, 0.05);
        }
        
        .company-name {
            font-weight: 500;
            color: #f5f5f7;
        }
        
        .company-phone {
            font-size: 13px;
            color: #71717a;
            margin-top: 4px;
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-badge.active {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }
        
        .status-badge.overdue {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }
        
        .status-badge.pending {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .btn-view {
            background: rgba(99, 102, 241, 0.1);
            color: #818cf8;
            border: 1px solid rgba(99, 102, 241, 0.2);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn-view:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.4);
        }
        
        /* Loading State */
        .loading-skeleton {
            background: linear-gradient(90deg, rgba(39, 39, 42, 0.5) 25%, rgba(60, 60, 67, 0.5) 50%, rgba(39, 39, 42, 0.5) 75%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
            border-radius: 8px;
            height: 20px;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .clients-table {
                display: block;
                overflow-x: auto;
            }
            
            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }
            
            .btn-primary {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    
    <div class="container">
        <header>
            <div class="logo">🎛️ LUPO Motherboard</div>
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">TB</div>
                <div class="user-name" id="userName">Tom Baxter</div>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </header>
        
        <!-- Stats Overview -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total MRR</div>
                <div class="stat-value" id="totalMrr">$0</div>
                <div class="stat-change" id="mrrChange">Loading...</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-label">Active Clients</div>
                <div class="stat-value" id="totalClients">0</div>
                <div class="stat-change" id="clientsChange">Loading...</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-label">Total Calls</div>
                <div class="stat-value" id="totalCalls">0</div>
                <div class="stat-change" id="callsChange">Loading...</div>
            </div>
        </div>
        
        <!-- Clients Table -->
        <div class="section-header">
            <h2 class="section-title">Clients</h2>
            <button class="btn-primary" onclick="addNewClient()">+ Add New Client</button>
        </div>
        
        <div class="clients-container">
            <table class="clients-table">
                <thead>
                    <tr>
                        <th>Company</th>
                        <th>MRR</th>
                        <th>Calls</th>
                        <th>Dispatches</th>
                        <th>Status</th>
                        <th>Next Payment</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="clientsTableBody">
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 60px; color: #71717a;">
                            Loading clients...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        // Determine API URL
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:3000'
            : 'https://lupo-sales-api.fly.dev';
        
        // Check authentication and admin role
        async function checkAuth() {
            const token = localStorage.getItem('lupo_token');
            const user = JSON.parse(localStorage.getItem('lupo_user') || '{}');
            
            if (!token || user.role !== 'ADMIN') {
                window.location.href = '/login.html';
                return false;
            }
            
            // Update user display
            document.getElementById('userName').textContent = user.email || 'Admin';
            const initials = (user.email || 'A').substring(0, 2).toUpperCase();
            document.getElementById('userAvatar').textContent = initials;
            
            return true;
        }
        
        // Load overview stats
        async function loadOverviewStats() {
            try {
                const token = localStorage.getItem('lupo_token');
                const response = await fetch(`${API_URL}/v1/admin/overview`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (!response.ok) throw new Error('Failed to load stats');
                
                const stats = await response.json();
                
                // Update stats
                document.getElementById('totalMrr').textContent = `$${stats.totalMrr.toLocaleString()}`;
                document.getElementById('totalClients').textContent = stats.totalClients;
                document.getElementById('totalCalls').textContent = stats.totalCalls.toLocaleString();
                
                // Update changes
                document.getElementById('mrrChange').textContent = stats.mrrChange > 0 
                    ? `+$${stats.mrrChange} this month` 
                    : 'No change';
                document.getElementById('clientsChange').textContent = stats.clientsChange > 0 
                    ? `+${stats.clientsChange} this month` 
                    : 'No change';
                document.getElementById('callsChange').textContent = stats.callsChange > 0 
                    ? `+${stats.callsChange} this week` 
                    : 'No change';
                    
            } catch (error) {
                console.error('Failed to load overview:', error);
                // Show sample data
                document.getElementById('totalMrr').textContent = '$2,400';
                document.getElementById('totalClients').textContent = '12';
                document.getElementById('totalCalls').textContent = '1,847';
                document.getElementById('mrrChange').textContent = '+$200 this month';
                document.getElementById('clientsChange').textContent = '+2 this month';
                document.getElementById('callsChange').textContent = '+384 this week';
            }
        }
        
        // Load clients list
        async function loadClients() {
            try {
                const token = localStorage.getItem('lupo_token');
                const response = await fetch(`${API_URL}/v1/admin/clients`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (!response.ok) throw new Error('Failed to load clients');
                
                const clients = await response.json();
                
                const tbody = document.getElementById('clientsTableBody');
                
                if (clients.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="7" style="text-align: center; padding: 60px; color: #71717a;">
                                <div style="font-size: 48px; margin-bottom: 16px; opacity: 0.3;">🏢</div>
                                <div>No clients yet. Add your first client to get started.</div>
                            </td>
                        </tr>
                    `;
                    return;
                }
                
                tbody.innerHTML = clients.map(client => `
                    <tr onclick="viewClient('${client.id || client.slug}')">
                        <td>
                            <div class="company-name">${client.name || 'Unnamed'}</div>
                            <div class="company-phone">${client.phoneNumber || 'No phone'}</div>
                        </td>
                        <td>$${client.mrr || 0}</td>
                        <td>${client.totalCalls || 0}</td>
                        <td>${client.totalDispatches || 0}</td>
                        <td>
                            <span class="status-badge ${client.paymentStatus || 'pending'}">
                                <span class="status-dot"></span>
                                ${(client.paymentStatus || 'pending').charAt(0).toUpperCase() + (client.paymentStatus || 'pending').slice(1)}
                            </span>
                        </td>
                        <td>${client.nextPayment ? new Date(client.nextPayment).toLocaleDateString() : 'N/A'}</td>
                        <td>
                            <button class="btn-view" onclick="event.stopPropagation(); viewClient('${client.id || client.slug}')">
                                View
                            </button>
                        </td>
                    </tr>
                `).join('');
                
            } catch (error) {
                console.error('Failed to load clients:', error);
                // Show sample data for demo
                const tbody = document.getElementById('clientsTableBody');
                tbody.innerHTML = `
                    <tr onclick="viewClient('xantium')">
                        <td>
                            <div class="company-name">Xantium Restoration</div>
                            <div class="company-phone">+1 (833) 354-1310</div>
                        </td>
                        <td>$200</td>
                        <td>145</td>
                        <td>63</td>
                        <td><span class="status-badge active"><span class="status-dot"></span>Active</span></td>
                        <td>Jan 15, 2025</td>
                        <td><button class="btn-view" onclick="event.stopPropagation(); viewClient('xantium')">View</button></td>
                    </tr>
                `;
            }
        }
        
        // Navigate to client detail
        function viewClient(clientId) {
            window.location.href = `/portal/admin/client-detail.html?id=${clientId}`;
        }
        
        // Add new client
        function addNewClient() {
            alert('Add new client functionality coming soon');
        }
        
        // Logout
        function logout() {
            localStorage.removeItem('lupo_token');
            localStorage.removeItem('lupo_user');
            window.location.href = '/login.html';
        }
        
        // Initialize
        (async function init() {
            if (await checkAuth()) {
                await loadOverviewStats();
                await loadClients();
            }
        })();
    </script>
</body>
</html>
