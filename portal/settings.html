<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings – LUPO</title>
    <link rel="icon" type="image/png" href="/lupo-head-logo copy.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --text-primary: #f5f5f7;
            --text-secondary: #a1a1a6;
            --bg-primary: #000000;
            --bg-secondary: #161617;
            --accent: #2997ff;
            --accent-hover: #409cff;
            --border: rgba(255, 255, 255, 0.08);
            --success: #34c759;
            --error: #ff3b30;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.47059;
            font-weight: 400;
            letter-spacing: -0.022em;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
        }
        
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            opacity: 0.03;
            background: radial-gradient(circle at 20% 50%, var(--accent) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, #764ba2 0%, transparent 50%),
                        radial-gradient(circle at 40% 20%, #667eea 0%, transparent 50%);
            animation: bgShift 30s ease-in-out infinite;
        }
        
        @keyframes bgShift {
            0%, 100% { transform: rotate(0deg) scale(1); }
            33% { transform: rotate(120deg) scale(1.1); }
            66% { transform: rotate(240deg) scale(0.9); }
        }
        
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            background: rgba(0, 0, 0, 0.72);
            border-bottom: 1px solid var(--border);
        }
        
        .nav-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            font-size: 21px;
            font-weight: 600;
            letter-spacing: 0.2px;
            text-decoration: none;
            color: var(--text-primary);
        }
        
        .nav-links {
            display: flex;
            align-items: center;
            gap: 40px;
        }
        
        .nav-link {
            font-size: 14px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s ease;
            position: relative;
            font-weight: 500;
        }
        
        .nav-link:hover,
        .nav-link.active {
            color: var(--text-primary);
        }
        
        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
        }
        
        .nav-user {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .user-menu {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .user-menu:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            color: white;
        }
        
        .main-content {
            margin-top: 60px;
            padding: 48px 24px;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .page-title {
            font-size: 40px;
            font-weight: 600;
            margin-bottom: 48px;
            letter-spacing: -0.03em;
        }
        
        .settings-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
        }
        
        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 24px;
            letter-spacing: -0.01em;
        }
        
        .info-list {
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .info-item:last-child {
            border-bottom: none;
        }
        
        .info-content {
            flex: 1;
        }
        
        .info-label {
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .info-value {
            font-size: 16px;
            color: var(--text-primary);
            font-weight: 500;
        }
        
        .info-value-large {
            font-size: 24px;
            font-weight: 600;
        }
        
        .info-description {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--accent-hover);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        
        .btn-outline {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
        }
        
        .btn-outline:hover {
            background: rgba(41, 151, 255, 0.1);
        }
        
        .btn-danger {
            background: transparent;
            color: var(--error);
            border: 1px solid var(--error);
        }
        
        .btn-danger:hover {
            background: rgba(255, 59, 48, 0.1);
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .status-badge.active {
            background: rgba(52, 199, 89, 0.1);
            color: var(--success);
            border: 1px solid rgba(52, 199, 89, 0.2);
        }
        
        .plan-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(41, 151, 255, 0.1);
            color: var(--accent);
            border: 1px solid rgba(41, 151, 255, 0.2);
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }
        
        .danger-zone {
            background: rgba(255, 59, 48, 0.05);
            border-color: rgba(255, 59, 48, 0.2);
        }
        
        .danger-zone .section-title {
            color: var(--error);
        }
        
        .danger-zone .info-description {
            margin-top: 8px;
        }
        
        .loading {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }
        
        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Premium Billing Styles */
        .billing-section {
            padding: 40px;
        }
        
        .billing-plan-card {
            background: linear-gradient(135deg, rgba(41, 151, 255, 0.05) 0%, rgba(41, 151, 255, 0.02) 100%);
            border: 1px solid rgba(41, 151, 255, 0.15);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 32px;
        }
        
        .plan-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }
        
        .plan-price {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }
        
        .plan-period {
            font-size: 16px;
            font-weight: 400;
            color: var(--text-secondary);
            margin-left: 4px;
        }
        
        .enterprise-badge {
            background: linear-gradient(135deg, rgba(41, 151, 255, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
            border-color: rgba(41, 151, 255, 0.3);
            font-size: 13px;
            padding: 8px 16px;
        }
        
        .billing-details {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .billing-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
        }
        
        .billing-label {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
            letter-spacing: -0.01em;
        }
        
        .billing-value {
            font-size: 16px;
            color: var(--text-primary);
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }
        
        .billing-value.total-value {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .billing-value.overage-value {
            color: #ff9500;
        }
        
        .status-paid {
            color: var(--success);
        }
        
        .status-unpaid {
            color: var(--error);
        }
        
        .overage-row {
            background: rgba(255, 149, 0, 0.05);
            margin: 0 -16px;
            padding: 12px 16px;
            border-radius: 8px;
        }
        
        .total-row {
            margin-top: 8px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        
        .billing-divider {
            height: 1px;
            background: var(--border);
            margin: 8px 0;
        }
        
        .billing-actions {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        .payment-method-section {
            padding: 24px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
        }
        
        .payment-method-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .payment-method-value {
            font-size: 15px;
            color: var(--text-primary);
            font-weight: 500;
            font-family: 'SF Mono', 'Monaco', 'Menlo', monospace;
        }
        
        .billing-cycle-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
        }
        
        .btn-small {
            padding: 8px 16px;
            font-size: 13px;
        }
        
        .btn-full {
            width: 100%;
            justify-content: center;
        }
        
        @media (max-width: 768px) {
            .billing-section {
                padding: 24px;
            }
            
            .billing-plan-card {
                padding: 24px;
            }
            
            .plan-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }
            
            .plan-price {
                font-size: 28px;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .action-buttons .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    
    <nav>
        <div class="nav-content">
            <a href="/portal/dashboard.html" class="logo">LUPO</a>
            <div class="nav-links">
                <a href="/portal/dashboard.html" class="nav-link">Dashboard</a>
                <a href="/portal/calls.html" class="nav-link">Calls</a>
                <a href="/portal/knowledge.html" class="nav-link">Knowledge</a>
                <a href="/portal/your-agent.html" class="nav-link">Your Agent</a>
                <a href="/portal/integrations.html" class="nav-link">Integrations</a>
                <a href="/portal/settings.html" class="nav-link active">Settings</a>
            </div>
            <div class="nav-user">
                <div class="user-menu" onclick="showUserMenu()">
                    <div class="user-avatar" id="userAvatar">U</div>
                    <span id="userName">User</span>
                </div>
            </div>
        </div>
    </nav>
    
    <div class="main-content">
        <h1 class="page-title">Settings</h1>
        
        <div id="settingsContent">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading settings...</p>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:3000'
            : 'https://lupo-sales-api.fly.dev';
        
        const token = localStorage.getItem('lupo_token');
        const userStr = localStorage.getItem('lupo_user');
        
        if (!token || !userStr) {
            window.location.href = '/login.html';
        }
        
        const user = JSON.parse(userStr);
        document.getElementById('userName').textContent = user.email.split('@')[0];
        document.getElementById('userAvatar').textContent = user.email.charAt(0).toUpperCase();
        
        async function apiRequest(endpoint, options = {}) {
            const response = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`,
                    ...options.headers
                }
            });
            
            if (response.status === 401) {
                localStorage.removeItem('lupo_token');
                localStorage.removeItem('lupo_user');
                window.location.href = '/login.html';
                return;
            }
            
            if (!response.ok) {
                throw new Error(`API Error: ${response.statusText}`);
            }
            
            return response.json();
        }
        
        async function loadSettings() {
            try {
                console.log('Loading settings...');
                const tenant = await apiRequest('/v1/tenant');
                console.log('Tenant loaded:', tenant);
                
                let usage = null;
                try {
                    usage = await apiRequest('/v1/billing/usage');
                    console.log('Billing usage loaded:', usage);
                } catch (error) {
                    console.warn('Billing data not available:', error);
                    console.warn('Error details:', error.message, error.status);
                    // Continue without usage data - billing section will show "No billing data"
                }
                
                renderSettings(tenant, usage);
            } catch (error) {
                console.error('Error loading settings:', error);
                document.getElementById('settingsContent').innerHTML = `
                    <div class="settings-section">
                        <p style="color: var(--text-secondary);">Failed to load settings. Please refresh the page.</p>
                        <p style="color: var(--text-secondary); font-size: 12px; margin-top: 8px;">Error: ${error.message}</p>
                    </div>
                `;
            }
        }
        
        function renderSettings(tenant, usage) {
            const phoneNumbers = tenant.phoneNumbers || [];
            const primaryPhone = phoneNumbers.find(pn => pn.isActive) || phoneNumbers[0];
            
            document.getElementById('settingsContent').innerHTML = `
                <div class="settings-section">
                    <h2 class="section-title">Account</h2>
                    <div class="info-list">
                        <div class="info-item">
                            <div class="info-content">
                                <div class="info-label">Company Name</div>
                                <div class="info-value">${tenant.name}</div>
                            </div>
                        </div>
                        <div class="info-item">
                            <div class="info-content">
                                <div class="info-label">Email</div>
                                <div class="info-value">${user.email}</div>
                            </div>
                        </div>
                        <div class="info-item">
                            <div class="info-content">
                                <div class="info-label">Password</div>
                                <div class="info-value">••••••••</div>
                            </div>
                            <button class="btn btn-outline" onclick="changePassword()">
                                Change Password
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="settings-section">
                    <h2 class="section-title">Phone Number</h2>
                    <div class="info-list">
                        <div class="info-item">
                            <div class="info-content">
                                <div class="info-label">LUPO Number</div>
                                <div class="info-value" style="font-family: monospace;">${primaryPhone ? primaryPhone.twilioNumber : 'Not configured'}</div>
                                ${primaryPhone ? `<div class="info-description">${primaryPhone.friendlyName}</div>` : ''}
                            </div>
                            ${primaryPhone ? '<span class="status-badge active">Active</span>' : ''}
                        </div>
                        ${usage ? `
                            <div class="info-item">
                                <div class="info-content">
                                    <div class="info-label">Usage This Month</div>
                                    <div class="info-value">${usage.usage.callCount} calls</div>
                                    ${usage.usage.qualifiedLeads > 0 || usage.usage.meetings > 0 
                                        ? `<div class="info-description">
                                            ${usage.usage.qualifiedLeads > 0 ? `${usage.usage.qualifiedLeads} qualified` : ''}
                                            ${usage.usage.qualifiedLeads > 0 && usage.usage.meetings > 0 ? ' • ' : ''}
                                            ${usage.usage.meetings > 0 ? `${usage.usage.meetings} meetings` : ''}
                                        </div>`
                                        : ''
                                    }
                                </div>
                            </div>
                        ` : ''}
                    </div>
                </div>
                
                <div class="settings-section billing-section">
                        <h2 class="section-title">Billing</h2>
                    
                    ${usage && usage.customer ? `
                        ${usage.customer.plan === 'ENTERPRISE' ? `
                            <!-- Enterprise Plan -->
                            <div class="billing-plan-card">
                                <div class="plan-header">
                                    <span class="plan-badge enterprise-badge">Enterprise</span>
                                    <div class="plan-price">£3,000<span class="plan-period">/month</span></div>
                                </div>
                                
                                <div class="billing-details">
                                    <div class="billing-row">
                                        <span class="billing-label">Implementation Fee</span>
                                        <span class="billing-value ${usage.enterprise?.implementationFeePaid ? 'status-paid' : 'status-unpaid'}">
                                            ${usage.enterprise?.implementationFeePaid ? 'Paid' : 'Unpaid'}
                                        </span>
                                    </div>
                                    
                                    <div class="billing-row">
                                        <span class="billing-label">Monthly Retainer</span>
                                        <span class="billing-value">£3,000</span>
                                    </div>
                                    
                                    <div class="billing-row">
                                        <span class="billing-label">Included Minutes</span>
                                        <span class="billing-value">${usage.pricing?.includedMinutes?.toLocaleString() || '10,000'}</span>
                                    </div>
                                    
                                    ${usage.pricing?.totalMinutes !== undefined ? `
                                        <div class="billing-row">
                                            <span class="billing-label">Minutes Used</span>
                                            <span class="billing-value">${usage.pricing.totalMinutes.toLocaleString()}</span>
                                        </div>
                                        
                                        ${usage.pricing.overageMinutes > 0 ? `
                                            <div class="billing-row overage-row">
                                                <span class="billing-label">Overage Minutes</span>
                                                <span class="billing-value overage-value">+${usage.pricing.overageMinutes.toLocaleString()}</span>
                                            </div>
                                            <div class="billing-row">
                                                <span class="billing-label">Overage Cost</span>
                                                <span class="billing-value">£${(usage.pricing.overageCost / 100).toFixed(2)}</span>
                                            </div>
                                        ` : ''}
                                        
                                        <div class="billing-divider"></div>
                                        
                                        <div class="billing-row total-row">
                                            <span class="billing-label">Estimated Total</span>
                                            <span class="billing-value total-value">£${(usage.pricing.estimatedTotal / 100).toFixed(2)}</span>
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                        ` : `
                            <!-- Standard Plans (Growth/Scale) -->
                            <div class="billing-plan-card">
                                <div class="plan-header">
                                        <span class="plan-badge">${usage.customer.plan}</span>
                                    <div class="plan-price">${usage.pricing ? `£${(usage.pricing.monthlyFee / 100).toFixed(2)}` : '—'}<span class="plan-period">/month</span></div>
                                    </div>
                                
                                <div class="billing-details">
                                    <div class="billing-row">
                                        <span class="billing-label">Calls This Month</span>
                                        <span class="billing-value">${usage.usage.callCount}</span>
                                </div>
                                    
                                    ${usage.usage.qualifiedLeads > 0 ? `
                                        <div class="billing-row">
                                            <span class="billing-label">Qualified Leads</span>
                                            <span class="billing-value">${usage.usage.qualifiedLeads}</span>
                            </div>
                                    ` : ''}
                                    
                                    ${usage.usage.meetings > 0 ? `
                                        <div class="billing-row">
                                            <span class="billing-label">Meetings Booked</span>
                                            <span class="billing-value">${usage.usage.meetings}</span>
                                </div>
                                    ` : ''}
                                    
                                    ${usage.pricing ? `
                                        <div class="billing-divider"></div>
                                        <div class="billing-row total-row">
                                            <span class="billing-label">Estimated Total</span>
                                            <span class="billing-value total-value">£${(usage.pricing.estimatedTotal / 100).toFixed(2)}</span>
                            </div>
                                    ` : ''}
                                </div>
                            </div>
                        `}
                        
                        <div class="billing-actions">
                            <div class="payment-method-section">
                                <div class="payment-method-header">
                                    <span class="billing-label">Payment Method</span>
                                    <button class="btn btn-outline btn-small" onclick="updatePaymentMethod()">
                                        ${usage.paymentMethod ? 'Update' : 'Add Card'}
                                    </button>
                                    </div>
                                <div class="payment-method-value">
                                    ${usage.paymentMethod || 'No payment method on file'}
                                </div>
                            </div>
                            
                            <div class="billing-cycle-section">
                                <span class="billing-label">Next Invoice</span>
                                <span class="billing-value">${usage.customer.billingCycleEnd ? formatDate(usage.customer.billingCycleEnd) : 'N/A'}</span>
                        </div>
                            
                            <button class="btn btn-secondary btn-full" onclick="viewInvoices()">
                                View Billing History
                            </button>
                        </div>
                    ` : `
                        <!-- Demo/Placeholder Enterprise Plan -->
                        <div style="margin-bottom: 16px; padding: 12px 16px; background: rgba(255, 149, 0, 0.08); border: 1px solid rgba(255, 149, 0, 0.2); border-radius: 12px;">
                            <p style="font-size: 13px; color: #ff9500; margin: 0;">

                    </div>
                        <div class="billing-plan-card">

                            <div class="billing-details">

                        <div class="billing-actions">
                            <div class="payment-method-section">

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            try {
            const date = new Date(dateString);
                if (isNaN(date.getTime())) return 'Invalid date';
            return date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
            } catch (e) {
                return 'Invalid date';
            }
        }
        
        function changePassword() {
            window.location.href = '/portal/change-password.html';
        }
        
        async function updatePaymentMethod() {
            try {
                const response = await apiRequest('/v1/billing/portal', { method: 'POST' });
                if (response && response.url) {
                    window.location.href = response.url;
                } else {
                    alert('Payment portal not available. Please ensure billing is set up or contact support.');
                }
            } catch (error) {
                console.error('Error opening payment portal:', error);
                if (error.message && error.message.includes('404')) {
                    alert('Billing account not found. Please contact support to set up billing.');
                } else {
                alert('Failed to open payment portal. Please contact support.');
                }
            }
        }
        
        async function viewInvoices() {
            try {
                const invoices = await apiRequest('/v1/billing/invoices').catch(error => {
                    console.error('Error loading invoices:', error);
                    alert('Unable to load invoices. Please ensure billing is set up or contact support.');
                    return [];
                });
                
                if (invoices.length === 0) {
                    alert('No invoices found.');
                    return;
                }
                
                // Create modal for invoices
                const modal = document.createElement('div');
                modal.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    right: 0;
                    bottom: 0;
                    background: rgba(0, 0, 0, 0.8);
                    backdrop-filter: blur(20px);
                    z-index: 10000;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    padding: 24px;
                `;
                
                const modalContent = document.createElement('div');
                modalContent.style.cssText = `
                    background: var(--bg-secondary);
                    border: 1px solid var(--border);
                    border-radius: 20px;
                    padding: 32px;
                    max-width: 600px;
                    width: 100%;
                    max-height: 80vh;
                    overflow-y: auto;
                `;
                
                let invoicesHTML = '<h2 style="font-size: 24px; font-weight: 600; margin-bottom: 24px;">Billing History</h2>';
                invoicesHTML += '<div style="display: flex; flex-direction: column; gap: 16px;">';
                
                invoices.forEach(invoice => {
                    const date = new Date(invoice.created * 1000);
                    const status = invoice.status === 'paid' ? 'Paid' : invoice.status === 'open' ? 'Pending' : 'Draft';
                    const statusColor = invoice.status === 'paid' ? 'var(--success)' : invoice.status === 'open' ? '#ff9500' : 'var(--text-secondary)';
                    const amount = invoice.amount_paid || invoice.amount_due || 0;
                    
                    invoicesHTML += `
                        <div style="
                            padding: 20px;
                            background: rgba(255, 255, 255, 0.02);
                            border: 1px solid var(--border);
                            border-radius: 12px;
                            display: flex;
                            justify-content: space-between;
                            align-items: center;
                        ">
                            <div style="flex: 1;">
                                <div style="font-size: 15px; font-weight: 500; margin-bottom: 4px;">
                                    ${date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}
                                </div>
                                <div style="font-size: 13px; color: var(--text-secondary); margin-bottom: 8px;">
                                    Invoice #${invoice.number || invoice.id.slice(-8)}
                                </div>
                                ${invoice.invoice_pdf ? `
                                    <a href="${invoice.invoice_pdf}" target="_blank" style="
                                        font-size: 13px;
                                        color: var(--accent);
                                        text-decoration: none;
                                        display: inline-flex;
                                        align-items: center;
                                        gap: 4px;
                                    ">
                                        Download PDF →
                                    </a>
                                ` : ''}
                            </div>
                            <div style="text-align: right;">
                                <div style="font-size: 18px; font-weight: 600; margin-bottom: 4px;">
                                    £${(amount / 100).toFixed(2)}
                                </div>
                                <div style="font-size: 12px; color: ${statusColor}; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500;">
                                    ${status}
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                invoicesHTML += '</div>';
                invoicesHTML += `
                    <button onclick="this.closest('div[style*=\"position: fixed\"]').remove()" 
                            style="
                                margin-top: 24px;
                                width: 100%;
                                padding: 12px;
                                background: var(--bg-primary);
                                border: 1px solid var(--border);
                                border-radius: 10px;
                                color: var(--text-primary);
                                font-size: 14px;
                                font-weight: 500;
                                cursor: pointer;
                            ">
                        Close
                    </button>
                `;
                
                modalContent.innerHTML = invoicesHTML;
                modal.appendChild(modalContent);
                document.body.appendChild(modal);
                
                // Close on background click
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        modal.remove();
                    }
                });
            } catch (error) {
                console.error('Error loading invoices:', error);
                alert('Failed to load invoices. Please try again or contact support.');
            }
        }
        
        function upgradePlan() {
            // Enterprise plans are set up manually via Stripe
            alert('To upgrade your plan, please contact support. Enterprise plans are configured with custom pricing.');
        }
        
        function cancelSubscription() {
            if (confirm('Are you sure you want to cancel your subscription? This action cannot be undone. Your phone number will be released and all data will be permanently deleted.')) {
                if (confirm('This is your final confirmation. Are you absolutely sure?')) {
                    // TODO: Implement cancellation
                    alert('Subscription cancellation must be processed by support. Please contact us to cancel.');
                }
            }
        }
        
        function showUserMenu() {
            if (confirm('Do you want to logout?')) {
                localStorage.removeItem('lupo_token');
                localStorage.removeItem('lupo_user');
                window.location.href = '/login.html';
            }
        }
        
        loadSettings();
    </script>
