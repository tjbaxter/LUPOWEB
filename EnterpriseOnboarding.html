<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUPO Enterprise Onboarding</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 2rem;
        }
        
        h1 {
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }
        
        .subtitle {
            color: #888;
            margin-bottom: 2rem;
        }
        
        .section {
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: #1a1a1a;
            border-radius: 8px;
            border: 1px solid #333;
        }
        
        h2 {
            font-size: 1.25rem;
            margin-bottom: 1rem;
            color: #3b82f6;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            color: #888;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 0.75rem;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
        }
        
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }
        
        .seats-container {
            margin-top: 1rem;
            padding: 1rem;
            background: #0a0a0a;
            border-radius: 6px;
        }
        
        .seat-row {
            display: grid;
            grid-template-columns: 2fr 2fr 1fr auto;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            align-items: center;
        }
        
        .seat-number {
            color: #888;
            font-size: 0.875rem;
        }
        
        .btn-remove {
            padding: 0.5rem;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.875rem;
        }
        
        .btn-add {
            padding: 0.5rem 1rem;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }
        
        .actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .btn-primary {
            flex: 1;
            padding: 1rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary:hover {
            background: #2563eb;
        }
        
        .btn-secondary {
            flex: 1;
            padding: 1rem;
            background: transparent;
            color: #888;
            border: 1px solid #333;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }
        
        .message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }
        
        .message.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            display: block;
        }
        
        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            display: block;
        }
        
        .summary {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 1.5rem;
            margin-top: 2rem;
        }
        
        .summary h3 {
            margin-bottom: 1rem;
            color: #10b981;
        }
        
        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid #333;
        }
        
        .summary-item:last-child {
            border-bottom: none;
            font-weight: 600;
            color: #3b82f6;
            font-size: 1.25rem;
            padding-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LUPO Enterprise Onboarding</h1>
        <p class="subtitle">Set up a new enterprise customer with LUPO</p>
        
        <div id="message" class="message"></div>
        
        <!-- Company Details -->
        <div class="section">
            <h2>Company Details</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Company Name*</label>
                    <input type="text" id="companyName" placeholder="Acme Corporation">
                </div>
                <div class="form-group">
                    <label>Industry</label>
                    <select id="industry">
                        <option value="">Select Industry</option>
                        <option value="saas">SaaS/Software</option>
                        <option value="finance">Finance</option>
                        <option value="healthcare">Healthcare</option>
                        <option value="retail">Retail</option>
                        <option value="manufacturing">Manufacturing</option>
                        <option value="consulting">Consulting</option>
                        <option value="other">Other</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Website</label>
                    <input type="url" id="website" placeholder="https://company.com">
                </div>
                <div class="form-group">
                    <label>Company Size</label>
                    <select id="companySize">
                        <option value="">Select Size</option>
                        <option value="1-10">1-10 employees</option>
                        <option value="11-50">11-50 employees</option>
                        <option value="51-200">51-200 employees</option>
                        <option value="201-500">201-500 employees</option>
                        <option value="500+">500+ employees</option>
                    </select>
                </div>
            </div>
        </div>
        
        <!-- Product Details -->
        <div class="section">
            <h2>Product They're Selling</h2>
            <div class="form-group">
                <label>Product Name*</label>
                <input type="text" id="productName" placeholder="Their product/service name">
            </div>
            <div class="form-group">
                <label>Product Description</label>
                <textarea id="productDescription" placeholder="Brief description of what they sell..."></textarea>
            </div>
            <div class="form-group">
                <label>Pricing Info</label>
                <input type="text" id="pricing" placeholder="e.g., $99/mo per user, Enterprise: Contact sales">
            </div>
        </div>
        
        <!-- Sales Team Setup -->
        <div class="section">
            <h2>Sales Team (5 Seats)</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Number of Seats*</label>
                    <input type="number" id="seatCount" value="5" min="1" max="100" onchange="updateSeats()">
                </div>
                <div class="form-group">
                    <label>Pilot Duration</label>
                    <select id="pilotDuration">
                        <option value="14">14 days (Trial)</option>
                        <option value="30" selected>30 days (Standard Pilot)</option>
                        <option value="60">60 days (Extended Pilot)</option>
                        <option value="90">90 days (Enterprise)</option>
                    </select>
                </div>
            </div>
            
            <div class="seats-container" id="seatsContainer">
                <!-- Seats will be added here -->
            </div>
            <button class="btn-add" onclick="addSeat()">+ Add Another Seat</button>
        </div>
        
        <!-- Manager Access -->
        <div class="section">
            <h2>Manager Dashboard Access</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Manager Name*</label>
                    <input type="text" id="managerName" placeholder="John Smith">
                </div>
                <div class="form-group">
                    <label>Manager Email*</label>
                    <input type="email" id="managerEmail" placeholder="manager@company.com">
                </div>
            </div>
        </div>
        
        <!-- Summary -->
        <div class="summary">
            <h3>Setup Summary</h3>
            <div class="summary-item">
                <span>Seats:</span>
                <span id="summarySeats">5</span>
            </div>
            <div class="summary-item">
                <span>Pilot Duration:</span>
                <span id="summaryDuration">30 days</span>
            </div>
            <div class="summary-item">
                <span>Monthly Value (post-pilot):</span>
                <span id="summaryValue">$500/mo</span>
            </div>
            <div class="summary-item">
                <span>Setup Fee:</span>
                <span>$0 (Pilot)</span>
            </div>
        </div>
        
        <!-- Actions -->
        <div class="actions">
            <button class="btn-secondary" onclick="saveDraft()">Save Draft</button>
            <button class="btn-primary" onclick="setupCompany()">Create Company & Send Invites</button>
        </div>
    </div>
    
    <script>
        let seats = [];
        const API_URL = 'https://lupo-backend.fly.dev';
        
        // Initialize with 5 seats
        function initSeats() {
            for (let i = 0; i < 5; i++) {
                seats.push({ name: '', email: '' });
            }
            renderSeats();
        }
        
        function updateSeats() {
            const count = parseInt(document.getElementById('seatCount').value);
            seats = [];
            for (let i = 0; i < count; i++) {
                seats.push({ name: '', email: '' });
            }
            renderSeats();
            updateSummary();
        }
        
        function renderSeats() {
            const container = document.getElementById('seatsContainer');
            container.innerHTML = seats.map((seat, i) => `
                <div class="seat-row">
                    <input type="text" placeholder="Rep name" value="${seat.name}" onchange="updateSeat(${i}, 'name', this.value)">
                    <input type="email" placeholder="Rep email" value="${seat.email}" onchange="updateSeat(${i}, 'email', this.value)">
                    <span class="seat-number">Seat ${i + 1}</span>
                    ${seats.length > 1 ? `<button class="btn-remove" onclick="removeSeat(${i})">Remove</button>` : '<span></span>'}
                </div>
            `).join('');
        }
        
        function updateSeat(index, field, value) {
            seats[index][field] = value;
        }
        
        function addSeat() {
            seats.push({ name: '', email: '' });
            document.getElementById('seatCount').value = seats.length;
            renderSeats();
            updateSummary();
        }
        
        function removeSeat(index) {
            seats.splice(index, 1);
            document.getElementById('seatCount').value = seats.length;
            renderSeats();
            updateSummary();
        }
        
        function updateSummary() {
            const seatCount = seats.length;
            const duration = document.getElementById('pilotDuration').value;
            
            document.getElementById('summarySeats').textContent = seatCount;
            document.getElementById('summaryDuration').textContent = `${duration} days`;
            document.getElementById('summaryValue').textContent = `$${seatCount * 100}/mo`;
        }
        
        async function setupCompany() {
            const companyData = {
                companyName: document.getElementById('companyName').value,
                industry: document.getElementById('industry').value,
                website: document.getElementById('website').value,
                companySize: document.getElementById('companySize').value,
                productName: document.getElementById('productName').value,
                productDescription: document.getElementById('productDescription').value,
                pricing: document.getElementById('pricing').value,
                pilotDuration: parseInt(document.getElementById('pilotDuration').value),
                manager: {
                    name: document.getElementById('managerName').value,
                    email: document.getElementById('managerEmail').value
                },
                reps: seats.filter(s => s.email), // Only include reps with emails
                seatCount: seats.length
            };
            
            // Validate required fields
            if (!companyData.companyName || !companyData.productName || !companyData.manager.email) {
                showMessage('Please fill in all required fields', 'error');
                return;
            }
            
            try {
                // First, login as admin (you)
                const loginRes = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'tjpb2@cantab.ac.uk',
                        password: prompt('Enter your admin password:')
                    })
                });
                
                const loginData = await loginRes.json();
                
                if (!loginData.success) {
                    showMessage('Admin authentication failed', 'error');
                    return;
                }
                
                // Create the enterprise organization
                const response = await fetch(`${API_URL}/auth/enterprise/onboard`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${loginData.token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(companyData)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage(`
                        ✓ Company created successfully!
                        ✓ Manager invite sent to ${companyData.manager.email}
                        ✓ ${companyData.reps.length} rep accounts created
                        
                        Organization ID: ${result.orgId}
                        API Key: ${result.apiKey}
                    `, 'success');
                    
                    // Clear form after success
                    setTimeout(() => {
                        if (confirm('Set up another company?')) {
                            location.reload();
                        }
                    }, 3000);
                } else {
                    showMessage(result.error || 'Setup failed', 'error');
                }
                
            } catch (error) {
                showMessage('Failed to set up company. Check console for details.', 'error');
                console.error(error);
            }
        }
        
        function saveDraft() {
            const data = {
                company: document.getElementById('companyName').value,
                product: document.getElementById('productName').value,
                seats: seats
            };
            localStorage.setItem('lupo_onboarding_draft', JSON.stringify(data));
            showMessage('Draft saved locally', 'success');
        }
        
        function loadDraft() {
            const draft = localStorage.getItem('lupo_onboarding_draft');
            if (draft) {
                const data = JSON.parse(draft);
                document.getElementById('companyName').value = data.company || '';
                document.getElementById('productName').value = data.product || '';
                seats = data.seats || [];
                document.getElementById('seatCount').value = seats.length;
                renderSeats();
            }
        }
        
        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = `message ${type}`;
            
            if (type === 'success') {
                setTimeout(() => {
                    message.className = 'message';
                }, 10000);
            }
        }
        
        // Initialize
        initSeats();
        loadDraft();
        updateSummary();
        
        // Update summary when duration changes
        document.getElementById('pilotDuration').addEventListener('change', updateSummary);
    </script>
</body>
</html>
