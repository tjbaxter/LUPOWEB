<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Transcript - LUPO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --surface-hover: #1a1a1a;
            --border: #222;
            --text: #fff;
            --text-dim: #888;
            --text-muted: #666;
            --accent: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Header */
        header {
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        
        .back-btn {
            padding: 0.5rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-dim);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .back-btn:hover {
            background: var(--surface-hover);
            color: var(--text);
            border-color: var(--accent);
        }
        
        .logo {
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        /* Call Info Card */
        .call-info {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .call-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        
        .info-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
        }
        
        .info-value {
            font-size: 1rem;
            color: var(--text);
        }
        
        /* Compliance Alert */
        .compliance-alert {
            background: var(--danger);
            background: linear-gradient(135deg, var(--danger), #dc2626);
            border-radius: 8px;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .compliance-alert-icon {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }
        
        .compliance-alert-text {
            flex: 1;
        }
        
        .compliance-alert-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        
        .compliance-alert-desc {
            font-size: 0.875rem;
            opacity: 0.9;
        }
        
        /* Transcript Section */
        .transcript-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
        }
        
        .transcript-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        
        .transcript-title {
            font-size: 1.125rem;
            font-weight: 600;
        }
        
        .transcript-actions {
            display: flex;
            gap: 1rem;
        }
        
        .action-btn {
            padding: 0.5rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-dim);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .action-btn:hover {
            background: var(--surface-hover);
            color: var(--text);
        }
        
        /* Transcript Content */
        .transcript-content {
            max-height: 600px;
            overflow-y: auto;
            padding-right: 1rem;
        }
        
        .transcript-line {
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: var(--bg);
            border-radius: 6px;
            transition: all 0.3s;
        }
        
        .transcript-line.highlighted {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            animation: pulse 2s ease-in-out;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.01); }
        }
        
        .speaker {
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .speaker.customer {
            color: var(--success);
        }
        
        .transcript-text {
            color: var(--text);
            line-height: 1.6;
        }
        
        .transcript-text mark {
            background: rgba(239, 68, 68, 0.3);
            color: var(--text);
            padding: 0.125rem 0.25rem;
            border-radius: 3px;
        }
        
        .timestamp {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }
        
        /* Loading State */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            color: var(--text-dim);
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Error State */
        .error-state {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            color: var(--danger);
        }
        
        /* Scrollbar */
        .transcript-content::-webkit-scrollbar {
            width: 8px;
        }
        
        .transcript-content::-webkit-scrollbar-track {
            background: var(--bg);
            border-radius: 4px;
        }
        
        .transcript-content::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        
        .transcript-content::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .call-info-grid {
                grid-template-columns: 1fr;
            }
            
            .transcript-content {
                max-height: 400px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="/manager-dashboard.html" class="back-btn" id="backBtn">
                ← Back to Dashboard
            </a>
            <div class="logo">LUPO</div>
        </div>
    </header>
    
    <div class="container">
        <!-- Compliance Alert (shown if compliance issues exist) -->
        <div class="compliance-alert" id="complianceAlert" style="display: none;">
            <svg class="compliance-alert-icon" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
            </svg>
            <div class="compliance-alert-text">
                <div class="compliance-alert-title">Compliance Risk Detected</div>
                <div class="compliance-alert-desc">This call contains phrases that may violate compliance policies. Review highlighted sections below.</div>
            </div>
        </div>
        
        <!-- Call Info -->
        <div class="call-info">
            <div class="call-info-grid">
                <div class="info-item">
                    <span class="info-label">Customer</span>
                    <span class="info-value" id="customerName">Loading...</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Sales Rep</span>
                    <span class="info-value" id="salesRep">Loading...</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Date</span>
                    <span class="info-value" id="callDate">Loading...</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Duration</span>
                    <span class="info-value" id="duration">Loading...</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Outcome</span>
                    <span class="info-value" id="outcome">Loading...</span>
                </div>
            </div>
        </div>
        
        <!-- Transcript -->
        <div class="transcript-section">
            <div class="transcript-header">
                <h2 class="transcript-title">Call Transcript</h2>
                <div class="transcript-actions">
                    <button class="action-btn" onclick="exportTranscript()">Export</button>
                    <button class="action-btn" onclick="copyTranscript()">Copy</button>
                </div>
            </div>
            <div class="transcript-content" id="transcriptContent">
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Loading transcript...</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let currentCall = null;
        let complianceIssues = [];
        
        async function init() {
            // Get call ID from URL
            const pathParts = window.location.pathname.split('/');
            const callId = pathParts[pathParts.length - 1];
            
            if (!callId || callId === 'call-viewer.html') {
                showError('No call ID provided');
                return;
            }
            
            // Get timestamp from query params (for highlighting)
            const params = new URLSearchParams(window.location.search);
            const highlightTime = params.get('t');
            
            // Update back button with proper params
            const token = params.get('token') || localStorage.getItem('lupo_token');
            const refresh = params.get('refresh') || localStorage.getItem('lupo_refresh');
            const apiKey = params.get('key') || localStorage.getItem('lupo_apikey');
            
            let backUrl = '/manager-dashboard.html?';
            if (token) backUrl += `token=${token}&`;
            if (refresh) backUrl += `refresh=${refresh}&`;
            if (apiKey) backUrl += `key=${apiKey}`;
            document.getElementById('backBtn').href = backUrl;
            
            // Load call data
            await loadCall(callId, highlightTime);
        }
        
        async function loadCall(callId, highlightTime) {
            try {
                const headers = getAuthHeaders();
                const response = await fetch(`https://lupo-backend.fly.dev/sales/calls/${callId}`, {
                    headers: headers
                });
                
                if (!response.ok) {
                    throw new Error('Failed to load call');
                }
                
                const data = await response.json();
                currentCall = data;
                
                // Update call info
                document.getElementById('customerName').textContent = 
                    data.call.customerName || data.call.prospectName || 'Unknown';
                document.getElementById('salesRep').textContent = 
                    data.call.salesRep || 'Unknown';
                document.getElementById('callDate').textContent = 
                    new Date(data.call.startTime).toLocaleDateString('en-US', {
                        month: 'short',
                        day: 'numeric',
                        year: 'numeric',
                        hour: 'numeric',
                        minute: '2-digit'
                    });
                document.getElementById('duration').textContent = 
                    data.call.duration || 'N/A';
                document.getElementById('outcome').textContent = 
                    formatOutcome(data.call.outcome);
                
                // Check for compliance issues
                checkComplianceIssues(data);
                
                // Render transcript
                renderTranscript(data.transcript, highlightTime);
                
            } catch (error) {
                console.error('Error loading call:', error);
                showError('Failed to load call transcript');
            }
        }
        
        function getAuthHeaders() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token') || localStorage.getItem('lupo_token');
            const apiKey = params.get('key') || localStorage.getItem('lupo_apikey');
            
            const headers = {};
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            } else if (apiKey) {
                headers['X-API-Key'] = apiKey;
            }
            return headers;
        }
        
        function checkComplianceIssues(data) {
            // Check keyMoments for compliance flags
            if (data.keyMoments && Array.isArray(data.keyMoments)) {
                complianceIssues = data.keyMoments.filter(moment => 
                    moment.type === 'compliance_flag' || 
                    moment.impact === 'negative' ||
                    (moment.text && (
                        moment.text.toLowerCase().includes('guarantee') ||
                        moment.text.toLowerCase().includes('100%') ||
                        moment.text.toLowerCase().includes('definitely')
                    ))
                );
            }
            
            // Show alert if issues found
            if (complianceIssues.length > 0) {
                document.getElementById('complianceAlert').style.display = 'flex';
            }
        }
        
        function renderTranscript(transcript, highlightTime) {
            const container = document.getElementById('transcriptContent');
            
            if (!transcript || transcript.length === 0) {
                container.innerHTML = '<div class="error-state">No transcript available for this call</div>';
                return;
            }
            
            // Filter out system messages
            const filtered = transcript.filter(msg => {
                const text = msg.text || msg.content || '';
                return text && 
                       text !== 'RESPONSE_COMPLETE' && 
                       text !== 'INTERRUPTED' &&
                       text.trim().length > 0;
            });
            
            let html = '';
            filtered.forEach((msg, index) => {
                const text = msg.text || msg.content || '';
                const speaker = msg.speaker || msg.role || 'Unknown';
                const timestamp = msg.timestamp;
                
                // Check if this message should be highlighted
                let isHighlighted = false;
                let highlightedText = text;
                
                // Highlight based on timestamp
                if (highlightTime && timestamp && Math.abs(timestamp - highlightTime) < 5) {
                    isHighlighted = true;
                }
                
                // Highlight compliance issues
                complianceIssues.forEach(issue => {
                    if (issue.timestamp && Math.abs(issue.timestamp - timestamp) < 5) {
                        isHighlighted = true;
                    }
                    // Highlight specific phrases
                    if (issue.text && text.includes(issue.text)) {
                        highlightedText = text.replace(issue.text, `<mark>${issue.text}</mark>`);
                        isHighlighted = true;
                    }
                });
                
                // Also check for forbidden phrases
                const forbiddenPhrases = ['guarantee', '100%', 'definitely', 'risk-free', 'no risk'];
                forbiddenPhrases.forEach(phrase => {
                    const regex = new RegExp(`(${phrase})`, 'gi');
                    if (text.toLowerCase().includes(phrase)) {
                        highlightedText = highlightedText.replace(regex, '<mark>$1</mark>');
                        isHighlighted = true;
                    }
                });
                
                const speakerClass = speaker.toLowerCase().includes('customer') ? 'customer' : '';
                const highlightClass = isHighlighted ? 'highlighted' : '';
                
                html += `
                    <div class="transcript-line ${highlightClass}" data-index="${index}">
                        <div class="speaker ${speakerClass}">${formatSpeaker(speaker)}</div>
                        <div class="transcript-text">${highlightedText}</div>
                        ${timestamp ? `<div class="timestamp">${formatTimestamp(timestamp)}</div>` : ''}
                    </div>
                `;
            });
            
            container.innerHTML = html;
            
            // Scroll to highlighted element if exists
            if (highlightTime) {
                setTimeout(() => {
                    const highlighted = container.querySelector('.highlighted');
                    if (highlighted) {
                        highlighted.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }, 100);
            }
        }
        
        function formatSpeaker(speaker) {
            if (speaker.toLowerCase().includes('customer')) return 'CUSTOMER';
            if (speaker.toLowerCase().includes('rep')) return 'SALES REP';
            if (speaker.toLowerCase().includes('assistant')) return 'AI ASSISTANT';
            return speaker.toUpperCase();
        }
        
        function formatTimestamp(timestamp) {
            if (typeof timestamp === 'number' && timestamp < 10000) {
                const mins = Math.floor(timestamp / 60);
                const secs = timestamp % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            }
            return new Date(timestamp).toLocaleTimeString('en-US', {
                hour: 'numeric',
                minute: '2-digit'
            });
        }
        
        function formatOutcome(outcome) {
            if (!outcome) return 'Ongoing';
            return outcome.replace(/_/g, ' ')
                .split(' ')
                .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                .join(' ');
        }
        
        function exportTranscript() {
            if (!currentCall) return;
            
            let text = `Call Transcript\n`;
            text += `Customer: ${currentCall.call.customerName}\n`;
            text += `Sales Rep: ${currentCall.call.salesRep}\n`;
            text += `Date: ${new Date(currentCall.call.startTime).toLocaleString()}\n`;
            text += `Duration: ${currentCall.call.duration}\n\n`;
            text += `--- TRANSCRIPT ---\n\n`;
            
            currentCall.transcript.forEach(msg => {
                const speaker = msg.speaker || msg.role || 'Unknown';
                const content = msg.text || msg.content || '';
                if (content && content !== 'RESPONSE_COMPLETE') {
                    text += `${speaker}: ${content}\n\n`;
                }
            });
            
            // Create download
            const blob = new Blob([text], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `call-transcript-${currentCall.call.id}.txt`;
            a.click();
        }
        
        function copyTranscript() {
            if (!currentCall) return;
            
            let text = '';
            currentCall.transcript.forEach(msg => {
                const speaker = msg.speaker || msg.role || 'Unknown';
                const content = msg.text || msg.content || '';
                if (content && content !== 'RESPONSE_COMPLETE') {
                    text += `${speaker}: ${content}\n\n`;
                }
            });
            
            navigator.clipboard.writeText(text);
            
            // Show feedback
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = 'Copied!';
            setTimeout(() => {
                btn.textContent = originalText;
            }, 2000);
        }
        
        function showError(message) {
            document.getElementById('transcriptContent').innerHTML = 
                `<div class="error-state">${message}</div>`;
        }
        
        // Initialize on load
        init();
    </script>
</body>
</html>
