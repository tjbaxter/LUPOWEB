<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Processing Your Payment - LUPO</title>
  <link rel="icon" type="image/png" href="/LUPO_LOGO copy 1.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      background: #000000;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 500px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: #0071e3;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 24px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    h1 {
      font-size: 24px;
      margin-bottom: 12px;
    }

    p {
      color: #8a8a8e;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1>Processing Your Payment...</h1>
    <p>Setting up your team. This will just take a moment.</p>
  </div>

  <script>
    (function() {
      const urlParams = new URLSearchParams(window.location.search);
      const sessionId = urlParams.get('session_id');
      const tempId = urlParams.get('temp_id');

      if (!sessionId || !tempId) {
        window.location.href = '/team-setup.html?error=missing_params';
        return;
      }

      // Immediately redirect to backend - backend will create org and redirect to dashboard
      // This works better than fetch because backend uses res.redirect() which requires a browser redirect
      window.location.href = `https://lupo-backend.fly.dev/api/team/checkout/success?session_id=${encodeURIComponent(sessionId)}&temp_id=${encodeURIComponent(tempId)}`;
    })();
  </script>
</body>
</html>
