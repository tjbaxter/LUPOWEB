<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Start Your 7-Day Free Trial - LUPO</title>
  <link rel="icon" type="image/png" href="/LUPO_LOGO copy 1.png">
  <link rel="apple-touch-icon" href="/LUPO_LOGO copy 1.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --text-primary: #ffffff;
      --text-secondary: #8a8a8e;
      --bg-primary: #000000;
      --bg-secondary: rgba(22, 22, 23, 0.98);
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --border: rgba(255, 255, 255, 0.06);
      --border-focus: rgba(255, 255, 255, 0.12);
      --error: #ef4444;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
      padding: 100px 20px 60px;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }

    /* Subtle gradient background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 20% 50%, rgba(41, 151, 255, 0.06) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(118, 75, 162, 0.04) 0%, transparent 50%),
                  radial-gradient(circle at 40% 20%, rgba(102, 126, 234, 0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Animated gradient orb */
    @keyframes float {
      0%, 100% { transform: translate(-50%, -50%) translate(0, 0) scale(1); }
      25% { transform: translate(-50%, -50%) translate(30px, -30px) scale(1.05); }
      50% { transform: translate(-50%, -50%) translate(-20px, 20px) scale(0.95); }
      75% { transform: translate(-50%, -50%) translate(-30px, -10px) scale(1.02); }
    }

    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle at center, rgba(41, 151, 255, 0.08) 0%, transparent 70%);
      filter: blur(60px);
      animation: float 20s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    /* Animated Background Orbs (index.html style) */
    .animated-bg {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: -1;
      opacity: 0.05;
      background: radial-gradient(circle at 20% 50%, #2997ff 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, #764ba2 0%, transparent 50%),
                  radial-gradient(circle at 40% 20%, #667eea 0%, transparent 50%);
      animation: bgShift 30s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes bgShift {
      0%, 100% { transform: rotate(0deg) scale(1); }
      33% { transform: rotate(120deg) scale(1.1); }
      66% { transform: rotate(240deg) scale(0.9); }
    }

    .logo-link {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      text-decoration: none;
      color: var(--text-primary);
      font-size: 24px;
      font-weight: 600;
      z-index: 2;
      margin-bottom: 40px;
    }

    .logo-link:hover {
      opacity: 0.8;
    }

    .container {
      width: 100%;
      max-width: 440px;
      margin: 0 auto;
      background: var(--bg-secondary);
      backdrop-filter: blur(40px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      position: relative;
      z-index: 1;
      opacity: 0;
      animation: fadeIn 0.6s ease forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
      margin-top: 8px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.03em;
    }

    .no-charge-badge {
      display: inline-block;
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #10b981;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      margin-top: 4px;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--error);
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text-primary);
    }

    .form-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 16px;
      font-family: inherit;
      color: var(--text-primary);
      transition: all 0.2s ease;
    }

    .form-input.locked-input {
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.6);
      cursor: not-allowed;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--border-focus);
      background: rgba(255, 255, 255, 0.03);
    }

    .form-hint {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .checkbox-group {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .checkbox-group input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin-top: 2px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .checkbox-group label {
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin: 0;
      flex: 1;
    }

    .checkbox-hint {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
      line-height: 1.4;
    }

    #priceDisplay {
      font-weight: 500;
      color: var(--accent);
    }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      margin-top: 8px;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .security-note {
      text-align: center;
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 12px;
      line-height: 1.5;
    }

    @media (max-width: 640px) {
      .container {
        padding: 24px 20px;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="animated-bg"></div>
  <a href="/" class="logo-link">LUPO</a>

  <div class="container">
    <div class="header">
      <h1>Start Your 7-Day Free Trial</h1>
      <div class="no-charge-badge">✓ No charge today</div>
    </div>

    <div id="errorMessage" class="error-message"></div>

    <form id="setupForm">
      <div class="form-group">
        <label class="form-label" for="teamName">Team Name *</label>
        <input type="text" id="teamName" class="form-input" placeholder="e.g., Acme Sales Team" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="seats">Number of Seats *</label>
        <input type="number" id="seats" class="form-input" value="5" min="2" max="100" required>
        <div class="form-hint" id="priceDisplay">$1,000/month after trial</div>
      </div>

      <div class="form-group checkbox-group">
        <input type="checkbox" id="includeManagerSeat">
        <label for="includeManagerSeat">Add a seat for me too</label>
        <div class="checkbox-hint">You'll get full dashboard access either way. This lets you use Lupo on your own calls.</div>
      </div>

      <button type="submit" id="submitBtn" class="btn-primary">
        Continue to Payment →
      </button>

      <div class="security-note">
        🔒 Secure payment via Stripe • Cancel anytime during trial
      </div>
    </form>
  </div>

  <script>
    const BACKEND_URL = 'https://lupo-backend.fly.dev';
    const seatsInput = document.getElementById('seats');
    const priceDisplay = document.getElementById('priceDisplay');
    const errorDiv = document.getElementById('errorMessage');

    // Update price display when seats change
    seatsInput.addEventListener('input', () => {
      const seats = parseInt(seatsInput.value) || 0;
      const price = seats * 200;
      priceDisplay.textContent = `$${price.toLocaleString()}/month after trial`;
    });

    // Handle form submission
    document.getElementById('setupForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const teamName = document.getElementById('teamName').value.trim();
      const seats = parseInt(document.getElementById('seats').value);
      const includeManagerSeat = document.getElementById('includeManagerSeat').checked;
      const btn = document.getElementById('submitBtn');

      if (!teamName || !seats || seats < 2) {
        showError('Please fill in all required fields');
        return;
      }

      // Disable button and show loading
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Creating checkout...';
      errorDiv.classList.remove('show');

      try {
        // Get userId from JWT token if available
        let userId = null;
        const token = localStorage.getItem('lupoToken') || 
                      localStorage.getItem('lupo_manager_token') || 
                      localStorage.getItem('lupo_session');
        
        if (token) {
          try {
            const payload = JSON.parse(atob(token.split('.')[1]));
            userId = payload.userId;
            console.log('✅ Got userId from token:', userId);
          } catch (err) {
            console.warn('Failed to decode token:', err);
          }
        }
        
        // Create Stripe Checkout session
        const response = await fetch(`${BACKEND_URL}/api/team/checkout/create`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            teamName,
            seats,
            includeManagerSeat, // From checkbox
            userId // Send userId if available (authenticated upgrade flow)
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Failed to create checkout session');
        }

        // Redirect to Stripe Checkout
        window.location.href = data.checkoutUrl;

      } catch (error) {
        console.error('❌ Checkout error:', error);
        showError(error.message);
        btn.disabled = false;
        btn.innerHTML = 'Continue to Payment →';
      }
    });

    function showError(message) {
      errorDiv.textContent = message;
      errorDiv.classList.add('show');
    }
  </script>
</body>
</html>
