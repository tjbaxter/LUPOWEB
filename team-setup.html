<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Start Your 7-Day Free Trial - LUPO</title>
  <link rel="icon" type="image/png" href="/LUPO_LOGO copy 1.png">
  <link rel="apple-touch-icon" href="/LUPO_LOGO copy 1.png">
  <link rel="stylesheet" href="https://fonts.apple.com/fonts/sf-pro.css" integrity="sha512-..." crossorigin="anonymous">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --text-primary: #ffffff;
      --text-secondary: #8a8a8e;
      --bg-primary: #000000;
      --bg-secondary: rgba(22, 22, 23, 0.98);
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --border: rgba(255, 255, 255, 0.06);
      --border-focus: rgba(255, 255, 255, 0.12);
      --error: #ef4444;
    }

    body {
      font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
      padding: 70px 20px 40px;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }

    /* Subtle gradient background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 20% 50%, rgba(41, 151, 255, 0.06) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(118, 75, 162, 0.04) 0%, transparent 50%),
                  radial-gradient(circle at 40% 20%, rgba(102, 126, 234, 0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }


    .logo-link {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      text-decoration: none;
      color: var(--text-primary);
      font-size: 22px;
      font-weight: 600;
      z-index: 2;
      margin-bottom: 40px;
    }

    .logo-link:hover {
      opacity: 0.8;
    }

    .container {
      width: 100%;
      max-width: 440px;
      margin: 0 auto;
      background: var(--bg-secondary);
      backdrop-filter: blur(40px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      position: relative;
      z-index: 1;
      opacity: 0;
      animation: fadeIn 0.6s ease forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .header {
      text-align: center;
      margin-bottom: 18px;
      margin-top: 0;
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.04em;
    }

    .no-charge-badge {
      display: inline-block;
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #10b981;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 2px;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--error);
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 14px;
      font-size: 13px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--text-primary);
    }

    .form-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 16px;
      font-family: inherit;
      color: var(--text-primary);
      transition: all 0.2s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--border-focus);
      background: rgba(255, 255, 255, 0.03);
    }

    .form-hint {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 3px;
      line-height: 1.4;
    }

    .checkbox-group {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .checkbox-group:hover {
      background: rgba(255, 255, 255, 0.03);
      border-color: var(--border-focus);
    }

    .checkbox-group input[type="checkbox"] {
      margin-top: 2px;
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .checkbox-content {
      flex: 1;
    }

    .checkbox-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 1px;
      cursor: pointer;
    }

    .checkbox-description {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.35;
    }

    .pricing-summary {
      background: rgba(0, 113, 227, 0.08);
      border: 1px solid rgba(0, 113, 227, 0.2);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }

    .pricing-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .pricing-line:last-child {
      margin-bottom: 0;
      padding-top: 6px;
      border-top: 1px solid var(--border);
      font-weight: 600;
    }

    .pricing-amount {
      color: var(--accent);
      font-weight: 600;
    }

    .trial-note {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 4px;
      text-align: center;
    }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      margin-top: 4px;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .security-note {
      text-align: center;
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 8px;
      line-height: 1.4;
    }

    @media (max-width: 640px) {
      .container {
        padding: 20px 16px;
      }

      h1 {
        font-size: 22px;
      }
      
      body {
        padding: 60px 20px 30px;
      }
    }
  </style>
</head>
<body>
  <a href="/" class="logo-link">LUPO</a>

  <div class="container">
    <div class="header">
      <h1>Start Your 7-Day Free Trial</h1>
      <div class="no-charge-badge">✓ No charge today</div>
    </div>

    <div id="errorMessage" class="error-message"></div>

    <form id="setupForm">
      <div class="form-group">
        <label class="form-label" for="teamName">Company name *</label>
        <input type="text" id="teamName" class="form-input" placeholder="e.g., Acme Inc" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Your Email *</label>
        <input type="email" id="email" class="form-input" placeholder="manager@company.com" required>
        <div class="form-hint">You'll be the team admin</div>
      </div>

      <div class="form-group">
        <label class="form-label" for="seats">How many reps need Lupo? *</label>
        <input type="number" id="seats" class="form-input" value="5" min="1" max="100" required>
        <div class="form-hint">Each rep can use Lupo during their sales calls</div>
      </div>

      <label class="checkbox-group" for="managerSeat">
        <input type="checkbox" id="managerSeat">
        <div class="checkbox-content">
          <span class="checkbox-label">Add a seat for me too</span>
          <div class="checkbox-description">
            You'll get full dashboard access either way. This lets you use Lupo on your own calls.
          </div>
        </div>
      </label>

      <div class="pricing-summary">
        <div class="pricing-line">
          <span id="repSeatsText">5 rep seats</span>
          <span class="pricing-amount" id="repSeatsPrice">$1,000/month</span>
        </div>
        <div class="pricing-line" id="managerSeatLine" style="display: none;">
          <span>+ Your seat</span>
          <span class="pricing-amount">$200/month</span>
        </div>
        <div class="pricing-line">
          <span>Total</span>
          <span class="pricing-amount" id="totalPrice">$1,000/month</span>
        </div>
        <div class="trial-note">7-day free trial • Cancel anytime</div>
      </div>

      <button type="submit" id="submitBtn" class="btn-primary">
        Continue to Payment →
      </button>

      <div class="security-note">
        🔒 Secure payment via Stripe • Cancel anytime during trial
      </div>
    </form>
  </div>

  <script>
    const BACKEND_URL = 'https://lupo-backend.fly.dev';
    const seatsInput = document.getElementById('seats');
    const managerSeatCheckbox = document.getElementById('managerSeat');
    const errorDiv = document.getElementById('errorMessage');

    function updatePricing() {
      const repSeats = parseInt(seatsInput.value) || 0;
      const managerSeatIncluded = managerSeatCheckbox.checked;
      
      const repPrice = repSeats * 200;
      const managerPrice = managerSeatIncluded ? 200 : 0;
      const totalPrice = repPrice + managerPrice;
      const totalSeats = repSeats + (managerSeatIncluded ? 1 : 0);

      // Update text
      document.getElementById('repSeatsText').textContent = `${repSeats} rep seat${repSeats !== 1 ? 's' : ''}`;
      document.getElementById('repSeatsPrice').textContent = `$${repPrice.toLocaleString()}/month`;
      document.getElementById('totalPrice').textContent = `$${totalPrice.toLocaleString()}/month`;

      // Show/hide manager seat line
      const managerSeatLine = document.getElementById('managerSeatLine');
      if (managerSeatIncluded) {
        managerSeatLine.style.display = 'flex';
      } else {
        managerSeatLine.style.display = 'none';
      }
    }

    // Update pricing when seats change
    seatsInput.addEventListener('input', updatePricing);
    managerSeatCheckbox.addEventListener('change', updatePricing);

    // Handle form submission
    document.getElementById('setupForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const teamName = document.getElementById('teamName').value.trim();
      const email = document.getElementById('email').value.trim();
      const seats = parseInt(document.getElementById('seats').value);
      const managerSeatIncluded = managerSeatCheckbox.checked;
      const btn = document.getElementById('submitBtn');

      if (!teamName || !email || !seats || seats < 1) {
        showError('Please fill in all required fields');
        return;
      }

      // Disable button and show loading
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Setting up your team...';
      errorDiv.classList.remove('show');

      try {
        // Create Stripe Checkout session
        const response = await fetch(`${BACKEND_URL}/api/team/checkout/create`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            teamName,
            email,
            seats,
            managerSeatIncluded
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Failed to create checkout session');
        }

        // Redirect to Stripe Checkout
        window.location.href = data.checkoutUrl;

      } catch (error) {
        console.error('❌ Checkout error:', error);
        showError(error.message);
        btn.disabled = false;
        btn.innerHTML = 'Continue to Payment →';
      }
    });

    function showError(message) {
      errorDiv.textContent = message;
      errorDiv.classList.add('show');
    }

    // Floating particles effect (matching index.html and signup.html)
    function createParticle(initialY = null) {
      const particle = document.createElement('div');
      const size = Math.random() * 6 + 3;
      particle.style.cssText = `
        position: fixed;
        width: ${size}px;
        height: ${size}px;
        background: var(--accent);
        border-radius: 50%;
        pointer-events: none;
        z-index: 0;
        opacity: ${Math.random() * 0.4 + 0.2};
        box-shadow: 0 0 8px rgba(0, 113, 227, 0.4);
      `;
      
      const startX = Math.random() * window.innerWidth;
      const startY = initialY !== null ? initialY : window.innerHeight - 10;
      
      particle.style.left = startX + 'px';
      particle.style.top = startY + 'px';
      
      document.body.appendChild(particle);
      
      const duration = Math.random() * 15000 + 8000;
      const horizontalMovement = (Math.random() - 0.5) * 100;
      
      particle.animate([
        { transform: `translate(0, 0)`, opacity: particle.style.opacity },
        { transform: `translate(${horizontalMovement}px, -${window.innerHeight + 20}px)`, opacity: particle.style.opacity },
        { transform: `translate(${horizontalMovement * 2}px, -${window.innerHeight * 2}px)`, opacity: 0 }
      ], {
        duration: duration,
        easing: 'linear'
      }).onfinish = () => particle.remove();
    }
    
    // Create initial particles at various heights for immediate effect
    for (let i = 0; i < 10; i++) {
      setTimeout(() => {
        createParticle(Math.random() * window.innerHeight);
      }, i * 150);
    }
    
    // Start continuous particle animation
    setInterval(createParticle, 800);
  </script>
</body>
</html>
