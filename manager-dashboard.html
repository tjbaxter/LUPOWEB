<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUPO Manager Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --surface-hover: #1a1a1a;
            --border: #222;
            --text: #fff;
            --text-dim: #888;
            --text-muted: #666;
            --accent: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            font-size: 14px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        header {
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
        }
        
        .logo {
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        .header-info {
            display: flex;
            align-items: center;
            gap: 2rem;
        }
        
        .header-stat {
            text-align: right;
        }
        
        .header-stat-label {
            font-size: 0.625rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
        }
        
        .header-stat-value {
            font-size: 1.125rem;
            font-weight: 600;
        }
        
        /* Main Container */
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* KPI Section */
        .kpi-section {
            width: 100%;
            margin-bottom: 3rem;
            text-align: center;
        }
        
        .kpi-value {
            font-size: 5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .kpi-label {
            font-size: 1rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .kpi-subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }
        
        .kpi-sparkline {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.875rem;
        }
        
        .trend-positive {
            color: var(--success);
        }
        
        .trend-negative {
            color: var(--danger);
        }
        
        /* Metrics Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            width: 100%;
            margin-bottom: 3rem;
        }
        
        .metric-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .metric-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        
        .metric-value {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .metric-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
            margin-bottom: 0.25rem;
        }
        
        .metric-subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        /* Time Filter */
        .time-filter {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 3rem;
        }
        
        .filter-btn {
            padding: 0.75rem 1.5rem;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-dim);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.15s;
        }
        
        .filter-btn:hover {
            background: var(--surface-hover);
            color: var(--text);
        }
        
        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--text);
        }
        
        /* Action Button */
        .action-section {
            width: 100%;
            text-align: center;
        }
        
        .primary-btn {
            display: inline-block;
            padding: 1rem 2rem;
            background: var(--accent);
            color: var(--text);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        
        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }
        
        /* Loading State */
        .skeleton {
            background: linear-gradient(90deg, var(--surface) 25%, var(--surface-hover) 50%, var(--surface) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .metrics-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .kpi-value {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">LUPO</div>
        <div class="header-info">
            <div class="header-stat">
                <div class="header-stat-label">Organization</div>
                <div class="header-stat-value" id="orgName">--</div>
            </div>
            <div class="header-stat">
                <div class="header-stat-label">Reps Active</div>
                <div class="header-stat-value" id="repsActive">--</div>
            </div>
            <div class="header-stat">
                <div class="header-stat-label">Live Now</div>
                <div class="header-stat-value" id="liveCalls" style="color: var(--text-dim);">--</div>
            </div>
        </div>
    </header>
    
    <div class="container">
        <!-- Time Filter -->
        <div class="time-filter">
            <button class="filter-btn active" data-period="today">Today</button>
            <button class="filter-btn" data-period="week">This Week</button>
            <button class="filter-btn" data-period="month">This Month</button>
        </div>
        
        <!-- Main KPI -->
        <div class="kpi-section">
            <div class="kpi-value skeleton" id="criticalCount" style="display: inline-block; width: 200px; height: 100px;">--</div>
            <div class="kpi-label">Critical Moments Detected</div>
            <div class="kpi-subtitle">Objections and risks LUPO flagged</div>
            <div class="kpi-sparkline" id="criticalTrend"></div>
        </div>
        
        <!-- Supporting Metrics -->
        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-value skeleton" id="callsWithLUPO" style="display: inline-block; width: 80px; height: 40px;">--</div>
                <div class="metric-label">LUPO Coverage</div>
                <div class="metric-subtitle">% of calls with assistance</div>
            </div>
            
            <div class="metric-card">
                <div class="metric-value skeleton" id="momentumRate" style="display: inline-block; width: 80px; height: 40px;">--</div>
                <div class="metric-label">Forward Momentum</div>
                <div class="metric-subtitle">% securing next steps</div>
            </div>
            
            <div class="metric-card">
                <div class="metric-value skeleton" id="topObjection" style="display: inline-block; width: 120px; height: 40px;">--</div>
                <div class="metric-label">Top Objection</div>
                <div class="metric-subtitle" id="objectionCount">this period</div>
            </div>
            
            <div class="metric-card">
                <div class="metric-value skeleton" id="totalCalls" style="display: inline-block; width: 80px; height: 40px;">--</div>
                <div class="metric-label">Total Calls</div>
                <div class="metric-subtitle">analyzed this period</div>
            </div>
        </div>
        
        <!-- Action Button -->
        <div class="action-section">
            <a href="#" class="primary-btn" id="contextBtn">Configure Sales Context</a>
        </div>
    </div>
    
    <script>
        let currentPeriod = 'today';
        
        async function init() {
            // Auth setup (simplified)
            const token = localStorage.getItem('lupo_token');
            const apiKey = localStorage.getItem('lupo_apikey');
            
            if (!token && !apiKey) {
                window.location.href = '/login.html?redirect=manager';
                return;
            }
            
            window.authHeaders = {};
            if (token) window.authHeaders['Authorization'] = `Bearer ${token}`;
            if (apiKey) window.authHeaders['X-API-Key'] = apiKey;
            
            // Setup context button
            document.getElementById('contextBtn').href = `/sales-context.html?${token ? 'token=' + token : ''}`;
            
            await loadData();
            setupListeners();
            
            // Refresh every 30 seconds
            setInterval(loadData, 30000);
        }
        
        async function loadData() {
            try {
                // Load org info
                const orgRes = await fetch('https://lupo-backend.fly.dev/sales/org', {
                    headers: window.authHeaders
                });
                
                if (orgRes.ok) {
                    const org = await orgRes.json();
                    document.getElementById('orgName').textContent = org.companyName || 'Enterprise';
                    document.getElementById('orgName').classList.remove('skeleton');
                }
                
                // Load global analytics
                const dataRes = await fetch(`https://lupo-backend.fly.dev/sales/global-analytics?period=${currentPeriod}`, {
                    headers: window.authHeaders
                });
                
                if (dataRes.ok) {
                    const data = await dataRes.json();
                    updateDashboard(data.metrics);
                }
            } catch (error) {
                console.error('Load failed:', error);
            }
        }
        
        function updateDashboard(metrics) {
            // Main KPI - Show raw count with gradient effect
            const countEl = document.getElementById('criticalCount');
            countEl.textContent = metrics.criticalMoments || '0';
            countEl.classList.remove('skeleton');
            countEl.style = '';
            
            // Trend with percentage change
            const trendEl = document.getElementById('criticalTrend');
            if (metrics.criticalTrend && metrics.criticalTrend !== 0) {
                const isPositive = metrics.criticalTrend > 0;
                trendEl.innerHTML = `
                    <span class="${isPositive ? 'trend-positive' : 'trend-negative'}">
                        ${isPositive ? '↑' : '↓'} ${Math.abs(metrics.criticalTrend)}% from previous ${currentPeriod === 'today' ? 'day' : currentPeriod}
                    </span>
                `;
            } else {
                trendEl.innerHTML = '<span>No change from previous period</span>';
            }
            
            // LUPO Coverage - show as percentage
            const usageEl = document.getElementById('callsWithLUPO');
            usageEl.textContent = `${metrics.usageRate || 0}%`;
            usageEl.classList.remove('skeleton');
            usageEl.style = '';
            
            // Forward Momentum - show as percentage
            const momentumEl = document.getElementById('momentumRate');
            momentumEl.textContent = `${metrics.momentumRate || 0}%`;
            momentumEl.classList.remove('skeleton');
            momentumEl.style = '';
            
            // Top Objection
            const objectionEl = document.getElementById('topObjection');
            const periodLabel = currentPeriod === 'today' ? 'today' : `this ${currentPeriod}`;
            if (metrics.topObjection) {
                objectionEl.textContent = metrics.topObjection.type;
                document.getElementById('objectionCount').textContent = `appeared ${metrics.topObjection.count}× ${periodLabel}`;
            } else {
                objectionEl.textContent = 'None yet';
                document.getElementById('objectionCount').textContent = 'no objections tracked';
            }
            objectionEl.classList.remove('skeleton');
            objectionEl.style = '';
            
            // Total Calls
            document.getElementById('totalCalls').textContent = metrics.totalCalls || 0;
            document.getElementById('totalCalls').classList.remove('skeleton');
            document.getElementById('totalCalls').style = '';
            
            // Header stats
            document.getElementById('repsActive').textContent = metrics.totalReps || 0;
            document.getElementById('liveCalls').textContent = metrics.activeCalls || 0;
            document.getElementById('liveCalls').style.color = metrics.activeCalls > 0 ? 'var(--success)' : 'var(--text-dim)';
        }
        
        function setupListeners() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentPeriod = e.target.dataset.period;
                    loadData();
                });
            });
        }
        
        // Start
        init();
    </script>
</body>
</html>
