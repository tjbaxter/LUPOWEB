<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating...</title>
    <link rel="icon" type="image/png" href="/LUPO_LOGO copy 1.png">
    <link rel="apple-touch-icon" href="/LUPO_LOGO copy 1.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 48px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        h1 {
            color: #333;
            margin-bottom: 12px;
            font-size: 28px;
        }
        
        p {
            color: #666;
            font-size: 16px;
            line-height: 1.5;
        }
        
        .error {
            color: #dc3545;
            margin-top: 20px;
        }
        
        .success {
            color: #28a745;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Completing Authentication...</h1>
        <p id="status">Please wait while we log you in to LUPO</p>
    </div>

    <script>
        (async function() {
            console.log('Starting OAuth callback...');
            
            // Get URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const state = urlParams.get('state');
            const error = urlParams.get('error');
            
            console.log('Code:', code ? code.substring(0, 20) + '...' : 'none');
            console.log('State:', state ? state.substring(0, 20) + '...' : 'none');
            
            if (error) {
                document.getElementById('status').textContent = 'Authentication cancelled';
                document.getElementById('status').className = 'error';
                setTimeout(() => window.location.href = '/login', 2000);
                return;
            }
            
            if (!code || !state) {
                document.getElementById('status').textContent = 'Invalid authentication response';
                document.getElementById('status').className = 'error';
                setTimeout(() => window.location.href = '/login', 2000);
                return;
            }
            
            try {
                // Determine provider from state or URL
                let provider = urlParams.get('provider');
                if (!provider) {
                    // Try to infer from referrer or state
                    provider = window.location.pathname.includes('github') ? 'github' : 'google';
                }
                
                console.log('Provider:', provider);
                console.log('Redirect URI:', window.location.origin + window.location.pathname);
                
                // Send to backend
                const response = await fetch('https://lupo-backend.fly.dev/auth/callback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        code,
                        state,
                        provider,
                        redirectUri: window.location.origin + window.location.pathname
                    })
                });
                
                const data = await response.json();
                console.log('Response:', data);
                
                if (data.success && data.sessionKey) {
                    // Store session key for LUPO to poll
                    const pollData = {
                        sessionKey: data.sessionKey,
                        timestamp: Date.now()
                    };
                    
                    // FIXED: Use IPC to notify Electron app (preferred method)
                    if (window.electronAPI && window.electronAPI.notifyAuthSuccess) {
                        console.log('✅ Notifying Electron app via IPC:', data.sessionKey);
                        window.electronAPI.notifyAuthSuccess(data.sessionKey);
                    } else {
                        // Fallback to localStorage for web browser
                        localStorage.setItem('lupo_auth_poll', JSON.stringify(pollData));
                        console.log('✅ Stored session key in localStorage (fallback)');
                    }
                    
                    // Store OAuth data for signup.html
                    const oauthData = {
                        email: data.user?.email || '',
                        name: data.user?.name || '',
                        token: data.sessionKey,
                        provider: provider
                    };
                    localStorage.setItem('lupo_oauth_temp', JSON.stringify(oauthData));
                    
                    // Show success
                    document.getElementById('status').textContent = 'Authentication successful! Setting up your account...';
                    document.getElementById('status').className = 'success';
                    
                    // Redirect to success page with OAuth parameters
                    setTimeout(() => {
                        window.location.href = `/signup?oauth=true&provider=${provider}`;
                    }, 1500);
                    
                } else {
                    throw new Error(data.error || 'Authentication failed');
                }
                
            } catch (err) {
                console.error('Auth error:', err);
                document.getElementById('status').textContent = err.message || 'Authentication failed';
                document.getElementById('status').className = 'error';
                setTimeout(() => window.location.href = '/login', 3000);
            }
        })();
    </script>
</body>
</html>
