<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating - LUPO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f7;
            --accent: #0071e3;
            --border: rgba(0, 0, 0, 0.08);
            --success: #34c759;
            --error: #ff3b30;
        }
        
        @media (prefers-color-scheme: dark) {
            :root {
                --text-primary: #f5f5f7;
                --text-secondary: #a1a1a6;
                --bg-primary: #000000;
                --bg-secondary: #161617;
                --accent: #2997ff;
                --border: rgba(255, 255, 255, 0.08);
                --success: #32d74b;
                --error: #ff453a;
            }
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .callback-container {
            text-align: center;
            max-width: 400px;
            width: 100%;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        /* Loading spinner */
        .loading-icon {
            width: 60px;
            height: 60px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            margin: 0 auto 24px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .callback-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .callback-message {
            font-size: 17px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }
        
        /* Error state */
        .error-icon {
            width: 60px;
            height: 60px;
            background: var(--error);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 30px;
            color: white;
        }
        
        .error-message {
            color: var(--error);
            margin-bottom: 24px;
        }
        
        .action-button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s ease;
        }
        
        .action-button:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }
        
        .secondary-button {
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
            margin-top: 12px;
        }
        
        .secondary-button:hover {
            background: var(--accent);
            color: white;
        }
        
        /* Authentication instructions box */
        .auth-instructions {
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.95;
                transform: scale(1.02);
            }
        }
        
        /* Manual auth modal */
        .manual-auth-modal {
            animation: modalSlideIn 0.3s ease;
        }
        
        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translate(-50%, -60%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }
    </style>
</head>
<body>
    <div class="callback-container" id="callbackContainer">
        <div class="loading-icon"></div>
        <h1 class="callback-title">Authenticating...</h1>
        <p class="callback-message">Please wait while we complete your sign in</p>
    </div>
    
    <script>
        // Parse URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const state = urlParams.get('state');
        const error = urlParams.get('error');
        const provider = urlParams.get('provider') || detectProvider();
        
        // Detect provider from state or referrer
        function detectProvider() {
            if (state && state.includes('google')) return 'google';
            if (state && state.includes('github')) return 'github';
            if (document.referrer.includes('google')) return 'google';
            if (document.referrer.includes('github')) return 'github';
            return 'unknown';
        }
        
        // CRITICAL FIX: Safe base64 encoding that handles Unicode
        function safeBase64Encode(str) {
            // Convert string to UTF-8 bytes, then to base64
            const utf8Bytes = new TextEncoder().encode(str);
            const binaryString = String.fromCharCode(...utf8Bytes);
            return btoa(binaryString);
        }
        
        // Handle OAuth callback
        async function handleCallback() {
            const container = document.getElementById('callbackContainer');
            
            // Check for errors
            if (error) {
                showError(error === 'access_denied' ? 
                    'Authentication cancelled' : 
                    'Authentication failed');
                return;
            }
            
            // Check for authorization code
            if (!code) {
                showError('No authorization code received');
                return;
            }
            
            try {
                console.log('Starting OAuth callback...');
                console.log('Code:', code);
                console.log('State:', state);
                console.log('Provider:', provider);
                console.log('Redirect URI:', window.location.origin + window.location.pathname);
                
                // Exchange code for token
                const response = await fetch('https://lupo-backend.fly.dev/auth/callback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        code,
                        state,
                        provider,
                        redirectUri: window.location.origin + window.location.pathname
                    })
                });
                
                console.log('Response status:', response.status);
                const responseText = await response.text();
                console.log('Response text:', responseText);
                
                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (e) {
                    console.error('Failed to parse response:', e);
                    throw new Error('Server returned invalid response: ' + responseText);
                }
                
                console.log('Parsed data:', data);
                
                if (data.success) {
                    // Handle both response formats - nested user object or direct properties
                    const userData = data.user || {
                        email: data.email,
                        name: data.name,
                        tier: data.tier || 'free'
                    };
                    
                    // Clean up CV data if it exists to avoid encoding issues
                    // Remove or simplify CV data that might contain problematic characters
                    if (userData.cv) {
                        // Keep only essential CV fields, remove raw text with special characters
                        userData.cv = {
                            filename: userData.cv.filename,
                            uploadedAt: userData.cv.uploadedAt,
                            // Don't include rawText or analysis with special characters
                        };
                    }
                    
                    // Store in localStorage (more reliable than sessionStorage)
                    localStorage.setItem('lupo_oauth_temp', JSON.stringify({
                        email: userData.email,
                        provider: provider,
                        token: data.token,
                        name: userData.name,
                        user: userData
                    }));
                    
                    // Prepare auth for clipboard
                    const authPackage = {
                        token: data.token,
                        user: {
                            email: userData.email,
                            name: userData.name,
                            tier: userData.tier || 'free'
                            // Don't include CV data in clipboard auth to avoid encoding issues
                        },
                        timestamp: Date.now(),
                        source: 'oauth_callback',
                        provider: provider
                    };
                    
                    // Use safe encoding for clipboard data
                    let clipboardData;
                    try {
                        const encodedAuth = safeBase64Encode(JSON.stringify(authPackage));
                        clipboardData = `LUPO_AUTH:${encodedAuth}`;
                    } catch (encodeErr) {
                        console.error('Encoding error:', encodeErr);
                        // Fallback: Use minimal auth data
                        const minimalAuth = {
                            token: data.token,
                            user: {
                                email: userData.email,
                                name: userData.name || userData.email.split('@')[0],
                                tier: userData.tier || 'free'
                            },
                            timestamp: Date.now(),
                            source: 'oauth_callback',
                            provider: provider
                        };
                        const encodedAuth = safeBase64Encode(JSON.stringify(minimalAuth));
                        clipboardData = `LUPO_AUTH:${encodedAuth}`;
                    }
                    
                    // Try to copy to clipboard first
                    navigator.clipboard.writeText(clipboardData).then(() => {
                        console.log('✅ Auth data prepared in clipboard');
                        
                        // Show success message
                        container.innerHTML = `
                            <div style="width: 60px; height: 60px; background: var(--success); 
                                        border-radius: 50%; display: flex; align-items: center; 
                                        justify-content: center; margin: 0 auto 24px; 
                                        font-size: 30px; color: white;">✓</div>
                            <h1 class="callback-title">Success!</h1>
                            <p class="callback-message">Authentication complete!</p>
                            <div style="margin-top: 20px; padding: 20px; background: rgba(0, 113, 227, 0.1); 
                                        border-radius: 12px; border: 2px solid var(--accent);">
                                <p style="margin: 0; font-weight: 600; color: var(--accent);">
                                    Switch to the LUPO app to complete login
                                </p>
                                <p style="margin: 8px 0 0 0; font-size: 14px; color: var(--text-secondary);">
                                    LUPO will automatically detect your authentication.
                                </p>
                            </div>
                            <button class="action-button" onclick="window.close()" style="margin-top: 20px;">
                                Close This Window
                            </button>
                        `;
                        
                        // Also redirect to signup page as backup
                        setTimeout(() => {
                            window.location.href = `/signup.html?oauth=true&provider=${provider}`;
                        }, 2000);
                        
                        // Try to focus the LUPO app window (won't launch new instance)
                        window.blur();
                        
                    }).catch(err => {
                        console.error('Clipboard write failed:', err);
                        
                        // Fallback: Still redirect but warn user
                        container.innerHTML = `
                            <div class="error-icon">⚠️</div>
                            <h1 class="callback-title">Manual Step Required</h1>
                            <p class="callback-message">Please complete login in LUPO</p>
                            <a href="/signup.html?oauth=true&provider=${provider}" class="action-button">
                                Continue
                            </a>
                        `;
                        
                        // Auto-redirect after a moment
                        setTimeout(() => {
                            window.location.href = `/signup.html?oauth=true&provider=${provider}`;
                        }, 2000);
                    });
                    
                } else {
                    console.error('Backend returned error:', data);
                    showError(data.error || 'Authentication failed');
                }
                
            } catch (err) {
                console.error('Callback error:', err);
                console.error('Error details:', err.message, err.stack);
                showError('Something went wrong. Please try again.');
            }
        }
        
        function showError(message) {
            const container = document.getElementById('callbackContainer');
            container.innerHTML = `
                <div class="error-icon">✕</div>
                <h1 class="callback-title">Authentication Failed</h1>
                <p class="error-message">${message}</p>
                <a href="/signup.html" class="action-button">Try Again</a>
                <br>
                <a href="/" class="action-button secondary-button">Go Home</a>
            `;
        }
        
        // Start the callback process
        handleCallback();
    </script>
</body>
</html>
