<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUPO - Sales Intelligence Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --text-primary: #ffffff;
            --text-secondary: #8a8a8e;
            --bg-primary: #000000;
            --bg-secondary: rgba(22, 22, 23, 0.98);
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --border: rgba(255, 255, 255, 0.06);
            --border-focus: rgba(255, 255, 255, 0.12);
            --success: #10b981;
            --error: #ef4444;
            --warning: #3b82f6;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            font-weight: 400;
            letter-spacing: -0.022em;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            position: relative;
            overflow: hidden;
        }
        
        /* Subtle gradient background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(0, 113, 227, 0.06) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(0, 113, 227, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 1;
        }
        
        /* Animated gradient orb */
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(-30px, -10px) scale(1.02); }
        }
        
        body::after {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle at center, rgba(41, 151, 255, 0.08) 0%, transparent 70%);
            filter: blur(60px);
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        /* Logo */
        .logo-link {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-decoration: none;
            color: var(--text-primary);
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.03em;
            transition: opacity 0.3s ease;
            z-index: 10;
        }
        
        .logo-link:hover {
            opacity: 0.8;
        }
        
        /* Container */
        .signup-container {
            width: 100%;
            max-width: 420px;
            background: var(--bg-secondary);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px;
            position: relative;
            z-index: 10;
            opacity: 0;
            animation: fadeIn 0.6s ease forwards;
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        /* Header */
        .signup-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .signup-header h1 {
            font-size: 48px;
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
        }
        
        .signup-header p {
            font-size: 18px;
            color: var(--text-secondary);
            font-weight: 400;
        }
        
        /* Form Steps */
        .form-step {
            display: none;
            opacity: 0;
            animation: stepFade 0.4s ease forwards;
        }
        
        .form-step.active {
            display: block;
        }
        
        @keyframes stepFade {
            from { 
                opacity: 0;
                transform: translateY(10px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Form Fields */
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-secondary);
            letter-spacing: -0.01em;
        }
        
        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 16px;
            font-family: inherit;
            color: var(--text-primary);
            transition: all 0.2s ease;
            -webkit-appearance: none;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--border-focus);
            background: rgba(255, 255, 255, 0.03);
        }
        
        .form-input.error {
            border-color: var(--error);
        }
        
        .error-message {
            font-size: 13px;
            color: var(--error);
            margin-top: 6px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        /* Password Strength - Minimal */
        .password-strength {
            margin-top: 8px;
            height: 2px;
            background: var(--border);
            border-radius: 1px;
            overflow: hidden;
        }
        
        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
            border-radius: 1px;
        }
        
        .password-strength-bar.weak {
            width: 33%;
            background: #6b7280;
        }
        
        .password-strength-bar.medium {
            width: 66%;
            background: #3b82f6;
        }
        
        .password-strength-bar.strong {
            width: 100%;
            background: #10b981;
        }
        
        /* Buttons */
        .form-button {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
            letter-spacing: -0.01em;
        }
        
        .form-button:hover:not(:disabled) {
            background: var(--accent-hover);
        }
        
        .form-button:active:not(:disabled) {
            transform: scale(0.98);
        }
        
        .form-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .secondary-button {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            margin-top: 12px;
        }
        
        .secondary-button:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
        }
        
        /* Social Auth - Refined */
        .social-auth {
            margin-bottom: 32px;
        }
        
        .social-button {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            letter-spacing: -0.01em;
        }
        
        .social-button:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: var(--border-focus);
        }
        
        .social-icon {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.8;
        }
        
        /* Processing State - Sophisticated */
        .processing-container {
            text-align: center;
            padding: 60px 0;
        }
        
        .processing-dots {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 24px;
        }
        
        .processing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            opacity: 0.3;
            animation: processFade 1.4s ease-in-out infinite;
        }
        
        .processing-dot:nth-child(1) { animation-delay: 0s; }
        .processing-dot:nth-child(2) { animation-delay: 0.2s; }
        .processing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes processFade {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }
        
        /* Success State - Minimal */
        .success-container {
            text-align: center;
            padding: 60px 0;
        }
        
        .success-icon {
            width: 64px;
            height: 64px;
            border: 2px solid var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 28px;
            color: var(--success);
            opacity: 0;
            animation: successFade 0.6s ease forwards;
        }
        
        @keyframes successFade {
            to { opacity: 1; }
        }
        
        /* Footer */
        .signup-footer {
            text-align: center;
            margin-top: 48px;
            padding-top: 24px;
            font-size: 14px;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
        }
        
        .signup-footer a {
            color: var(--text-primary);
            text-decoration: none;
            transition: opacity 0.2s ease;
        }
        
        .signup-footer a:hover {
            opacity: 0.7;
        }
        
        /* Enterprise indicator */
        .enterprise-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(0, 113, 227, 0.1);
            border: 1px solid rgba(0, 113, 227, 0.2);
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            color: var(--accent);
            margin-bottom: 24px;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }
        
        /* Mobile Optimization */
        @media (max-width: 480px) {
            .signup-container {
                padding: 32px 24px;
            }
            
            .signup-header h1 {
                font-size: 36px;
            }
            
            .signup-header p {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <a href="/" class="logo-link">
        <img src="/LUPO_LOGO copy 1.png" alt="LUPO" style="height: 64px; width: auto;">
    </a>
    
    <div class="signup-container">
        <!-- Step 1: Email -->
        <div class="form-step active" id="emailStep">
            <div class="signup-header">
                <h1>Get Started</h1>
                <p>Real-time sales intelligence for closing more deals</p>
            </div>
            
            <!-- Social Auth Options -->
            <div class="social-auth">
                <button class="social-button" onclick="signUpWithGoogle()">
                    <span class="social-icon">
                        <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                            <path d="M19.8 10.2273C19.8 9.51818 19.7364 8.83636 19.6182 8.18182H10.2V12.05H15.6109C15.3927 13.3 14.6564 14.3591 13.5491 15.0682V17.5773H16.8182C18.7164 15.8364 19.8 13.2727 19.8 10.2273Z" fill="#4285F4"/>
                            <path d="M10.2 20C12.9 20 15.1727 19.1045 16.8182 17.5773L13.5491 15.0682C12.6091 15.6682 11.4227 16.0227 10.2 16.0227C7.59545 16.0227 5.38636 14.2636 4.58636 11.9H1.22727V14.4909C2.88182 17.7591 6.30909 20 10.2 20Z" fill="#34A853"/>
                            <path d="M4.58636 11.9C4.38636 11.3 4.27273 10.6636 4.27273 10C4.27273 9.33636 4.38636 8.7 4.58636 8.1V5.50909H1.22727C0.545455 6.85909 0.2 8.38636 0.2 10C0.2 11.6136 0.545455 13.1409 1.22727 14.4909L4.58636 11.9Z" fill="#FBBC05"/>
                            <path d="M10.2 3.97727C11.5455 3.97727 12.7455 4.42727 13.6955 5.30909L16.8909 2.11364C15.1682 0.5 12.8955 0 10.2 0C6.30909 0 2.88182 2.24091 1.22727 5.50909L4.58636 8.1C5.38636 5.73636 7.59545 3.97727 10.2 3.97727Z" fill="#EA4335"/>
                        </svg>
                    </span>
                    Continue with Google
                </button>
                
                <button class="social-button" onclick="signUpWithGitHub()">
                    <span class="social-icon">
                        <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 0C4.477 0 0 4.477 0 10c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.607.069-.607 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0110 4.836c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C17.137 18.17 20 14.42 20 10c0-5.523-4.477-10-10-10z" clip-rule="evenodd"/>
                        </svg>
                    </span>
                    Continue with GitHub
                </button>
            </div>
            
            <form onsubmit="handleEmailSubmit(event)">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        class="form-input" 
                        placeholder="you@company.com"
                        required
                        autocomplete="email"
                    >
                    <div class="error-message" id="emailError"></div>
                </div>
                
                <button type="submit" class="form-button" id="emailButton">
                    Continue
                </button>
            </form>
            
            <div class="signup-footer">
                Already have an account? <a href="/login.html">Sign in</a>
            </div>
        </div>
        
        <!-- Step 2: Password -->
        <div class="form-step" id="passwordStep">
            <div class="signup-header">
                <h1>Secure Your Account</h1>
            </div>
            
            <form onsubmit="handlePasswordSubmit(event)">
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input" 
                        placeholder="Enter password"
                        required
                        minlength="8"
                        autocomplete="new-password"
                        oninput="checkPasswordStrength()"
                    >
                    <div class="password-strength">
                        <div class="password-strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="error-message" id="passwordError"></div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        class="form-input" 
                        placeholder="Confirm password"
                        required
                        autocomplete="new-password"
                    >
                    <div class="error-message" id="confirmError"></div>
                </div>
                
                <button type="submit" class="form-button" id="passwordButton">
                    Create Account
                </button>
                <button type="button" class="form-button secondary-button" onclick="goBack()">
                    Back
                </button>
            </form>
        </div>
        
        <!-- Processing State -->
        <div class="form-step" id="processingStep">
            <div class="processing-container">
                <div class="processing-dots">
                    <div class="processing-dot"></div>
                    <div class="processing-dot"></div>
                    <div class="processing-dot"></div>
                </div>
                <h2 style="font-size: 24px; font-weight: 500; color: var(--text-secondary);">Setting up your account</h2>
            </div>
        </div>
        
        <!-- Success State -->
        <div class="form-step" id="successStep">
            <div class="success-container">
                <div class="success-icon">✓</div>
                <h1 style="font-size: 32px; font-weight: 600; margin-bottom: 8px;">Account Created</h1>
                <p style="font-size: 16px; color: var(--text-secondary);">
                    LUPO is updating. You can close this window.
                </p>
            </div>
        </div>
    </div>
    
    <script>
        let userData = {
            email: '',
            password: '',
            provider: 'email'
        };
        
        // Social Auth Functions
        async function signUpWithGoogle() {
            const redirectUrl = window.location.origin + '/auth/callback.html';
            window.location.href = 'https://lupo-backend.fly.dev/auth/google?redirect=' + encodeURIComponent(redirectUrl);
        }
        
        async function signUpWithGitHub() {
            const redirectUrl = window.location.origin + '/auth/callback.html';
            window.location.href = 'https://lupo-backend.fly.dev/auth/github?redirect=' + encodeURIComponent(redirectUrl);
        }
        
        // Check for OAuth callback and invite codes
        window.addEventListener('load', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const inviteCode = urlParams.get('invite');
            const orgName = urlParams.get('org');
            const isOAuth = urlParams.get('oauth') === 'true';
            const provider = urlParams.get('provider');
            
            // Show enterprise indicator if joining via invite
            if (inviteCode && orgName) {
                const header = document.querySelector('.signup-header');
                const indicator = document.createElement('div');
                indicator.className = 'enterprise-indicator';
                indicator.textContent = `Joining ${orgName}`;
                header.insertBefore(indicator, header.firstChild);
            }
            
            // Handle OAuth callback
            if (isOAuth && provider) {
                let authData = null;
                try {
                    const stored = localStorage.getItem('lupo_oauth_temp');
                    if (stored) {
                        authData = JSON.parse(stored);
                    }
                } catch (e) {
                    console.error('Auth data error:', e);
                }
                
                if (authData && authData.email && authData.token) {
                    userData.provider = provider;
                    userData.token = authData.token;
                    userData.email = authData.email;
                    userData.name = authData.name;
                    
                    showProcessingState();
                    setTimeout(autoCreateAccount, 500);
                }
            }
            
            // Focus email input
            const emailInput = document.getElementById('email');
            if (emailInput && !isOAuth) emailInput.focus();
        });
        
        function handleEmailSubmit(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const emailError = document.getElementById('emailError');
            
            if (!isValidEmail(email)) {
                emailError.textContent = 'Please enter a valid email address';
                emailError.classList.add('show');
                document.getElementById('email').classList.add('error');
                return;
            }
            
            userData.email = email;
            emailError.classList.remove('show');
            document.getElementById('email').classList.remove('error');
            
            // Move to password step
            document.getElementById('emailStep').classList.remove('active');
            document.getElementById('passwordStep').classList.add('active');
            document.getElementById('password').focus();
        }
        
        function handlePasswordSubmit(event) {
            event.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const passwordError = document.getElementById('passwordError');
            const confirmError = document.getElementById('confirmError');
            
            // Reset errors
            passwordError.classList.remove('show');
            confirmError.classList.remove('show');
            
            if (password.length < 8) {
                passwordError.textContent = 'Password must be at least 8 characters';
                passwordError.classList.add('show');
                document.getElementById('password').classList.add('error');
                return;
            }
            
            if (password !== confirmPassword) {
                confirmError.textContent = 'Passwords do not match';
                confirmError.classList.add('show');
                document.getElementById('confirmPassword').classList.add('error');
                return;
            }
            
            userData.password = password;
            
            // Show processing and create account
            showProcessingState();
            setTimeout(createAccount, 500);
        }
        
        async function createAccount() {
            const urlParams = new URLSearchParams(window.location.search);
            const inviteCode = urlParams.get('invite');
            
            try {
                const response = await fetch('https://lupo-backend.fly.dev/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: userData.email,
                        password: userData.password,
                        inviteCode: inviteCode
                    })
                });
                
                const data = await response.json();
                
                if (data.success && data.sessionKey) {
                    // Store for LUPO polling
                    const pollData = {
                        sessionKey: data.sessionKey,
                        timestamp: Date.now()
                    };
                    localStorage.setItem('lupo_auth_poll', JSON.stringify(pollData));
                    
                    // Show success
                    showSuccessState();
                    
                    // Customize message if joining team
                    if (inviteCode && data.organization) {
                        const successContainer = document.querySelector('.success-container');
                        successContainer.innerHTML = `
                            <div class="success-icon">✓</div>
                            <h1 style="font-size: 32px; font-weight: 600; margin-bottom: 8px;">Welcome to ${data.organization.name}</h1>
                            <p style="font-size: 16px; color: var(--text-secondary);">
                                You've joined your team workspace.
                            </p>
                        `;
                    }
                } else {
                    throw new Error(data.error || 'Failed to create account');
                }
            } catch (err) {
                console.error('Account creation error:', err);
                alert('Error: ' + err.message);
                // Return to password step
                showPasswordState();
            }
        }
        
        async function autoCreateAccount() {
            try {
                const authData = JSON.parse(
                    localStorage.getItem('lupo_oauth_temp') || '{}'
                );
                
                if (!authData.token || !authData.email) {
                    throw new Error('No authentication data found');
                }
                
                localStorage.removeItem('lupo_oauth_temp');
                showSuccessState();
                
            } catch (err) {
                console.error('Account setup error:', err);
                alert('Setup error. Please try again.');
            }
        }
        
        function showProcessingState() {
            document.querySelectorAll('.form-step').forEach(step => {
                step.classList.remove('active');
            });
            document.getElementById('processingStep').classList.add('active');
        }
        
        function showSuccessState() {
            document.querySelectorAll('.form-step').forEach(step => {
                step.classList.remove('active');
            });
            document.getElementById('successStep').classList.add('active');
        }
        
        function showPasswordState() {
            document.querySelectorAll('.form-step').forEach(step => {
                step.classList.remove('active');
            });
            document.getElementById('passwordStep').classList.add('active');
        }
        
        function goBack() {
            document.getElementById('passwordStep').classList.remove('active');
            document.getElementById('emailStep').classList.add('active');
            document.getElementById('email').focus();
        }
        
        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const strengthBar = document.getElementById('strengthBar');
            
            strengthBar.classList.remove('weak', 'medium', 'strong');
            
            if (password.length === 0) {
                strengthBar.style.width = '0%';
                return;
            }
            
            let strength = 0;
            
            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^a-zA-Z\d]/.test(password)) strength++;
            
            if (strength <= 2) {
                strengthBar.classList.add('weak');
            } else if (strength <= 4) {
                strengthBar.classList.add('medium');
            } else {
                strengthBar.classList.add('strong');
            }
        }
        
        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }
    </script>
</body>
</html>
