<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – LUPO Client Portal</title>
    <meta name="description" content="Access your LUPO AI sales agent dashboard">
    <link rel="icon" type="image/png" href="/lupo-head-logo copy.png">
    <link rel="apple-touch-icon" href="/lupo-head-logo copy.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --text-primary: #f5f5f7;
            --text-secondary: #a1a1a6;
            --bg-primary: #000000;
            --bg-secondary: #161617;
            --accent: #2997ff;
            --accent-hover: #409cff;
            --border: rgba(255, 255, 255, 0.08);
            --gradient-purple: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --error: #ff3b30;
            --success: #34c759;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.47059;
            font-weight: 400;
            letter-spacing: -0.022em;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Animated Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            opacity: 0.03;
            background: radial-gradient(circle at 20% 50%, var(--accent) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, #764ba2 0%, transparent 50%),
                        radial-gradient(circle at 40% 20%, #667eea 0%, transparent 50%);
            animation: bgShift 30s ease-in-out infinite;
        }
        
        @keyframes bgShift {
            0%, 100% { transform: rotate(0deg) scale(1); }
            33% { transform: rotate(120deg) scale(1.1); }
            66% { transform: rotate(240deg) scale(0.9); }
        }
        
        /* Login Container */
        .login-container {
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
            padding: 20px;
            animation: fadeInUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Login Card */
        .login-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 40px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
        }
        
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.1), 
                transparent);
        }
        
        /* Logo Section */
        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo-icon img {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }
        
        .login-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(180deg, 
                var(--text-primary) 0%, 
                rgba(255, 255, 255, 0.8) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .login-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            font-weight: 400;
        }
        
        /* Form Styles */
        .login-form {
            margin-top: 32px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
            letter-spacing: -0.01em;
        }
        
        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-primary);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 16px;
            font-family: inherit;
            transition: all 0.2s ease;
            letter-spacing: -0.01em;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(41, 151, 255, 0.03);
            box-shadow: 0 0 0 4px rgba(41, 151, 255, 0.08);
        }
        
        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }
        
        .form-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 8px;
            letter-spacing: -0.01em;
            position: relative;
            overflow: hidden;
        }
        
        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.2), 
                transparent);
            transition: left 0.5s;
        }
        
        .submit-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(41, 151, 255, 0.35);
        }
        
        .submit-btn:hover::before {
            left: 100%;
        }
        
        .submit-btn:active {
            transform: translateY(0);
        }
        
        .submit-btn:disabled {
            background: var(--text-secondary);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        /* Forgot Password Link */
        .forgot-password {
            text-align: center;
            margin-top: 20px;
        }
        
        .forgot-password a {
            font-size: 14px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s ease;
        }
        
        .forgot-password a:hover {
            color: var(--accent);
        }
        
        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 32px 0;
            opacity: 0.5;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        
        .divider span {
            padding: 0 16px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        /* Sign Up Section */
        .signup-section {
            text-align: center;
            padding: 28px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.08) 0%, rgba(118, 75, 162, 0.08) 100%);
            border-radius: 16px;
            border: 1px solid rgba(102, 126, 234, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        .signup-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(102, 126, 234, 0.5), 
                transparent);
        }
        
        .signup-section p {
            font-size: 15px;
            color: var(--text-primary);
            font-weight: 500;
            margin-bottom: 16px;
            white-space: nowrap;
        }
        
        .signup-section a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            outline: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 6px 24px rgba(102, 126, 234, 0.35);
            position: relative;
            overflow: hidden;
        }
        
        .signup-section a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.2), 
                transparent);
            transition: left 0.5s;
        }
        
        .signup-section a:hover {
            background: linear-gradient(135deg, #7c8efc 0%, #8a5ab8 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.45);
        }
        
        .signup-section a:hover::before {
            left: 100%;
        }
        
        .signup-section a svg {
            width: 16px;
            height: 16px;
        }
        
        /* Error Message */
        .error-message {
            display: none;
            padding: 12px 16px;
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid rgba(255, 59, 48, 0.3);
            border-radius: 10px;
            color: var(--error);
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .error-message.active {
            display: block;
            animation: shake 0.4s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        
        /* Back to Home Link */
        .back-home {
            text-align: center;
            margin-top: 24px;
        }
        
        .back-home a {
            font-size: 14px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .back-home a:hover {
            color: var(--text-primary);
        }
        
        .back-home svg {
            width: 14px;
            height: 14px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .login-card {
                padding: 36px 28px;
            }
            
            .login-title {
                font-size: 24px;
            }
            
            .login-subtitle {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- Background Animation -->
    <div class="animated-bg"></div>
    
    <!-- Login Container -->
    <div class="login-container">
        <div class="login-card">
            <!-- Logo Section -->
            <div class="logo-section">
                <div class="logo-icon">
                    <img src="/lupo-head-logo copy.png" alt="LUPO">
                </div>
                <h1 class="login-title">Client Portal</h1>
                <p class="login-subtitle">Access your AI sales dashboard</p>
            </div>
            
            <!-- Error Message -->
            <div class="error-message" id="errorMessage">
                Invalid email or password
            </div>
            
            <!-- Login Form -->
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        placeholder="you@company.com"
                        autocomplete="email"
                        required 
                    />
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="••••••••"
                        autocomplete="current-password"
                        required 
                    />
                </div>
                
                <button type="submit" class="submit-btn" id="submitBtn">
                    Login
                </button>
            </form>
            
            <!-- Forgot Password -->
            <div class="forgot-password">
                <a href="#" onclick="handleForgotPassword(event)">Forgot password?</a>
            </div>
            
            <!-- Divider -->
            <div class="divider">
                <span>or</span>
            </div>
            
            <!-- Sign Up Section -->
            <div class="signup-section">
                <p>Want an AI agent handling your inbound calls?</p>
                <a href="https://cal.com/tombaxter/lupo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/>
                    </svg>
                    Book a Demo
                </a>
            </div>
        </div>
        
        <!-- Back to Home -->
        <div class="back-home">
            <a href="/">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Back to home
            </a>
        </div>
    </div>
    
    <script>
        // Determine API URL based on environment
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:3000'  // Local development
            : 'https://lupo-sales-api.fly.dev';   // Production
        
        // Handle form submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const errorMessage = document.getElementById('errorMessage');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Hide previous errors
            errorMessage.classList.remove('active');
            
            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Logging in...';
            
            try {
                const response = await fetch(`${API_URL}/v1/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    
                    // Store token and user info
                    localStorage.setItem('lupo_token', data.token);
                    localStorage.setItem('lupo_user', JSON.stringify(data.user));
                    
                    // Show success and redirect
                    submitBtn.textContent = '✓ Success!';
                    
                    // Check if temporary password (requires change)
                    if (password.startsWith('Temp-')) {
                        setTimeout(() => {
                            window.location.href = '/portal/change-password.html';
                        }, 500);
                    } else {
                        // Route based on user role
                        if (data.user.role === 'ADMIN') {
                            setTimeout(() => {
                                window.location.href = '/portal/admin/motherboard.html';
                            }, 500);
                        } else {
                            setTimeout(() => {
                                window.location.href = '/portal/dashboard.html';
                            }, 500);
                        }
                    }
                } else {
                    const error = await response.json().catch(() => ({ error: 'Unknown error' }));
                    console.error('Login failed:', response.status, error);
                    console.error('Request body:', { email, password: '***' });
                    // Show error
                    errorMessage.textContent = error.error || 'Invalid email or password';
                    errorMessage.classList.add('active');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Login';
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMessage.textContent = 'Connection error. Please try again.';
                errorMessage.classList.add('active');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Login';
            }
        });
        
        // Handle forgot password
        function handleForgotPassword(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            
            if (email) {
                // TODO: Implement password reset
                alert(`Password reset link will be sent to ${email}`);
            } else {
                alert('Please enter your email address first');
                document.getElementById('email').focus();
            }
        }
        
        // Auto-focus email field on load
        window.addEventListener('load', function() {
            document.getElementById('email').focus();
        });
        
        // Handle Enter key in password field
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
        
        // Floating particles effect (blue orbs)
        function createParticle() {
            const particle = document.createElement('div');
            particle.style.cssText = `
                position: fixed;
                width: ${Math.random() * 4 + 2}px;
                height: ${Math.random() * 4 + 2}px;
                background: var(--accent);
                border-radius: 50%;
                pointer-events: none;
                z-index: 0;
                opacity: ${Math.random() * 0.4 + 0.1};
                box-shadow: 0 0 ${Math.random() * 10 + 5}px var(--accent);
            `;
            
            const startX = Math.random() * window.innerWidth;
            const startY = window.innerHeight + 10;
            
            particle.style.left = startX + 'px';
            particle.style.top = startY + 'px';
            
            document.body.appendChild(particle);
            
            const duration = Math.random() * 20000 + 10000;
            const horizontalMovement = (Math.random() - 0.5) * 100;
            
            particle.animate([
                { transform: `translate(0, 0)`, opacity: 0 },
                { transform: `translate(${horizontalMovement}px, -${window.innerHeight + 20}px)`, opacity: particle.style.opacity },
                { transform: `translate(${horizontalMovement * 2}px, -${window.innerHeight * 2}px)`, opacity: 0 }
            ], {
                duration: duration,
                easing: 'linear'
            }).onfinish = () => particle.remove();
        }
        
        // Start particle animation
        setInterval(createParticle, 1000);
    </script>
</body>
</html>
