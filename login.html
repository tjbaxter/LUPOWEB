<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - LUPO</title>
    <link rel="icon" type="image/png" href="/LUPO_LOGO copy 1.png">
    <link rel="apple-touch-icon" href="/LUPO_LOGO copy 1.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --text-primary: #ffffff;
            --text-secondary: #8a8a8e;
            --bg-primary: #000000;
            --bg-secondary: rgba(22, 22, 23, 0.98);
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --border: rgba(255, 255, 255, 0.06);
            --border-focus: rgba(255, 255, 255, 0.12);
            --success: #10b981;
            --error: #ef4444;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            font-weight: 400;
            letter-spacing: -0.022em;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            position: relative;
            overflow: hidden;
        }
        
        /* Subtle gradient background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(0, 113, 227, 0.06) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(0, 113, 227, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 1;
        }
        
        /* Animated gradient orb */
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(-30px, -10px) scale(1.02); }
        }
        
        body::after {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle at center, rgba(41, 151, 255, 0.08) 0%, transparent 70%);
            filter: blur(60px);
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        /* Logo */
        .logo-link {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: opacity 0.3s ease;
            z-index: 10;
        }
        
        .logo-link:hover {
            opacity: 0.8;
        }
        
        .logo-text {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--text-primary);
        }
        
        /* Container */
        .login-container {
            width: 100%;
            max-width: 600px;
            background: var(--bg-secondary);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 36px 48px;
            margin-top: 100px;
            position: relative;
            z-index: 10;
            opacity: 0;
            animation: fadeIn 0.6s ease forwards;
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        /* Header */
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .login-header h1 {
            font-size: 36px;
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
        }
        
        .login-header p {
            font-size: 16px;
            color: var(--text-secondary);
            font-weight: 400;
            letter-spacing: -0.01em;
        }
        
        /* Form */
        .form-section {
            margin-top: 28px;
        }
        
        .form-group {
            margin-bottom: 22px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
            color: var(--text-secondary);
            letter-spacing: -0.01em;
        }
        
        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 16px;
            font-family: inherit;
            color: var(--text-primary);
            transition: all 0.2s ease;
            -webkit-appearance: none;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--border-focus);
            background: rgba(255, 255, 255, 0.03);
        }
        
        .form-input.error {
            border-color: var(--error);
        }
        
        .error-message {
            font-size: 13px;
            color: var(--error);
            margin-top: 6px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .forgot-password {
            text-align: right;
            margin-top: -18px;
            margin-bottom: 24px;
        }
        
        .forgot-password a {
            color: var(--accent);
            text-decoration: none;
            font-size: 13px;
            transition: opacity 0.2s ease;
            letter-spacing: -0.01em;
        }
        
        .forgot-password a:hover {
            opacity: 0.7;
        }
        
        /* Buttons */
        .form-button {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: -0.01em;
            margin-top: 8px;
        }
        
        .form-button:hover:not(:disabled) {
            background: var(--accent-hover);
        }
        
        .form-button:active:not(:disabled) {
            transform: scale(0.98);
        }
        
        .form-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Social Auth Buttons */
        .social-auth {
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
        }
        
        .social-button {
            flex: 1;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: -0.01em;
            white-space: nowrap;
        }
        
        .social-button:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: var(--border-focus);
        }
        
        .social-icon {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0 20px;
            color: var(--text-secondary);
            font-size: 12px;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        
        .divider span {
            padding: 0 16px;
            font-weight: 500;
        }
        
        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 18px;
            font-size: 14px;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
        }
        
        .login-footer a {
            color: var(--text-primary);
            text-decoration: none;
            transition: opacity 0.2s ease;
        }
        
        .login-footer a:hover {
            opacity: 0.7;
        }
        
        /* Loading State */
        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Success/Error Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 15px;
            transition: transform 0.3s ease;
            z-index: 10000;
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .toast.success {
            background: rgba(16, 185, 129, 0.9);
            color: white;
        }
        
        .toast.error {
            background: rgba(239, 68, 68, 0.9);
            color: white;
        }
        
        .toast.info {
            background: rgba(0, 113, 227, 0.9);
            color: white;
        }
        
        /* Mobile Optimization */
        @media (max-width: 480px) {
            .login-container {
                padding: 32px 24px;
                margin-top: 100px;
            }
            
            .logo-link {
                top: 24px;
            }
            
            .logo-text {
                font-size: 36px;
            }
            
            .login-header h1 {
                font-size: 32px;
            }
            
            .login-header p {
                font-size: 16px;
            }
            
            .social-auth {
                flex-direction: column;
            }
        }
        
        /* Floating particles effect */
        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0.3;
            }
            50% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100vh) translateX(50px);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <a href="/" class="logo-link">
        <img src="/LUPO_LOGO copy 1.png" alt="LUPO" style="height: 60px; width: auto;">
        <span class="logo-text">LUPO</span>
    </a>
    
    <div class="login-container">
        <div class="login-header">
            <h1>Welcome back</h1>
            <p>Sign in to continue</p>
        </div>
        
        <form id="loginForm" onsubmit="handleLogin(event)" class="form-section">
            <div class="form-group">
                <label class="form-label" for="email">Work email address</label>
                <input 
                    type="email" 
                    id="email"
                    name="email"
                    class="form-input" 
                    placeholder="john@company.com"
                    required
                    autocomplete="username"
                >
                <div class="error-message" id="emailError"></div>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input 
                    type="password" 
                    id="password"
                    name="password"
                    class="form-input" 
                    placeholder="Enter your password"
                    required
                    autocomplete="current-password"
                    minlength="6"
                >
                <div class="error-message" id="passwordError"></div>
            </div>
            
            <div class="forgot-password">
                <a href="/forgot-password.html">Forgot password?</a>
            </div>
            
            <button type="submit" class="form-button" id="loginButton">
                Sign In
            </button>
        </form>
        
        <div class="login-footer">
            Don't have an account? <a href="/signup.html">Sign up</a>
        </div>
    </div>
    
    <script>
        // Toast notification
        function showToast(message, type = 'info') {
            const existingToast = document.querySelector('.toast');
            if (existingToast) existingToast.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            requestAnimationFrame(() => {
                toast.classList.add('show');
            });
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }
        
        // Handle login form submission
        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const button = document.getElementById('loginButton');
            const emailError = document.getElementById('emailError');
            const passwordError = document.getElementById('passwordError');
            
            // Reset errors
            emailError.classList.remove('show');
            passwordError.classList.remove('show');
            document.getElementById('email').classList.remove('error');
            document.getElementById('password').classList.remove('error');
            
            // Disable button
            button.disabled = true;
            button.innerHTML = 'Signing in<span class="loading-spinner"></span>';
            
            try {
                const response = await fetch('https://lupo-backend.fly.dev/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success && data.sessionKey) {
                    // Store session key for LUPO to find
                    const pollData = {
                        sessionKey: data.sessionKey,
                        timestamp: Date.now()
                    };
                    
                    // Broadcast to any LUPO instances
                    localStorage.setItem('lupo_auth_poll', JSON.stringify(pollData));
                    
                    showToast('Signed in successfully!', 'success');
                    
                    // Check if coming from app
                    const urlParams = new URLSearchParams(window.location.search);
                    const fromApp = urlParams.get('from') === 'app';
                    
                    if (fromApp) {
                        // Show success message for app users
                        button.innerHTML = '✓ Signed In';
                        button.disabled = true;
                        
                        // Update the container to show success
                        const loginContainer = document.querySelector('.login-container');
                        if (loginContainer) {
                            loginContainer.innerHTML = `
                                <div style="text-align: center; padding: 60px 20px;">
                                    <div style="width: 64px; height: 64px; border: 2px solid #10b981; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 28px; color: #10b981;">✓</div>
                                    <h1 style="font-size: 32px; font-weight: 600; margin-bottom: 8px;">Login Successful!</h1>
                                    <p style="color: var(--text-secondary); margin-top: 16px;">
                                        LUPO is updating. You can close this window.
                                    </p>
                                </div>
                            `;
                        }
                    } else {
                        // Normal web redirect
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 1000);
                    }
                    
                } else {
                    // Handle errors
                    if (data.error?.includes('Invalid credentials')) {
                        passwordError.textContent = 'Invalid email or password';
                        passwordError.classList.add('show');
                        document.getElementById('password').classList.add('error');
                    } else if (data.error?.includes('sign in with')) {
                        emailError.textContent = data.error;
                        emailError.classList.add('show');
                        document.getElementById('email').classList.add('error');
                    } else {
                        throw new Error(data.error || 'Login failed');
                    }
                    
                    button.disabled = false;
                    button.textContent = 'Sign In';
                }
                
            } catch (err) {
                console.error('Login error:', err);
                showToast('Error: ' + err.message, 'error');
                button.disabled = false;
                button.textContent = 'Sign In';
            }
        }
        
        // Check if coming from app
        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const fromApp = urlParams.get('from') === 'app';
            
            if (fromApp) {
                showToast('Sign in to continue with LUPO', 'info');
            }
            
            // Focus email field
            document.getElementById('email').focus();
        });
        
        // ============================================
        // Polling Communication Handler
        // ============================================
        
        // Broadcast session key when available
        window.addEventListener('storage', (event) => {
            if (event.key === 'lupo_auth_poll' && event.newValue) {
                try {
                    const data = JSON.parse(event.newValue);
                    console.log('📡 Broadcasting auth session key from login');
                    
                    // Send message to any listening LUPO instances
                    if (window.opener) {
                        window.opener.postMessage({
                            type: 'lupo-auth-ready',
                            sessionKey: data.sessionKey
                        }, '*');
                    }
                    
                    // Clear after broadcasting
                    setTimeout(() => {
                        localStorage.removeItem('lupo_auth_poll');
                    }, 1000);
                    
                } catch (err) {
                    console.error('Failed to broadcast auth:', err);
                }
            }
        });
        
        // Floating particles effect
        function createParticle(initialY = null) {
            const particle = document.createElement('div');
            const size = Math.random() * 8 + 4;
            particle.style.cssText = `
                position: fixed;
                width: ${size}px;
                height: ${size}px;
                background: #0071e3;
                border-radius: 50%;
                pointer-events: none;
                z-index: 0;
                opacity: ${Math.random() * 0.6 + 0.3};
                box-shadow: 0 0 10px rgba(0, 113, 227, 0.5);
            `;
            
            const startX = Math.random() * window.innerWidth;
            const startY = initialY !== null ? initialY : window.innerHeight - 10;
            
            particle.style.left = startX + 'px';
            particle.style.top = startY + 'px';
            
            document.body.appendChild(particle);
            
            const duration = Math.random() * 15000 + 8000;
            const horizontalMovement = (Math.random() - 0.5) * 100;
            
            particle.animate([
                { transform: `translate(0, 0)`, opacity: particle.style.opacity },
                { transform: `translate(${horizontalMovement}px, -${window.innerHeight + 20}px)`, opacity: particle.style.opacity },
                { transform: `translate(${horizontalMovement * 2}px, -${window.innerHeight * 2}px)`, opacity: 0 }
            ], {
                duration: duration,
                easing: 'linear'
            }).onfinish = () => particle.remove();
        }
        
        // Create initial particles at various heights for immediate effect
        for (let i = 0; i < 10; i++) {
            setTimeout(() => {
                createParticle(Math.random() * window.innerHeight);
            }, i * 100);
        }
        
        // Start continuous particle animation
        setInterval(createParticle, 300);
    </script>
</body>
</html>
