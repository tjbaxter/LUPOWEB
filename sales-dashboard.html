<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calls - LUPO</title>
    <link rel="icon" type="image/png" href="/LUPO_LOGO copy 1.png">
    <link rel="apple-touch-icon" href="/LUPO_LOGO copy 1.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }
        
        /* Header */
        .header {
            height: 52px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        .logo {
            font-weight: 600;
            font-size: 28px;
            letter-spacing: -0.5px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }
        
        .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            color: white;
        }
        
        /* Main Layout */
        .main-container {
            display: flex;
            height: calc(100vh - 52px);
        }
        
        /* Sidebar */
        .sidebar {
            width: 380px;
            background: #050505;
            border-right: 1px solid rgba(255,255,255,0.08);
            display: flex;
            flex-direction: column;
        }
        
        .search-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        
        .search-box {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 10px 16px;
            color: white;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .search-box:focus {
            outline: none;
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.2);
        }
        
        .search-box::placeholder {
            color: rgba(255,255,255,0.4);
        }
        
        .filters {
            padding: 0 20px 16px;
            display: flex;
            gap: 8px;
        }
        
        .filter-btn {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-btn:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.9);
        }
        
        .filter-btn.active {
            background: rgba(59,130,246,0.2);
            border-color: #3b82f6;
            color: #3b82f6;
        }
        
        /* Calls List */
        .calls-list {
            flex: 1;
            overflow-y: auto;
        }
        
        .call-item {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
        }
        
        .call-item:hover {
            background: rgba(255,255,255,0.02);
        }
        
        .call-item.active {
            background: rgba(59,130,246,0.1);
        }
        
        .call-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: #3b82f6;
        }
        
        .call-customer {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .call-details {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: rgba(255,255,255,0.4);
        }
        
        .search-match-preview {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-top: 6px;
            font-style: italic;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .search-match-preview mark {
            background: rgba(251, 191, 36, 0.3);
            color: #fbbf24;
            font-style: normal;
            padding: 0 2px;
            border-radius: 2px;
        }
        
        /* Content Area */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        /* Transcript View */
        .transcript-view {
            flex: 1;
            overflow-y: auto;
            padding: 32px 40px;
            padding-bottom: 140px;
            background: #000;
        }
        
        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: rgba(255,255,255,0.3);
            font-size: 14px;
        }
        
        .transcript-line {
            margin-bottom: 24px;
            max-width: 720px;
            animation: fadeIn 0.3s ease;
        }
        
        .transcript-line.highlighted {
            background: rgba(251, 191, 36, 0.1);
            padding: 12px;
            border-radius: 8px;
            margin-left: -12px;
            margin-right: -12px;
        }
        
        .transcript-text {
            font-size: 15px;
            line-height: 1.7;
            color: rgba(255,255,255,0.85);
        }
        
        .transcript-text mark {
            background: rgba(251, 191, 36, 0.4);
            color: #fbbf24;
            padding: 2px 4px;
            border-radius: 3px;
        }
        
        .transcript-time {
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            margin-top: 6px;
        }
        
        /* AI Panel */
        .ai-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to bottom, rgba(10,10,10,0) 0%, rgba(10,10,10,0.95) 20%, rgba(10,10,10,0.98) 100%);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-top: 1px solid rgba(255,255,255,0.15);
            padding: 24px 40px;
            transform: translateY(0);
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
        }
        
        .ai-panel.expanded {
            transform: translateY(-200px);
        }
        
        .ai-suggestions {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .suggestion-chip {
            padding: 7px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        
        .suggestion-chip:hover {
            background: rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.95);
            border-color: rgba(255,255,255,0.2);
        }
        
        .ai-input-container {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .ai-input {
            flex: 1;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            resize: none;
            height: 44px;
            font-family: inherit;
            transition: all 0.2s;
        }
        
        .ai-input:focus {
            outline: none;
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.25);
        }
        
        .ai-input::placeholder {
            color: rgba(255,255,255,0.4);
        }
        
        .ai-send {
            width: 44px;
            height: 44px;
            background: #3b82f6;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }
        
        .ai-send:hover:not(:disabled) {
            opacity: 0.9;
        }
        
        .ai-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        /* AI Response Overlay */
        .ai-response-overlay {
            position: absolute;
            bottom: 80px;
            left: 40px;
            right: 40px;
            max-width: 720px;
            background: rgba(20,20,20,0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 24px;
            display: none;
            animation: slideUp 0.3s cubic-bezier(0.4,0,0.2,1);
            max-height: 60vh;
            overflow-y: auto;
        }
        
        .ai-response-overlay.show {
            display: block;
        }
        
        .ai-response-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .ai-response-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.4);
        }
        
        .ai-close {
            width: 24px;
            height: 24px;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: all 0.2s;
        }
        
        .ai-close:hover {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.8);
        }
        
        .ai-response-content {
            font-size: 14px;
            line-height: 1.6;
            color: rgba(255,255,255,0.85);
        }
        
        .ai-response-content p {
            margin-bottom: 12px;
        }
        
        .ai-response-content p:last-child {
            margin-bottom: 0;
        }
        
        .ai-response-content strong {
            color: white;
            font-weight: 500;
        }
        
        /* Loading */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.15);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">LUPO</div>
        <div class="user-info">
            <span id="userName">Loading...</span>
            <div class="user-avatar" id="userAvatar">?</div>
        </div>
    </div>
    
    <div class="main-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="search-header">
                <input type="text" class="search-box" placeholder="Search calls and transcripts..." id="searchInput">
            </div>
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="today">Today</button>
                <button class="filter-btn" data-filter="week">Week</button>
                <button class="filter-btn" data-filter="month">Month</button>
            </div>
            <div class="calls-list" id="callsList">
                <!-- Calls loaded here -->
            </div>
        </div>
        
        <!-- Content Area -->
        <div class="content-area">
            <div class="transcript-view" id="transcriptView">
                <div class="empty-state">Select a call to view transcript</div>
            </div>
            
            <!-- AI Panel -->
            <div class="ai-panel" id="aiPanel">
                <div class="ai-suggestions">
                    <button class="suggestion-chip" onclick="quickAsk('Summarize the key points from this call')">Summarize</button>
                    <button class="suggestion-chip" onclick="quickAsk('What objections were raised?')">Objections</button>
                    <button class="suggestion-chip" onclick="quickAsk('What are the next steps?')">Next steps</button>
                    <button class="suggestion-chip" onclick="quickAsk('Draft a follow-up email')">Email draft</button>
                    <button class="suggestion-chip" onclick="quickAsk('What questions did they ask?')">Questions</button>
                </div>
                <div class="ai-input-container">
                    <input type="text" class="ai-input" id="aiInput" placeholder="Ask anything about this call...">
                    <button class="ai-send" id="aiSend" onclick="submitAI()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
            
            <!-- AI Response Overlay -->
            <div class="ai-response-overlay" id="aiResponse">
                <div class="ai-response-header">
                    <div class="ai-response-title">AI Analysis</div>
                    <button class="ai-close" onclick="closeAI()">×</button>
                </div>
                <div class="ai-response-content" id="aiContent"></div>
            </div>
        </div>
    </div>
    
    <script>
        let currentCall = null;
        let calls = [];
        let callsWithTranscripts = new Map(); // Store full data for each call
        let currentFilter = 'all';
        let currentSearchQuery = '';
        
        // Initialize
        async function init() {
            await loadUserInfo();
            await loadCalls();
            setupEventListeners();
        }
        
        // Auth headers
        function getAuthHeaders() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token') || localStorage.getItem('lupo_session');
            const apiKey = urlParams.get('key');
            
            const headers = {};
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            } else if (apiKey) {
                headers['X-API-Key'] = apiKey;
            }
            return headers;
        }
        
        // Load user info
        async function loadUserInfo() {
            try {
                const headers = getAuthHeaders();
                const response = await fetch('https://lupo-backend.fly.dev/sales/me', {
                    headers: headers
                });
                
                if (response.ok) {
                    const data = await response.json();
                    const userName = document.getElementById('userName');
                    const userAvatar = document.getElementById('userAvatar');
                    
                    userName.textContent = data.user?.name || data.user?.email || 'User';
                    userAvatar.textContent = (data.user?.name || data.user?.email || 'U').charAt(0).toUpperCase();
                }
            } catch (err) {
                console.error('Failed to load user info:', err);
            }
        }
        
        // Load calls
        async function loadCalls(filter = 'all') {
            try {
                const headers = getAuthHeaders();
                let url = 'https://lupo-backend.fly.dev/sales/calls?limit=100';
                
                // Add date filters
                const now = new Date();
                if (filter === 'today') {
                    const startOfDay = new Date(now.setHours(0,0,0,0));
                    url += `&startDate=${startOfDay.toISOString()}`;
                } else if (filter === 'week') {
                    const weekAgo = new Date(now.setDate(now.getDate() - 7));
                    url += `&startDate=${weekAgo.toISOString()}`;
                } else if (filter === 'month') {
                    const monthAgo = new Date(now.setMonth(now.getMonth() - 1));
                    url += `&startDate=${monthAgo.toISOString()}`;
                }
                
                const response = await fetch(url, { headers });
                
                if (!response.ok) throw new Error('Failed to load calls');
                
                const data = await response.json();
                calls = data.calls || [];
                
                // Load transcripts for search functionality
                await loadTranscriptsForSearch(calls.slice(0, 20)); // Load first 20 for performance
                
                renderCalls(calls);
                
            } catch (err) {
                console.error('Failed to load calls:', err);
                document.getElementById('callsList').innerHTML = 
                    '<div style="padding: 20px; color: rgba(255,255,255,0.3); font-size: 13px; text-align: center;">No calls found</div>';
            }
        }
        
        // Load transcripts for search
        async function loadTranscriptsForSearch(callsList) {
            const headers = getAuthHeaders();
            
            for (const call of callsList) {
                if (!callsWithTranscripts.has(call.id)) {
                    try {
                        const response = await fetch(`https://lupo-backend.fly.dev/sales/calls/${call.id}`, { headers });
                        if (response.ok) {
                            const data = await response.json();
                            callsWithTranscripts.set(call.id, data);
                        }
                    } catch (err) {
                        console.error(`Failed to load transcript for ${call.id}:`, err);
                    }
                }
            }
        }
        
        // Search through calls and transcripts
        function searchCalls(query) {
            if (!query) return calls;
            
            const lowerQuery = query.toLowerCase();
            const results = [];
            
            for (const call of calls) {
                let match = null;
                let matchScore = 0;
                
                // Check basic call info
                if ((call.customer || '').toLowerCase().includes(lowerQuery)) {
                    matchScore = 3;
                    match = { type: 'customer', text: call.customer };
                } else if ((call.company || '').toLowerCase().includes(lowerQuery)) {
                    matchScore = 2;
                    match = { type: 'company', text: call.company };
                } else if ((call.context || '').toLowerCase().includes(lowerQuery)) {
                    matchScore = 2;
                    match = { type: 'context', text: call.context };
                }
                
                // Check transcript if loaded
                const fullData = callsWithTranscripts.get(call.id);
                if (fullData && fullData.transcript && !match) {
                    for (const msg of fullData.transcript) {
                        if (msg.text && msg.text.toLowerCase().includes(lowerQuery)) {
                            matchScore = 1;
                            // Find the part of text with the match
                            const startIdx = Math.max(0, msg.text.toLowerCase().indexOf(lowerQuery) - 30);
                            const endIdx = Math.min(msg.text.length, startIdx + 100);
                            let excerpt = msg.text.substring(startIdx, endIdx);
                            if (startIdx > 0) excerpt = '...' + excerpt;
                            if (endIdx < msg.text.length) excerpt = excerpt + '...';
                            
                            match = { 
                                type: 'transcript', 
                                text: excerpt,
                                messageIndex: fullData.transcript.indexOf(msg)
                            };
                            break;
                        }
                    }
                }
                
                if (match) {
                    results.push({ ...call, match, matchScore });
                }
            }
            
            // Sort by match score (higher is better)
            results.sort((a, b) => b.matchScore - a.matchScore);
            
            return results;
        }
        
        // Render calls with search highlights
        function renderCalls(callsList) {
            const container = document.getElementById('callsList');
            
            if (callsList.length === 0) {
                if (currentSearchQuery) {
                    container.innerHTML = '<div style="padding: 20px; color: rgba(255,255,255,0.3); font-size: 13px; text-align: center;">No matching calls found</div>';
                } else {
                    container.innerHTML = '<div style="padding: 20px; color: rgba(255,255,255,0.3); font-size: 13px; text-align: center;">No calls yet</div>';
                }
                return;
            }
            
            container.innerHTML = callsList.map(call => {
                // Build display text
                let displayText;
                if (call.customer && call.customer !== 'Unknown') {
                    if (call.context && call.context !== 'Sales call') {
                        displayText = `${call.context} with ${call.customer}`;
                    } else {
                        displayText = call.customer;
                    }
                } else {
                    displayText = call.context || 'Sales call';
                }
                
                // Add search match preview if available
                let matchPreview = '';
                if (call.match && currentSearchQuery) {
                    const highlightedText = call.match.text.replace(
                        new RegExp(currentSearchQuery, 'gi'),
                        match => `<mark>${match}</mark>`
                    );
                    matchPreview = `<div class="search-match-preview">${highlightedText}</div>`;
                }
                
                return `
                    <div class="call-item" onclick="selectCall('${call.id}', ${call.match?.messageIndex || 'null'})" data-id="${call.id}">
                        <div class="call-customer">${displayText}</div>
                        <div class="call-details">
                            <span>${formatDate(call.date)}</span>
                            <span>•</span>
                            <span>${call.duration || '0:00'}</span>
                            ${call.company ? `<span>•</span><span>${call.company}</span>` : ''}
                        </div>
                        ${matchPreview}
                    </div>
                `;
            }).join('');
        }
        
        // Select call with optional scroll to match
        async function selectCall(callId, messageIndex = null) {
            document.querySelectorAll('.call-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`[data-id="${callId}"]`)?.classList.add('active');
            
            // Clear AI response
            closeAI();
            
            // Show loading
            document.getElementById('transcriptView').innerHTML = 
                '<div class="empty-state"><div class="loading"></div></div>';
            
            try {
                let data = callsWithTranscripts.get(callId);
                
                if (!data) {
                    const headers = getAuthHeaders();
                    const response = await fetch(`https://lupo-backend.fly.dev/sales/calls/${callId}`, {
                        headers: headers
                    });
                    
                    if (!response.ok) throw new Error('Failed to load call');
                    
                    data = await response.json();
                    callsWithTranscripts.set(callId, data);
                }
                
                currentCall = data;
                renderTranscript(data, messageIndex);
                
            } catch (err) {
                console.error('Failed to load call:', err);
                document.getElementById('transcriptView').innerHTML = 
                    '<div class="empty-state">Failed to load transcript</div>';
            }
        }
        
        // Render transcript with optional highlight
        function renderTranscript(data, scrollToIndex = null) {
            const container = document.getElementById('transcriptView');
            
            if (!data.transcript || data.transcript.length === 0) {
                container.innerHTML = '<div class="empty-state">No transcript available</div>';
                return;
            }
            
            const filtered = data.transcript.filter(msg => {
                const text = msg.text || '';
                return text !== 'RESPONSE_COMPLETE' && 
                       text !== 'INTERRUPTED' && 
                       text !== 'USER_READING_MODE' &&
                       text.trim().length > 0;
            });
            
            container.innerHTML = filtered.map((msg, i) => {
                const timestamp = msg.timestamp ? formatTime(msg.timestamp) : '';
                let text = msg.text;
                
                // Highlight search terms if searching
                if (currentSearchQuery) {
                    text = text.replace(
                        new RegExp(currentSearchQuery, 'gi'),
                        match => `<mark>${match}</mark>`
                    );
                }
                
                const isHighlighted = scrollToIndex !== null && i === scrollToIndex;
                
                return `
                    <div class="transcript-line ${isHighlighted ? 'highlighted' : ''}" data-index="${i}">
                        <div class="transcript-text">${text}</div>
                        ${timestamp ? `<div class="transcript-time">${timestamp}</div>` : ''}
                    </div>
                `;
            }).join('');
            
            // Scroll to matched message if specified
            if (scrollToIndex !== null) {
                setTimeout(() => {
                    const element = container.querySelector(`[data-index="${scrollToIndex}"]`);
                    if (element) {
                        element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }, 100);
            } else {
                container.scrollTop = 0;
            }
        }
        
        // Quick ask
        function quickAsk(question) {
            document.getElementById('aiInput').value = question;
            submitAI();
        }
        
        // Submit AI question
        async function submitAI() {
            const input = document.getElementById('aiInput');
            const question = input.value.trim();
            
            if (!question || !currentCall) return;
            
            const sendBtn = document.getElementById('aiSend');
            const responseDiv = document.getElementById('aiResponse');
            const contentDiv = document.getElementById('aiContent');
            
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<div class="loading" style="width: 16px; height: 16px;"></div>';
            
            responseDiv.classList.add('show');
            contentDiv.innerHTML = '<div class="loading"></div> Analyzing...';
            
            try {
                const headers = getAuthHeaders();
                headers['Content-Type'] = 'application/json';
                
                const response = await fetch('https://lupo-backend.fly.dev/sales/ai/analyze', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({
                        question: question,
                        callContext: {
                            customer: currentCall.call?.customerName,
                            company: currentCall.call?.customerCompany,
                            date: currentCall.call?.startTime,
                            duration: currentCall.call?.duration,
                            transcript: currentCall.transcript?.map(t => t.text).join('\n'),
                            analysis: currentCall.analysis
                        }
                    })
                });
                
                if (!response.ok) throw new Error('Analysis failed');
                
                const data = await response.json();
                contentDiv.innerHTML = formatResponse(data.answer || data.response);
                input.value = '';
                
            } catch (err) {
                console.error('AI analysis failed:', err);
                contentDiv.innerHTML = 'Analysis failed. Please try again.';
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                `;
            }
        }
        
        // Close AI response
        function closeAI() {
            document.getElementById('aiResponse').classList.remove('show');
        }
        
        // Format response
        function formatResponse(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/^/, '<p>')
                .replace(/$/, '</p>');
        }
        
        // Setup event listeners
        function setupEventListeners() {
            // Enhanced search
            let searchTimeout;
            document.getElementById('searchInput').addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                currentSearchQuery = e.target.value.trim();
                
                // Debounce search
                searchTimeout = setTimeout(() => {
                    if (currentSearchQuery) {
                        const filtered = searchCalls(currentSearchQuery);
                        renderCalls(filtered);
                    } else {
                        renderCalls(calls);
                    }
                }, 300);
            });
            
            // Filters
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentFilter = e.target.dataset.filter;
                    currentSearchQuery = ''; // Clear search when changing filters
                    document.getElementById('searchInput').value = '';
                    loadCalls(currentFilter);
                });
            });
            
            // AI input enter
            document.getElementById('aiInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    submitAI();
                }
            });
        }
        
        // Helpers
        function formatDate(date) {
            const d = new Date(date);
            const now = new Date();
            const diff = Math.floor((now - d) / (1000 * 60 * 60 * 24));
            
            if (diff === 0) return 'Today';
            if (diff === 1) return 'Yesterday';
            if (diff < 7) return `${diff}d ago`;
            
            return d.toLocaleDateString('en-US', { 
                month: 'short', 
                day: 'numeric' 
            });
        }
        
        function formatTime(timestamp) {
            if (typeof timestamp === 'number' && timestamp < 10000) {
                const mins = Math.floor(timestamp / 60);
                const secs = timestamp % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            }
            return new Date(timestamp).toLocaleTimeString('en-US', {
                hour: 'numeric',
                minute: '2-digit'
            });
        }
        
        // Initialize
        init();
    </script>
</body>
</html>
