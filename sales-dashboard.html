<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Calls - LUPO Sales Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --border: #222;
            --text: #fff;
            --text-dim: #888;
            --accent: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Minimal Header */
        header {
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--text-dim);
            font-size: 0.875rem;
        }
        
        /* Main Layout */
        .container {
            display: grid;
            grid-template-columns: 400px 1fr;
            height: calc(100vh - 65px);
        }
        
        /* Calls List Panel */
        .calls-panel {
            border-right: 1px solid var(--border);
            overflow-y: auto;
            background: var(--surface);
        }
        
        .panel-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--surface);
            z-index: 10;
        }
        
        .panel-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 1rem;
        }
        
        .search-box {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            color: var(--text);
            font-size: 0.875rem;
        }
        
        .filter-buttons {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        
        .filter-btn {
            padding: 0.25rem 0.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-dim);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .filter-btn:hover {
            background: var(--border);
            color: var(--text);
        }
        
        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--text);
        }
        
        .calls-list {
            padding: 0.5rem;
        }
        
        .call-item {
            padding: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s;
            margin-bottom: 0.5rem;
            border: 1px solid transparent;
        }
        
        .call-item:hover {
            background: var(--bg);
            border-color: var(--border);
        }
        
        .call-item.active {
            background: var(--bg);
            border-color: var(--accent);
        }
        
        .call-header-info {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 0.5rem;
        }
        
        .call-customer {
            font-weight: 500;
            margin-bottom: 0.25rem;
        }
        
        .call-company {
            font-size: 0.75rem;
            color: var(--text-dim);
        }
        
        .call-time {
            font-size: 0.75rem;
            color: var(--text-dim);
        }
        
        .call-meta {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
        }
        
        .call-meta-item {
            font-size: 0.75rem;
            color: var(--text-dim);
        }
        
        .call-outcome {
            display: inline-block;
            padding: 0.125rem 0.5rem;
            background: var(--bg);
            border-radius: 3px;
            font-size: 0.625rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .call-outcome.won { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .call-outcome.demo { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .call-outcome.follow-up { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .call-outcome.lost { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        
        /* Call Analysis Panel */
        .analysis-panel {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .analysis-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-dim);
            text-align: center;
            padding: 2rem;
        }
        
        .call-details {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }
        
        .call-info-header {
            margin-bottom: 2rem;
        }
        
        .call-info-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .call-info-subtitle {
            color: var(--text-dim);
        }
        
        /* Call Metrics */
        .metrics-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .metric-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
        }
        
        .metric-value {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        
        .metric-label {
            font-size: 0.625rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
        }
        
        /* Transcript Section */
        .transcript-section {
            margin-bottom: 2rem;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
        }
        
        .transcript-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .transcript-line {
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        
        .transcript-line:last-child {
            border-bottom: none;
        }
        
        .speaker {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }
        
        .speaker.rep { color: var(--accent); }
        .speaker.customer { color: var(--success); }
        
        .transcript-text {
            font-size: 0.875rem;
            line-height: 1.5;
        }
        
        .timestamp {
            font-size: 0.625rem;
            color: var(--text-dim);
            margin-left: 0.5rem;
        }
        
        /* AI Assistant Section */
        .ai-section {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 1.5rem;
        }
        
        .ai-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .ai-title {
            font-size: 0.875rem;
            font-weight: 600;
        }
        
        .ai-status {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .ai-prompt-area {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .ai-input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.75rem;
            color: var(--text);
            font-size: 0.875rem;
            resize: none;
            min-height: 80px;
        }
        
        .ai-suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .suggestion-chip {
            padding: 0.25rem 0.75rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .suggestion-chip:hover {
            background: var(--accent);
            border-color: var(--accent);
        }
        
        .ai-response {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            min-height: 100px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .ai-response-empty {
            color: var(--text-dim);
            font-style: italic;
            text-align: center;
            padding: 2rem;
        }
        
        .ai-response-content {
            font-size: 0.875rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        
        /* Buttons */
        .btn {
            padding: 0.5rem 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .btn:hover {
            background: var(--border);
        }
        
        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
        }
        
        .btn-primary:hover {
            opacity: 0.9;
        }
        
        .btn-icon {
            padding: 0.5rem;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Loading */
        .loading {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Stats Summary */
        .stats-summary {
            display: flex;
            gap: 2rem;
            padding: 1rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        .stat-label {
            font-size: 0.625rem;
            text-transform: uppercase;
            color: var(--text-dim);
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">LUPO Call Analysis</div>
        <div class="user-info">
            <span id="userName">Loading...</span>
            <span>•</span>
            <span id="callsToday">0 calls today</span>
        </div>
    </header>
    
    <div class="container">
        <!-- Calls List -->
        <aside class="calls-panel">
            <div class="panel-header">
                <div class="panel-title">My Call History</div>
                <input type="text" class="search-box" placeholder="Search by customer or company..." id="callSearch">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All Calls</button>
                    <button class="filter-btn" data-filter="today">Today</button>
                    <button class="filter-btn" data-filter="week">This Week</button>
                    <button class="filter-btn" data-filter="won">Won</button>
                    <button class="filter-btn" data-filter="lost">Lost</button>
                </div>
            </div>
            
            <div class="stats-summary">
                <div class="stat-item">
                    <div class="stat-value" id="totalCalls">0</div>
                    <div class="stat-label">Total Calls</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="winRate">0%</div>
                    <div class="stat-label">Win Rate</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="avgQuality">0</div>
                    <div class="stat-label">Avg Quality</div>
                </div>
            </div>
            
            <div class="calls-list" id="callsList">
                <!-- Populated dynamically -->
            </div>
        </aside>
        
        <!-- Call Analysis -->
        <main class="analysis-panel" id="analysisPanel">
            <div class="analysis-empty">
                Select a call to view transcript and analysis
            </div>
        </main>
    </div>
    
    <script>
        let currentCall = null;
        let calls = [];
        let aiProcessing = false;
        
        // Initialize
        async function init() {
            // Get token from URL params
            const urlParams = new URLSearchParams(window.location.search);
            const tokenFromUrl = urlParams.get('token');
            const apiKey = urlParams.get('key');
            
            // Also check localStorage as fallback
            const token = tokenFromUrl || localStorage.getItem('lupo_session');
            
            if (!token && !apiKey) {
                console.error('No authentication found');
                window.location.href = '/login.html';
                return;
            }
            
            // Store token if provided in URL
            if (tokenFromUrl) {
                window.lupoSessionToken = tokenFromUrl;
            }
            
            if (apiKey) {
                window.salesApiKey = apiKey;
            }
            
            await loadUserInfo();
            await loadMyCalls();
            setupEventListeners();
        }
        
        // Get auth headers helper function
        function getAuthHeaders() {
            const headers = {};
            
            // Priority 1: Token from URL or stored
            const token = window.lupoSessionToken || localStorage.getItem('lupo_session');
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
                return headers;
            }
            
            // Priority 2: API key
            const apiKey = window.salesApiKey || new URLSearchParams(window.location.search).get('key');
            if (apiKey) {
                headers['X-API-Key'] = apiKey;
                return headers;
            }
            
            return headers;
        }
        
        // Load user info - FIXED URL
        async function loadUserInfo() {
            try {
                const headers = getAuthHeaders();
                

                const response = await fetch('https://lupo-backend.fly.dev/sales/me', {
                    headers: headers
                });
                
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('userName').textContent = 
                        data.user?.name || data.user?.email || 'Sales Rep';
                }
            } catch (err) {
                console.error('Failed to load user info:', err);
                document.getElementById('userName').textContent = 'Sales Rep';
            }
        }
        
        // Load calls - FIXED URL
        async function loadMyCalls(filter = 'all') {
            try {
                const headers = getAuthHeaders();
                
                // Calculate date filters
                let queryParams = '?limit=100';
                const now = new Date();
                
                if (filter === 'today') {
                    const startOfDay = new Date(now.setHours(0,0,0,0));
                    queryParams += `&startDate=${startOfDay.toISOString()}`;
                } else if (filter === 'week') {
                    const weekAgo = new Date(now.setDate(now.getDate() - 7));
                    queryParams += `&startDate=${weekAgo.toISOString()}`;
                } else if (filter === 'won') {
                    queryParams += '&outcome=closed_won';
                } else if (filter === 'lost') {
                    queryParams += '&outcome=closed_lost';
                }
                
          
                const response = await fetch(`https://lupo-backend.fly.dev/sales/calls${queryParams}`, {
                    headers: headers
                });
                
                if (!response.ok) throw new Error('Failed to load calls');
                
                const data = await response.json();
                calls = data.calls || [];
                
                updateStats();
                renderCalls(calls);
                
                // Update calls today count
                const todaysCalls = calls.filter(c => {
                    const callDate = new Date(c.date);
                    const today = new Date();
                    return callDate.toDateString() === today.toDateString();
                }).length;
                
                document.getElementById('callsToday').textContent = `${todaysCalls} calls today`;
                
            } catch (err) {
                console.error('Failed to load calls:', err);
                renderCalls([]);
            }
        }
        
        // Update statistics
        function updateStats() {
            document.getElementById('totalCalls').textContent = calls.length;
            
            const wonCalls = calls.filter(c => c.outcome === 'closed_won').length;
            const completedCalls = calls.filter(c => c.outcome && c.outcome !== 'ongoing').length;
            const winRate = completedCalls > 0 ? Math.round((wonCalls / completedCalls) * 100) : 0;
            document.getElementById('winRate').textContent = `${winRate}%`;
            
            const avgQuality = calls.reduce((sum, c) => sum + (c.qualityScore || 0), 0) / (calls.length || 1);
            document.getElementById('avgQuality').textContent = Math.round(avgQuality);
        }
        
        // Render calls list
        function renderCalls(callsList) {
            const container = document.getElementById('callsList');
            
            if (callsList.length === 0) {
                container.innerHTML = '<div style="padding: 2rem; text-align: center; color: var(--text-dim);">No calls found</div>';
                return;
            }
            
            container.innerHTML = callsList.map(call => {
                const outcomeClass = call.outcome === 'closed_won' ? 'won' : 
                                   call.outcome === 'closed_lost' ? 'lost' :
                                   call.outcome === 'scheduled_demo' ? 'demo' : 'follow-up';
                
                return `
                    <div class="call-item" onclick="selectCall('${call.id}')">
                        <div class="call-header-info">
                            <div>
                                <div class="call-customer">${call.customer || 'Unknown'}</div>
                                <div class="call-company">${call.company || 'No company'}</div>
                            </div>
                            <div class="call-time">${formatDate(call.date)}</div>
                        </div>
                        <div class="call-meta">
                            <span class="call-meta-item">${call.duration || '0:00'}</span>
                            <span class="call-outcome ${outcomeClass}">${formatOutcome(call.outcome)}</span>
                            ${call.qualityScore ? `<span class="call-meta-item">Quality: ${call.qualityScore}/100</span>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Select and load call details
        async function selectCall(callId) {
            currentCall = calls.find(c => c.id === callId);
            if (!currentCall) return;
            
            // Update UI
            document.querySelectorAll('.call-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            // Load full call details with transcript
            await loadCallDetails(callId);
        }
        
        // Load call details with transcript - FIXED URL
        async function loadCallDetails(callId) {
            try {
                const headers = getAuthHeaders();
    
                const response = await fetch(`https://lupo-backend.fly.dev/sales/calls/${callId}`, {
                    headers: headers
                });
                
                if (!response.ok) throw new Error('Failed to load call details');
                
                const data = await response.json();
                renderCallAnalysis(data);
                
            } catch (err) {
                console.error('Failed to load call details:', err);
                document.getElementById('analysisPanel').innerHTML = `
                    <div class="analysis-empty">Failed to load call details</div>
                `;
            }
        }
        
        // Render call analysis view
        function renderCallAnalysis(data) {
            const panel = document.getElementById('analysisPanel');
            
            panel.innerHTML = `
                <div class="call-details">
                    <div class="call-info-header">
                        <div class="call-info-title">${data.call.customerName || 'Unknown Customer'}</div>
                        <div class="call-info-subtitle">
                            ${data.call.customerCompany || ''} • ${formatDate(data.call.startTime)} • ${data.call.duration || 'Unknown duration'}
                        </div>
                    </div>
                    
                    <div class="metrics-row">
                        <div class="metric-card">
                            <div class="metric-value">${data.analysis?.qualityScore || 0}</div>
                            <div class="metric-label">Quality Score</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-value">${data.analysis?.talkRatio ? Math.round(data.analysis.talkRatio * 100) + '%' : 'N/A'}</div>
                            <div class="metric-label">Talk Ratio</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-value">${data.analysis?.objectionsHandled || 0}/${data.analysis?.objectionsRaised || 0}</div>
                            <div class="metric-label">Objections Handled</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-value">${data.analysis?.winProbability || 0}%</div>
                            <div class="metric-label">Win Probability</div>
                        </div>
                    </div>
                    
                    <div class="transcript-section">
                        <div class="section-header">
                            <div class="section-title">Call Transcript</div>
                            <button class="btn btn-icon" onclick="toggleTranscript()" title="Toggle view">📄</button>
                        </div>
                        <div class="transcript-container" id="transcriptContainer">
                            ${renderTranscript(data.transcript)}
                        </div>
                    </div>
                    
                    ${data.keyMoments && data.keyMoments.length > 0 ? `
                        <div class="transcript-section">
                            <div class="section-header">
                                <div class="section-title">Key Moments</div>
                            </div>
                            <div class="transcript-container">
                                ${data.keyMoments.map(m => `
                                    <div class="transcript-line">
                                        <div class="speaker ${m.handled ? 'rep' : 'customer'}">${m.type.replace(/_/g, ' ')}</div>
                                        <div class="transcript-text">${m.text || m.context}</div>
                                        ${m.response ? `<div style="margin-top: 0.5rem; padding-left: 1rem; border-left: 2px solid var(--accent);"><small>Response: ${m.response}</small></div>` : ''}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}
                </div>
                
                <div class="ai-section">
                    <div class="ai-header">
                        <span class="ai-status"></span>
                        <span class="ai-title">AI Call Assistant</span>
                    </div>
                    
                    <div class="ai-suggestions">
                        <div class="suggestion-chip" onclick="askAI('Summarize this call in 3 bullet points')">📝 Summarize</div>
                        <div class="suggestion-chip" onclick="askAI('Draft a follow-up email based on this call')">✉️ Draft Email</div>
                        <div class="suggestion-chip" onclick="askAI('What could I have done better in this call?')">💡 Coaching Tips</div>
                        <div class="suggestion-chip" onclick="askAI('What is the likelihood of this prospect buying?')">📊 Win Probability</div>
                        <div class="suggestion-chip" onclick="askAI('What are the next steps I should take?')">➡️ Next Steps</div>
                        <div class="suggestion-chip" onclick="askAI('List all objections raised and how they were handled')">🎯 Objections</div>
                    </div>
                    
                    <div class="ai-prompt-area">
                        <textarea class="ai-input" id="aiInput" placeholder="Ask anything about this call... e.g., 'What pain points did the customer mention?' or 'Generate a proposal outline based on their needs'"></textarea>
                        <button class="btn btn-primary" onclick="submitAIQuery()" id="aiSubmitBtn">Ask AI</button>
                    </div>
                    
                    <div class="ai-response" id="aiResponse">
                        <div class="ai-response-empty">Ask a question to get AI insights about this call</div>
                    </div>
                </div>
            `;
            
            // Store call data for AI queries
            window.currentCallData = data;
        }
        
        // Render transcript
        function renderTranscript(transcript) {
            if (!transcript || transcript.length === 0) {
                return '<div style="padding: 2rem; text-align: center; color: var(--text-dim);">No transcript available</div>';
            }
            
            return transcript.map(line => `
                <div class="transcript-line">
                    <div class="speaker ${line.speaker === 'rep' ? 'rep' : 'customer'}">
                        ${line.speaker === 'rep' ? 'You' : 'Customer'}
                        ${line.timestamp ? `<span class="timestamp">${formatTimestamp(line.timestamp)}</span>` : ''}
                    </div>
                    <div class="transcript-text">${line.text}</div>
                </div>
            `).join('');
        }
        
        // AI Query Functions
        async function askAI(question) {
            document.getElementById('aiInput').value = question;
            await submitAIQuery();
        }
        
        async function submitAIQuery() {
            const question = document.getElementById('aiInput').value.trim();
            if (!question || !window.currentCallData) return;
            
            if (aiProcessing) return;
            aiProcessing = true;
            
            const responseDiv = document.getElementById('aiResponse');
            const submitBtn = document.getElementById('aiSubmitBtn');
            
            // Show loading state
            responseDiv.innerHTML = '<div style="padding: 2rem; text-align: center;"><div class="loading"></div> Analyzing call...</div>';
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span>';
            
            try {
                const headers = getAuthHeaders();
                headers['Content-Type'] = 'application/json';
                
                // Prepare call context
                const callContext = {
                    customer: window.currentCallData.call.customerName,
                    company: window.currentCallData.call.customerCompany,
                    date: window.currentCallData.call.startTime,
                    duration: window.currentCallData.call.duration,
                    outcome: window.currentCallData.call.outcome,
                    transcript: window.currentCallData.transcript?.map(t => 
                        `${t.speaker === 'rep' ? 'Rep' : 'Customer'}: ${t.text}`
                    ).join('\n'),
                    keyMoments: window.currentCallData.keyMoments,
                    analysis: window.currentCallData.analysis,
                    nextSteps: window.currentCallData.nextSteps
                };
                
          
                const response = await fetch('https://lupo-backend.fly.dev/sales/ai/analyze', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({
                        question: question,
                        callContext: callContext
                    })
                });
                
                if (!response.ok) throw new Error('AI analysis failed');
                
                const data = await response.json();
                
                // Display response
                responseDiv.innerHTML = `<div class="ai-response-content">${formatAIResponse(data.answer || data.response)}</div>`;
                
                // Clear input
                document.getElementById('aiInput').value = '';
                
            } catch (err) {
                console.error('AI query failed:', err);
                responseDiv.innerHTML = `<div style="padding: 1rem; color: var(--danger);">Failed to get AI response. Please try again.</div>`;
            } finally {
                aiProcessing = false;
                submitBtn.disabled = false;
                submitBtn.textContent = 'Ask AI';
            }
        }
        
        // Format AI response
        function formatAIResponse(response) {
            // Convert markdown-style formatting
            return response
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/^/, '<p>')
                .replace(/$/, '</p>')
                .replace(/•/g, '▸');
        }
        
        // Setup event listeners
        function setupEventListeners() {
            // Search
            document.getElementById('callSearch').addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                const filtered = calls.filter(c => 
                    c.customer?.toLowerCase().includes(query) || 
                    c.company?.toLowerCase().includes(query)
                );
                renderCalls(filtered);
            });
            
            // Filters
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    loadMyCalls(e.target.dataset.filter);
                });
            });
            
            // AI input enter key
            document.getElementById('aiInput')?.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    submitAIQuery();
                }
            });
        }
        
        // Helper functions
        function formatDate(date) {
            const d = new Date(date);
            const now = new Date();
            const diff = Math.floor((now - d) / (1000 * 60 * 60 * 24));
            
            if (diff === 0) return 'Today';
            if (diff === 1) return 'Yesterday';
            if (diff < 7) return `${diff} days ago`;
            
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }
        
        function formatOutcome(outcome) {
            if (!outcome) return 'Ongoing';
            return outcome.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        }
        
        function formatTimestamp(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        function toggleTranscript() {
            const container = document.getElementById('transcriptContainer');
            container.style.maxHeight = container.style.maxHeight === 'none' ? '400px' : 'none';
        }
        
        // Initialize on load
        init();
    </script>
</body>
</html>
