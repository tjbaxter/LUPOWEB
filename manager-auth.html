<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUPO - Completing Sign In...</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            text-align: center;
            max-width: 400px;
            padding: 2rem;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #222;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 2rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 1rem;
            border-radius: 8px;
            color: #ef4444;
            display: none;
        }
        
        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Completing Sign In...</h1>
        <p>Please wait while we verify your access</p>
        <div class="error" id="error"></div>
    </div>
    
    <script>
        async function handleMagicLink() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const email = params.get('email');
            
            if (!token || !email) {
                document.getElementById('error').textContent = 'Invalid link';
                document.getElementById('error').classList.add('show');
                setTimeout(() => {
                    window.location.href = '/manager-login.html';
                }, 2000);
                return;
            }
            
            try {
                const response = await fetch('https://lupo-backend.fly.dev/auth/verify-magic-link', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, email })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Store the token
                    localStorage.setItem('lupo_manager_token', data.token);
                    
                    // Calculate expiry
                    const expiry = new Date();
                    expiry.setSeconds(expiry.getSeconds() + (data.expiresIn || 2592000));
                    localStorage.setItem('lupo_manager_expiry', expiry.toISOString());
                    
                    // Redirect to dashboard
                    window.location.href = '/manager-dashboard.html';
                } else {
                    throw new Error(data.error || 'Verification failed');
                }
            } catch (error) {
                document.getElementById('error').textContent = error.message;
                document.getElementById('error').classList.add('show');
                setTimeout(() => {
                    window.location.href = '/manager-login.html';
                }, 3000);
            }
        }
        
        handleMagicLink();
    </script>
</body>
</html>
